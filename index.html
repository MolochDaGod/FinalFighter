  <div class="gs-watermark">GRUDGE STUDIO</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ===== CHARACTER DATA =====
    const CHARACTERS = [
      { id: 'Model001', name: 'Cao Pi', class: 'Swordsman', icon: 'CP', atk: 7, def: 6, spd: 8, meshPrefix: 'Model001', glb: './characters/Model001.glb', color: '#cc3333' },
      { id: 'Model002', name: 'Cao Zijian', class: 'Strategist', icon: 'CZ', atk: 5, def: 7, spd: 7, meshPrefix: 'Model002', glb: './characters/Model002.glb', color: '#8855cc' },
      { id: 'Model003', name: 'Dian Wei', class: 'Berserker', icon: 'DW', atk: 10, def: 8, spd: 4, meshPrefix: 'Model003', glb: './characters/Model003.glb', color: '#dd6633' },
      { id: 'Model004', name: 'Diao Chan', class: 'Enchantress', icon: 'DC', atk: 6, def: 5, spd: 9, meshPrefix: 'Model004', glb: './characters/Model004.glb', color: '#dd55aa' },
      { id: 'Model005', name: 'Dong Zhuo', class: 'Tyrant', icon: 'DZ', atk: 9, def: 9, spd: 3, meshPrefix: 'Model005', glb: './characters/Model005.glb', color: '#884422' },
      { id: 'Model006', name: 'Guo Jia', class: 'Tactician', icon: 'GJ', atk: 6, def: 6, spd: 8, meshPrefix: 'Model006', glb: './characters/Model006.glb', color: '#3388cc' },
      { id: 'Model007', name: 'Huang Gai', class: 'Vanguard', icon: 'HG', atk: 8, def: 8, spd: 5, meshPrefix: 'Model007', glb: './characters/Model007.glb', color: '#cc8833' },
      { id: 'Model008', name: 'Huang Yueying', class: 'Inventor', icon: 'HY', atk: 7, def: 5, spd: 8, meshPrefix: 'Model008', glb: './characters/Model008.glb', color: '#44bb88' },
      { id: 'Model009', name: 'Xu Kui', class: 'Shadow Blade', icon: 'XK', atk: 8, def: 5, spd: 9, meshPrefix: 'Model009', glb: './characters/Model009.glb', color: '#6644aa' },
      { id: 'Model010', name: 'Liu Bei', class: 'Warlord', icon: 'LB', atk: 7, def: 7, spd: 7, meshPrefix: 'Model010', glb: './characters/Model010.glb', color: '#44aa44' },
      { id: 'Model011', name: 'Lu Bu', class: 'God of War', icon: 'LU', atk: 10, def: 7, spd: 7, meshPrefix: 'Model011', glb: './characters/Model011.glb', color: '#cc2222' },
      { id: 'Model012', name: 'Lu Meng', class: 'Blade Master', icon: 'LM', atk: 8, def: 6, spd: 7, meshPrefix: 'Model012', glb: './characters/Model012.glb', color: '#2266bb' },
    ];

    // ===== STATE =====
    let gltfScene = null;
    let characterGroups = {};       // meshPrefix fallback: collected from monolithic scene.gltf
    let characterGLBScenes = {};    // individual GLB scenes keyed by character id
    let characterBounds = {};       // stores per-character bounding dimensions
    let previewScene, previewCamera, previewRenderer, previewControls;
    let battleScene, battleCamera, battleRenderer;
    let selectingPlayer = 1;
    let selectedP1 = null, selectedP2 = null;
    let previewChar = null;
    let gameState = null;
    let animFrame = null;
    let battleActive = false;
    let keys = {};
    let debugColliders = false;
    let debugHelpers = [];
    let vfxParticles = [];
    let screenShake = 0;
    const CAM_BASE = new THREE.Vector3(0, 2, 6);

    // ===== GAMEPAD / CONTROLLER SYSTEM =====
    const GP_BUTTON_NAMES = [
      'Cross/A',   // 0
      'Circle/B',  // 1
      'Square/X',  // 2
      'Triangle/Y',// 3
      'L1/LB',     // 4
      'R1/RB',     // 5
      'L2/LT',     // 6
      'R2/RT',     // 7
      'Share',     // 8
      'Options',   // 9
      'L3',        // 10
      'R3',        // 11
      'D-Up',      // 12
      'D-Down',    // 13
      'D-Left',    // 14
      'D-Right',   // 15
      'PS/Guide',  // 16
    ];

    const INPUT_ACTIONS = [
      'move_left', 'move_right', 'punch', 'kick', 'special', 'block', 'menu', 'debug',
    ];

    const ACTION_LABELS = {
      move_left: 'Move Left', move_right: 'Move Right',
      punch: 'Punch', kick: 'Kick', special: 'Special',
      block: 'Block', menu: 'Menu / Pause', debug: 'Debug',
    };

    const DEFAULT_KB_BINDS = {
      move_left: 'KeyA', move_right: 'KeyD',
      punch: 'KeyJ', kick: 'KeyK', special: 'KeyL',
      block: 'Space', menu: 'Escape', debug: 'Backquote',
    };

    // PS5 DualSense default: Square=punch, Circle=kick, Triangle=special, L1=block
    const DEFAULT_GP_BINDS = {
      punch: 2,    // Square / X
      kick: 1,     // Circle / B
      special: 3,  // Triangle / Y
      block: 4,    // L1 / LB
      menu: 9,     // Options / Start
      debug: 8,    // Share / Back
    };

    const STICK_DEADZONE = 0.25;

    let kbBinds = { ...DEFAULT_KB_BINDS };
    let gpBinds = { ...DEFAULT_GP_BINDS };
    let gpConnected = false;
    let gpIndex = -1;
    let gpPrev = new Array(17).fill(false);
    let gpDown = new Array(17).fill(false); // true only on first frame pressed
    let gpHeld = new Array(17).fill(false);
    let gpStickX = 0;
    let gpStickY = 0;
    let settingsOpen = false;
    let rebindTarget = null; // { type: 'kb'|'gp', action: string }

    function loadBindings() {
      try {
        const saved = localStorage.getItem('ff_bindings');
        if (saved) {
          const data = JSON.parse(saved);
          if (data.kb) Object.assign(kbBinds, data.kb);
          if (data.gp) Object.assign(gpBinds, data.gp);
        }
      } catch (_) { /* ignore corrupt data */ }
    }

    function saveBindings() {
      try {
        localStorage.setItem('ff_bindings', JSON.stringify({ kb: kbBinds, gp: gpBinds }));
      } catch (_) { /* quota exceeded */ }
    }

    function gpButtonName(idx) {
      return GP_BUTTON_NAMES[idx] || `Btn${idx}`;
    }

    function keyCodeLabel(code) {
      if (!code) return '—';
      return code
        .replace('Key', '')
        .replace('Arrow', '↑↓←→'.includes(code.replace('Arrow', '')) ? '' : '→')
        .replace('ArrowLeft', '←').replace('ArrowRight', '→')
        .replace('ArrowUp', '↑').replace('ArrowDown', '↓')
        .replace('Space', 'Space').replace('Backquote', '`')
        .replace('Escape', 'Esc');
    }

    // --- Gamepad connection events ---
    window.addEventListener('gamepadconnected', (e) => {
      gpConnected = true;
      gpIndex = e.gamepad.index;
      const badge = document.getElementById('controller-badge');
      badge.textContent = e.gamepad.id.split('(')[0].trim() || 'Controller';
      badge.className = 'controller-badge visible connected';
      setTimeout(() => { badge.classList.remove('visible'); }, 3000);
      updateControlsHUD();
    });

    window.addEventListener('gamepaddisconnected', () => {
      gpConnected = false;
      gpIndex = -1;
      const badge = document.getElementById('controller-badge');
      badge.textContent = 'Controller Disconnected';
      badge.className = 'controller-badge visible disconnected';
      setTimeout(() => { badge.classList.remove('visible'); }, 3000);
      updateControlsHUD();
    });

    // --- Poll gamepad state each frame ---
    function pollGamepad() {
      if (!gpConnected) return;
      const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = gamepads[gpIndex];
      if (!gp) return;

      // Buttons
      for (let i = 0; i < Math.min(gp.buttons.length, 17); i++) {
        const pressed = gp.buttons[i].pressed;
        gpDown[i] = pressed && !gpPrev[i];
        gpHeld[i] = pressed;
        gpPrev[i] = pressed;
      }

      // Left stick (axes 0/1)
      gpStickX = Math.abs(gp.axes[0]) > STICK_DEADZONE ? gp.axes[0] : 0;
      gpStickY = Math.abs(gp.axes[1]) > STICK_DEADZONE ? gp.axes[1] : 0;
    }

    function gpActionDown(action) {
      const btn = gpBinds[action];
      return btn !== undefined && gpDown[btn];
    }

    function gpActionHeld(action) {
      const btn = gpBinds[action];
      return btn !== undefined && gpHeld[btn];
    }

    function gpMoveX() {
      // Combine D-pad + stick
      let x = gpStickX;
      if (gpHeld[14]) x = -1; // D-Left
      if (gpHeld[15]) x = 1;  // D-Right
      return x;
    }

    function gpAnyButtonDown() {
      for (let i = 0; i < 17; i++) {
        if (gpDown[i]) return i;
      }
      return -1;
    }

    // --- Controls HUD (updates dynamically based on bindings + controller) ---
    function updateControlsHUD() {
      const el = document.getElementById('battle-controls');
      if (!el) return;
      const kb = (action) => `<span class="key-badge">${keyCodeLabel(kbBinds[action])}</span>`;
      const gp_b = (action) => gpBinds[action] !== undefined
        ? `<span class="key-badge" style="border-color:#2a4080;color:#6090dd">${gpButtonName(gpBinds[action])}</span>` : '';
      const sep = '&nbsp;&nbsp;';
      let html = `${kb('move_left')} ${kb('move_right')} Move${sep}`;
      html += `${kb('punch')}${gp_b('punch')} Punch${sep}`;
      html += `${kb('kick')}${gp_b('kick')} Kick${sep}`;
      html += `${kb('special')}${gp_b('special')} Special${sep}`;
      html += `${kb('block')}${gp_b('block')} Block${sep}`;
      html += `${kb('menu')} Menu${sep}${kb('debug')} Debug`;
      el.innerHTML = html;
    }

    // --- Settings UI ---
    function buildSettingsUI() {
      const kbEl = document.getElementById('kb-binds');
      const gpEl = document.getElementById('gp-binds');
      if (!kbEl || !gpEl) return;

      kbEl.innerHTML = '';
      for (const action of INPUT_ACTIONS) {
        const row = document.createElement('div');
        row.className = 'bind-row';
        row.dataset.action = action;
        row.dataset.type = 'kb';
        row.innerHTML = `
          <span class="bind-action">${ACTION_LABELS[action]}</span>
          <div class="bind-keys">
            <span class="bind-key">${keyCodeLabel(kbBinds[action])}</span>
            <span class="bind-hint">click to rebind</span>
          </div>`;
        row.addEventListener('click', () => startRebind('kb', action, row));
        kbEl.appendChild(row);
      }

      gpEl.innerHTML = '';
      const gpActions = INPUT_ACTIONS.filter(a => a !== 'move_left' && a !== 'move_right');
      for (const action of gpActions) {
        const row = document.createElement('div');
        row.className = 'bind-row';
        row.dataset.action = action;
        row.dataset.type = 'gp';
        const val = gpBinds[action];
        row.innerHTML = `
          <span class="bind-action">${ACTION_LABELS[action]}</span>
          <div class="bind-keys">
            <span class="bind-gp">${val !== undefined ? gpButtonName(val) : '—'}</span>
            <span class="bind-hint">click to rebind</span>
          </div>`;
        row.addEventListener('click', () => startRebind('gp', action, row));
        gpEl.appendChild(row);
      }

      // D-pad / stick info
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.7rem;color:#a8a18a;margin-top:0.5rem;font-style:italic;';
      note.textContent = 'Movement: Left Stick + D-Pad (not rebindable)';
      gpEl.appendChild(note);
    }

    function startRebind(type, action, rowEl) {
      // Cancel previous
      document.querySelectorAll('.bind-row.listening').forEach(r => r.classList.remove('listening'));
      rebindTarget = { type, action };
      rowEl.classList.add('listening');
      rowEl.querySelector('.bind-hint').textContent = type === 'kb' ? 'press a key…' : 'press a button…';
    }

    function finishRebind(type, action, value) {
      if (type === 'kb') {
        kbBinds[action] = value;
      } else {
        gpBinds[action] = value;
      }
      rebindTarget = null;
      saveBindings();
      buildSettingsUI();
      updateControlsHUD();
    }

    // Listen for keyboard rebind
    document.addEventListener('keydown', (e) => {
      if (rebindTarget && rebindTarget.type === 'kb') {
        e.preventDefault();
        finishRebind('kb', rebindTarget.action, e.code);
        return;
      }
    }, true); // capture phase so it fires before game input

    window.showSettings = function() {
      settingsOpen = true;
      buildSettingsUI();
      document.getElementById('settings-overlay').classList.add('active');
    };

    window.closeSettings = function() {
      settingsOpen = false;
      rebindTarget = null;
      document.querySelectorAll('.bind-row.listening').forEach(r => r.classList.remove('listening'));
      document.getElementById('settings-overlay').classList.remove('active');
    };

    window.resetBindings = function() {
      kbBinds = { ...DEFAULT_KB_BINDS };
      gpBinds = { ...DEFAULT_GP_BINDS };
      saveBindings();
      buildSettingsUI();
      updateControlsHUD();
    };

    loadBindings();

    // ===== COLLIDER SYSTEM (Three.js Box3) =====
    // Attack reach defines the hitbox that extends from the attacker's body edge.
    // { fwd: forward reach, up: vertical extent, wide: lateral width }
    const ATTACK_HITBOXES = {
      punch:   { fwd: 0.45, up: 0.3, wide: 0.25 }, // short jab
      kick:    { fwd: 0.65, up: 0.4, wide: 0.3 },  // medium leg reach
      special: { fwd: 0.9,  up: 0.6, wide: 0.5 },  // wide sweep/blast
    };

    const FIGHTER_STATES = Object.freeze({
      IDLE: 'idle',
      WALK_FWD: 'walk_fwd',
      WALK_BACK: 'walk_back',
      PUNCH: 'punch',
      KICK: 'kick',
      SPECIAL: 'special',
      BLOCK: 'block',
      HIT_REACT: 'hit_react',
      KNOCKDOWN: 'knockdown',
      KO: 'ko',
      VICTORY: 'victory',
    });

    const ATTACK_FRAME_DATA = Object.freeze({
      punch: {
        windup: 90,
        activeStart: 90,
        activeEnd: 160,
        recoveryEnd: 320,
        cancelStart: 125,
        cancelEnd: 270,
        cooldown: 300,
      },
      kick: {
        windup: 130,
        activeStart: 130,
        activeEnd: 220,
        recoveryEnd: 500,
        cancelStart: 190,
        cancelEnd: 430,
        cooldown: 500,
      },
      special: {
        windup: 220,
        activeStart: 220,
        activeEnd: 340,
        recoveryEnd: 1100,
        cancelStart: 0,
        cancelEnd: 0,
        cooldown: 1200,
      },
    });

    const STATE_RECOVERY_MS = Object.freeze({
      hit_react: 260,
      knockdown: 900,
    });

    const LOOPING_ANIMATION_STATES = new Set([
      FIGHTER_STATES.IDLE,
      FIGHTER_STATES.WALK_FWD,
      FIGHTER_STATES.WALK_BACK,
      FIGHTER_STATES.BLOCK,
    ]);

    const MIXAMO_STATE_ALIASES = Object.freeze({
      idle: ['idle'],
      walk_fwd: ['walk_fwd', 'walk_forward', 'walk', 'walking'],
      walk_back: ['walk_back', 'walk_backward', 'backpedal', 'walk_backward_loop'],
      punch: ['punch', 'jab', 'attack_1', 'attack'],
      kick: ['kick', 'roundhouse', 'attack_2'],
      special: ['special', 'ability', 'attack_special', 'slash', 'spellcast'],
      block: ['block', 'blocking', 'guard'],
      hit_react: ['hit_react', 'hit', 'pain', 'react'],
      knockdown: ['knockdown', 'fall', 'down', 'knocked_down'],
      ko: ['ko', 'death', 'dead', 'defeat'],
      victory: ['victory', 'win', 'celebrate', 'taunt'],
    });

    // Populate this with your exported Mixamo clip files when ready.
    // Example:
    // shared: { idle: './animations/shared/idle.glb' }
    // perCharacter: { Model001: { special: './animations/Model001/special.glb' } }
    const MIXAMO_CLIP_MANIFEST = {
      shared: {},
      perCharacter: {},
    };

    const mixamoClipLoader = new GLTFLoader();

    function normalizeClipName(name = '') {
      return String(name).trim().toLowerCase().replace(/[\s\-]+/g, '_');
    }

    function isAttackState(state) {
      return state === FIGHTER_STATES.PUNCH
        || state === FIGHTER_STATES.KICK
        || state === FIGHTER_STATES.SPECIAL;
    }

    function getFighterFacingDir(fighter) {
      const y = fighter.group.rotation.y % (Math.PI * 2);
      return (y < Math.PI / 2 || y > Math.PI * 1.5) ? 1 : -1;
    }

    function createFighterCombatState() {
      return {
        state: FIGHTER_STATES.IDLE,
        stateTime: 0,
        attackType: null,
        attackResolved: false,
        queuedAttack: null,
      };
    }

    function getManifestForCharacter(charId) {
      return {
        ...(MIXAMO_CLIP_MANIFEST.shared || {}),
        ...((MIXAMO_CLIP_MANIFEST.perCharacter || {})[charId] || {}),
      };
    }

    function createFighterAnimationState(fighter) {
      return {
        mixer: new THREE.AnimationMixer(fighter.group),
        clips: {},
        actions: {},
        stateToClip: {},
        currentState: null,
        currentAction: null,
      };
    }

    function registerFighterClip(fighter, clip) {
      if (!fighter?.animation?.mixer || !clip) return;
      const key = normalizeClipName(clip.name);
      fighter.animation.clips[key] = clip;
      fighter.animation.actions[key] = fighter.animation.mixer.clipAction(clip);
    }

    function remapAnimationStates(fighter) {
      const keys = Object.keys(fighter.animation.actions);
      for (const state of Object.values(FIGHTER_STATES)) {
        const desired = normalizeClipName(state);
        if (fighter.animation.actions[desired]) {
          fighter.animation.stateToClip[state] = desired;
          continue;
        }
        const aliases = MIXAMO_STATE_ALIASES[state] || [];
        let found = null;
        for (const alias of aliases) {
          const a = normalizeClipName(alias);
          found = keys.find(k => k === a || k.includes(a));
          if (found) break;
        }
        if (!found && state === FIGHTER_STATES.WALK_BACK) {
          found = fighter.animation.stateToClip[FIGHTER_STATES.WALK_FWD] || null;
        }
        if (!found && state !== FIGHTER_STATES.IDLE) {
          found = fighter.animation.stateToClip[FIGHTER_STATES.IDLE] || null;
        }
        if (found) fighter.animation.stateToClip[state] = found;
      }
    }

    function playFighterAnimation(fighter, state, fade = 0.12) {
      if (!fighter?.animation) return;
      const { actions, stateToClip } = fighter.animation;
      const clipKey = stateToClip[state] || stateToClip[FIGHTER_STATES.IDLE];
      if (!clipKey || !actions[clipKey]) return;

      const next = actions[clipKey];
      const prev = fighter.animation.currentAction;
      if (prev === next && fighter.animation.currentState === state) return;

      next.enabled = true;
      next.reset();
      if (LOOPING_ANIMATION_STATES.has(state)) {
        next.setLoop(THREE.LoopRepeat, Infinity);
        next.clampWhenFinished = false;
      } else {
        next.setLoop(THREE.LoopOnce, 1);
        next.clampWhenFinished = true;
      }

      if (prev) prev.crossFadeTo(next, fade, true);
      next.play();
      fighter.animation.currentAction = next;
      fighter.animation.currentState = state;
    }

    function setFighterState(fighter, nextState, opts = {}) {
      if (!fighter?.combat) return;
      const force = !!opts.force;
      if (!force && fighter.combat.state === nextState) return;
      fighter.combat.state = nextState;
      fighter.combat.stateTime = 0;
      fighter.blocking = nextState === FIGHTER_STATES.BLOCK;

      if (isAttackState(nextState)) {
        fighter.combat.attackType = nextState;
        fighter.combat.attackResolved = false;
      } else {
        fighter.combat.attackType = null;
        fighter.combat.attackResolved = false;
        if (!isAttackState(nextState)) fighter.combat.queuedAttack = null;
      }
      playFighterAnimation(fighter, nextState);
    }

    function initializeFighterAnimationController(fighter) {
      fighter.combat = createFighterCombatState();
      fighter.animation = createFighterAnimationState(fighter);
      remapAnimationStates(fighter);

      const manifest = getManifestForCharacter(fighter.char.id);
      for (const [state, url] of Object.entries(manifest)) {
        if (!url) continue;
        mixamoClipLoader.load(url, (clipGltf) => {
          if (!clipGltf.animations || clipGltf.animations.length === 0) return;
          const baseClip = clipGltf.animations[0];
          const clip = baseClip.clone();
          clip.name = normalizeClipName(state);
          registerFighterClip(fighter, clip);
          remapAnimationStates(fighter);
          playFighterAnimation(fighter, fighter.combat.state, 0.05);
        }, undefined, (err) => {
          console.warn(`Failed to load Mixamo clip (${state}) for ${fighter.char.id}:`, err);
        });
      }

      setFighterState(fighter, FIGHTER_STATES.IDLE, { force: true });
    }

    function queueAttack(fighter, attackType) {
      if (!fighter || fighter.hp <= 0) return false;
      if (!ATTACK_FRAME_DATA[attackType]) return false;
      if (fighter.cooldown > 0 || fighter.stunned > 0) return false;
      const s = fighter.combat.state;
      if (
        s === FIGHTER_STATES.IDLE
        || s === FIGHTER_STATES.WALK_FWD
        || s === FIGHTER_STATES.WALK_BACK
        || s === FIGHTER_STATES.BLOCK
      ) {
        setFighterState(fighter, attackType, { force: true });
        return true;
      }
      if (isAttackState(s)) {
        const spec = ATTACK_FRAME_DATA[fighter.combat.attackType || s];
        if (spec && fighter.combat.stateTime >= spec.cancelStart && fighter.combat.stateTime <= spec.cancelEnd) {
          fighter.combat.queuedAttack = attackType;
          return true;
        }
      }
      return false;
    }

    function updateFighterStateMachine(fighter, opponent, dt, moveIntent, blockHeld) {
      if (!fighter?.combat || fighter.hp <= 0) return;
      fighter.combat.stateTime += dt;

      const state = fighter.combat.state;
      if (state === FIGHTER_STATES.KO || state === FIGHTER_STATES.VICTORY) return;

      if (fighter.stunned > 0 && !isAttackState(state) && state !== FIGHTER_STATES.KNOCKDOWN) {
        setFighterState(fighter, FIGHTER_STATES.HIT_REACT);
        return;
      }

      if (isAttackState(state)) {
        const spec = ATTACK_FRAME_DATA[fighter.combat.attackType];
        if (!spec) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
          return;
        }
        if (!fighter.combat.attackResolved && fighter.combat.stateTime >= spec.activeStart) {
          fighter.combat.attackResolved = true;
          performAttack(fighter, opponent, fighter.combat.attackType);
        }
        if (fighter.combat.stateTime >= spec.recoveryEnd) {
          const queued = fighter.combat.queuedAttack;
          fighter.combat.queuedAttack = null;
          if (queued && ATTACK_FRAME_DATA[queued]) {
            setFighterState(fighter, queued, { force: true });
          } else {
            setFighterState(fighter, FIGHTER_STATES.IDLE);
          }
        }
        return;
      }

      if (state === FIGHTER_STATES.HIT_REACT || state === FIGHTER_STATES.KNOCKDOWN) {
        const recoverAt = STATE_RECOVERY_MS[state] || 300;
        if (fighter.combat.stateTime >= recoverAt) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
        }
        return;
      }

      if (blockHeld && fighter.cooldown <= 0 && fighter.stunned <= 0) {
        setFighterState(fighter, FIGHTER_STATES.BLOCK);
        return;
      }
      if (state === FIGHTER_STATES.BLOCK && !blockHeld) {
        setFighterState(fighter, FIGHTER_STATES.IDLE);
        return;
      }

      if (Math.abs(moveIntent) > 0.001) {
        const facingDir = opponent.x >= fighter.x ? 1 : -1;
        const moveState = Math.sign(moveIntent) === facingDir
          ? FIGHTER_STATES.WALK_FWD
          : FIGHTER_STATES.WALK_BACK;
        setFighterState(fighter, moveState);
      } else {
        setFighterState(fighter, FIGHTER_STATES.IDLE);
      }
    }

    function isAttackActiveFrame(fighter) {
      if (!fighter?.combat || !isAttackState(fighter.combat.state)) return false;
      const spec = ATTACK_FRAME_DATA[fighter.combat.attackType];
      if (!spec) return false;
      return fighter.combat.stateTime >= spec.activeStart && fighter.combat.stateTime <= spec.activeEnd;
    }

    // ===== PROCEDURAL ANIMATION FALLBACK =====
    // Drives visible motion via group transforms when no Mixamo clips are loaded.
    function hasRealClips(fighter) {
      return fighter.animation
        && Object.keys(fighter.animation.stateToClip).length > 0
        && fighter.animation.currentAction;
    }

    function updateProceduralAnimation(fighter, dt) {
      if (hasRealClips(fighter)) return; // real clips take over
      if (!fighter?.combat) return;
      const state = fighter.combat.state;
      const t = fighter.combat.stateTime; // ms elapsed in current state
      const g = fighter.group;
      const by = fighter.baseY || 0;
      const now = Date.now();

      // Reset to neutral every frame — state block sets deltas
      g.rotation.x = 0;
      g.rotation.z = 0;
      g.position.y = by;

      switch (state) {
        // --- IDLE: gentle breathing bob ---
        case FIGHTER_STATES.IDLE: {
          g.position.y = by + Math.sin(now * 0.003) * 0.015;
          break;
        }
        // --- WALK FORWARD: rhythmic bob + tilt ---
        case FIGHTER_STATES.WALK_FWD: {
          g.position.y = by + Math.sin(now * 0.01) * 0.02;
          g.rotation.z = Math.sin(now * 0.01) * 0.03;
          g.rotation.x = -0.04; // slight forward lean
          break;
        }
        // --- WALK BACKWARD: cautious lean ---
        case FIGHTER_STATES.WALK_BACK: {
          g.position.y = by + Math.sin(now * 0.008) * 0.015;
          g.rotation.x = 0.06;
          break;
        }
        // --- PUNCH ---
        case FIGHTER_STATES.PUNCH: {
          const sp = ATTACK_FRAME_DATA.punch;
          if (t < sp.activeStart) {
            const w = t / sp.activeStart;
            g.rotation.x = w * 0.08;
            g.position.y = by - w * 0.02;
          } else if (t <= sp.activeEnd) {
            const a = (t - sp.activeStart) / (sp.activeEnd - sp.activeStart);
            g.rotation.x = -0.15 * (1 - a * 0.5);
            g.position.y = by + 0.03;
          } else {
            const r = Math.min(1, (t - sp.activeEnd) / (sp.recoveryEnd - sp.activeEnd));
            g.rotation.x = -0.15 * (1 - r);
            g.position.y = by + 0.03 * (1 - r);
          }
          break;
        }
        // --- KICK ---
        case FIGHTER_STATES.KICK: {
          const sp = ATTACK_FRAME_DATA.kick;
          if (t < sp.activeStart) {
            const w = t / sp.activeStart;
            g.rotation.x = w * 0.06;
            g.position.y = by + w * 0.04;
          } else if (t <= sp.activeEnd) {
            const a = (t - sp.activeStart) / (sp.activeEnd - sp.activeStart);
            g.rotation.x = -0.12;
            g.rotation.z = -0.08 * a;
            g.position.y = by + 0.06;
          } else {
            const r = Math.min(1, (t - sp.activeEnd) / (sp.recoveryEnd - sp.activeEnd));
            g.rotation.x = -0.12 * (1 - r);
            g.rotation.z = -0.08 * (1 - r);
            g.position.y = by + 0.06 * (1 - r);
          }
          break;
        }
        // --- SPECIAL ---
        case FIGHTER_STATES.SPECIAL: {
          const sp = ATTACK_FRAME_DATA.special;
          if (t < sp.activeStart) {
            const w = t / sp.activeStart;
            g.rotation.x = w * 0.1;
            g.position.y = by + w * 0.05;
            g.rotation.z = Math.sin(w * Math.PI * 2) * 0.04;
          } else if (t <= sp.activeEnd) {
            g.rotation.x = -0.2;
            g.position.y = by + 0.08;
            g.rotation.z = Math.sin(t * 0.02) * 0.06;
          } else {
            const r = Math.min(1, (t - sp.activeEnd) / (sp.recoveryEnd - sp.activeEnd));
            g.rotation.x = -0.2 * (1 - r);
            g.position.y = by + 0.08 * (1 - r);
          }
          break;
        }
        // --- BLOCK: crouch + lean back ---
        case FIGHTER_STATES.BLOCK: {
          const ease = Math.min(1, t / 100);
          g.position.y = by - 0.06 * ease;
          g.rotation.x = 0.1 * ease;
          break;
        }
        // --- HIT REACT: snap back then recover ---
        case FIGHTER_STATES.HIT_REACT: {
          const dur = STATE_RECOVERY_MS.hit_react;
          const p = Math.min(1, t / dur);
          if (p < 0.3) {
            const s = p / 0.3;
            g.rotation.x = s * 0.2;
            g.position.y = by + s * 0.04;
            g.rotation.z = Math.sin(s * Math.PI * 4) * 0.05;
          } else {
            const s = (p - 0.3) / 0.7;
            g.rotation.x = 0.2 * (1 - s);
            g.position.y = by + 0.04 * (1 - s);
            g.rotation.z = Math.sin(s * Math.PI) * 0.02 * (1 - s);
          }
          break;
        }
        // --- KNOCKDOWN: fall then get up ---
        case FIGHTER_STATES.KNOCKDOWN: {
          const dur = STATE_RECOVERY_MS.knockdown;
          const p = Math.min(1, t / dur);
          if (p < 0.4) {
            const s = p / 0.4;
            g.rotation.x = s * 1.2;
            g.position.y = by + 0.1 * (1 - s);
          } else if (p < 0.7) {
            g.rotation.x = 1.2;
            g.position.y = by - 0.1;
          } else {
            const s = (p - 0.7) / 0.3;
            g.rotation.x = 1.2 * (1 - s);
            g.position.y = by - 0.1 * (1 - s);
          }
          break;
        }
        // --- KO: fall and stay down ---
        case FIGHTER_STATES.KO: {
          const p = Math.min(1, t / 600);
          g.rotation.x = p * 1.5;
          g.position.y = by - p * 0.15;
          break;
        }
        // --- VICTORY: celebratory bounce ---
        case FIGHTER_STATES.VICTORY: {
          const bounce = Math.abs(Math.sin(t * 0.005)) * 0.1;
          g.position.y = by + bounce;
          g.rotation.z = Math.sin(t * 0.003) * 0.05;
          break;
        }
      }
    }

    // Build a body collider Box3 for a fighter at their current position.
    // Uses actual measured character dimensions, not hardcoded.
    function getBodyCollider(fighter) {
      const b = fighter.bounds; // { hw, hh, hd } half-width/height/depth
      return new THREE.Box3(
        new THREE.Vector3(fighter.x - b.hw, 0, -b.hd),
        new THREE.Vector3(fighter.x + b.hw, b.hh * 2, b.hd)
      );
    }

    // Build hurtbox zones (upper / mid / lower body) from a fighter.
    function getHurtboxes(fighter) {
      const b = fighter.bounds;
      const h = b.hh * 2; // full height
      const third = h / 3;
      const x = fighter.x;
      return {
        upper: new THREE.Box3(
          new THREE.Vector3(x - b.hw, third * 2, -b.hd),
          new THREE.Vector3(x + b.hw, h, b.hd)
        ),
        mid: new THREE.Box3(
          new THREE.Vector3(x - b.hw, third, -b.hd),
          new THREE.Vector3(x + b.hw, third * 2, b.hd)
        ),
        lower: new THREE.Box3(
          new THREE.Vector3(x - b.hw * 0.9, 0, -b.hd),
          new THREE.Vector3(x + b.hw * 0.9, third, b.hd)
        ),
      };
    }

    // Build an attack hitbox extending from the attacker toward the defender.
    function getAttackHitbox(attacker, attackType) {
      const atk = ATTACK_HITBOXES[attackType];
      if (!atk) return null;
      const b = attacker.bounds;
      const facingRight = attacker.group.rotation.y < Math.PI / 2;
      const dir = facingRight ? 1 : -1;
      // Hitbox starts at body edge, extends forward
      const edgeX = attacker.x + dir * b.hw;
      const farX = edgeX + dir * atk.fwd;
      const minX = Math.min(edgeX, farX);
      const maxX = Math.max(edgeX, farX);
      const cy = b.hh; // centered vertically on body
      return new THREE.Box3(
        new THREE.Vector3(minX, cy - atk.up, -atk.wide),
        new THREE.Vector3(maxX, cy + atk.up, atk.wide)
      );
    }

    // Push two fighters apart if their body colliders overlap.
    function resolveBodyCollision(p1, p2) {
      const box1 = getBodyCollider(p1);
      const box2 = getBodyCollider(p2);
      if (!box1.intersectsBox(box2)) return;
      // Compute overlap on X axis
      const overlapLeft = box1.max.x - box2.min.x;
      const overlapRight = box2.max.x - box1.min.x;
      const pushDist = Math.min(overlapLeft, overlapRight) / 2 + 0.01;
      if (p1.x < p2.x) {
        p1.x -= pushDist;
        p2.x += pushDist;
      } else {
        p1.x += pushDist;
        p2.x -= pushDist;
      }
      // Clamp to arena bounds
      p1.x = Math.max(-3.5, Math.min(3.5, p1.x));
      p2.x = Math.max(-3.5, Math.min(3.5, p2.x));
      p1.group.position.x = p1.x;
      p2.group.position.x = p2.x;
    }

    // ===== DEBUG VISUALIZATION =====
    function clearDebugHelpers() {
      for (const h of debugHelpers) battleScene.remove(h);
      debugHelpers = [];
    }

    function drawDebugColliders() {
      clearDebugHelpers();
      if (!debugColliders || !gameState) return;
      const addHelper = (box, color) => {
        const helper = new THREE.Box3Helper(box, color);
        battleScene.add(helper);
        debugHelpers.push(helper);
      };
      // Body colliders
      addHelper(getBodyCollider(gameState.p1), 0xeeb72b); // gold
      addHelper(getBodyCollider(gameState.p2), 0x3080ff); // blue
      // Hurtbox zones
      const h1 = getHurtboxes(gameState.p1);
      const h2 = getHurtboxes(gameState.p2);
      addHelper(h1.upper, 0xff4444);
      addHelper(h1.mid, 0xffaa33);
      addHelper(h1.lower, 0x44ff44);
      addHelper(h2.upper, 0xff4444);
      addHelper(h2.mid, 0xffaa33);
      addHelper(h2.lower, 0x44ff44);
    };

    // ===== VFX SYSTEM =====
    const _slashGeo = new THREE.TorusGeometry(0.35, 0.015, 4, 16, Math.PI * 0.8);
    const _sparkGeo = new THREE.SphereGeometry(0.03, 4, 4);

    function spawnSlashVFX(x, y, facingRight, color) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(_slashGeo, mat);
      mesh.position.set(x + (facingRight ? 0.3 : -0.3), y, 0.1);
      mesh.rotation.z = facingRight ? -0.3 : Math.PI + 0.3;
      mesh.rotation.x = (Math.random() - 0.5) * 0.4;
      battleScene.add(mesh);
      vfxParticles.push({ mesh, life: 0, maxLife: 180, type: 'slash' });
    }

    function spawnImpactSparks(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(_sparkGeo, mat);
        mesh.position.set(x, y, 0);
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 2.5;
        battleScene.add(mesh);
        vfxParticles.push({
          mesh, life: 0, maxLife: 250 + Math.random() * 150,
          type: 'spark',
          vx: Math.cos(angle) * speed * 0.003,
          vy: Math.sin(angle) * speed * 0.003 + 0.002,
          gravity: 0.00002,
        });
      }
    }

    function spawnAttackVFX(attacker, defender, attackType, blocked) {
      const hitX = (attacker.x + defender.x) / 2;
      const hitY = attacker.bounds.hh;
      const facingRight = defender.x > attacker.x;
      const colors = {
        punch: 0xeeb72b,
        kick: 0xff6633,
        special: 0xac4bff,
      };
      const color = colors[attackType] || 0xeeb72b;

      if (blocked) {
        spawnImpactSparks(hitX, hitY, 4, 0x3080ff);
      } else {
        spawnSlashVFX(hitX, hitY, facingRight, color);
        const sparkCount = attackType === 'special' ? 12 : attackType === 'kick' ? 8 : 5;
        spawnImpactSparks(hitX, hitY, sparkCount, color);
      }
    }

    function updateVFX(dt) {
      for (let i = vfxParticles.length - 1; i >= 0; i--) {
        const p = vfxParticles[i];
        p.life += dt;
        const t = p.life / p.maxLife;

        if (t >= 1) {
          battleScene.remove(p.mesh);
          p.mesh.geometry !== _slashGeo && p.mesh.geometry !== _sparkGeo && p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          vfxParticles.splice(i, 1);
          continue;
        }

        p.mesh.material.opacity = 1 - t;

        if (p.type === 'slash') {
          p.mesh.scale.setScalar(1 + t * 0.5);
          p.mesh.rotation.z += (dt / 1000) * 2;
        } else if (p.type === 'spark') {
          p.mesh.position.x += p.vx * dt;
          p.mesh.position.y += p.vy * dt;
          p.vy -= p.gravity * dt;
          p.mesh.scale.setScalar(1 - t * 0.7);
        }
      }
    }

    function clearVFX() {
      for (const p of vfxParticles) {
        battleScene.remove(p.mesh);
        p.mesh.material.dispose();
      }
      vfxParticles = [];
    }

    // ===== SCREEN SHAKE =====
    function triggerScreenShake(intensity) {
      screenShake = Math.max(screenShake, intensity);
    }

    function applyScreenShake(dt) {
      if (!battleCamera) return;
      if (screenShake > 0.001) {
        const ox = (Math.random() - 0.5) * screenShake * 0.4;
        const oy = (Math.random() - 0.5) * screenShake * 0.3;
        battleCamera.position.set(CAM_BASE.x + ox, CAM_BASE.y + oy, CAM_BASE.z);
        screenShake *= Math.pow(0.92, dt / 16); // exponential decay
      } else {
        screenShake = 0;
        battleCamera.position.copy(CAM_BASE);
      }
    }

    // ===== LOADING =====
    const loader = new GLTFLoader();
    const loadingBar = document.getElementById('loading-bar');
    const loadingText = document.getElementById('loading-text');

    // Try to load individual character GLBs first (pre-split, origin-centered).
    // Falls back to the monolithic scene.gltf if characters/ directory is unavailable.
    async function loadAllCharacters() {
      let loaded = 0;
      const total = CHARACTERS.length;
      const hasGLBs = CHARACTERS[0].glb;

      if (hasGLBs) {
        // Parallel-load individual GLBs
        const promises = CHARACTERS.map(c => new Promise((resolve) => {
          loader.load(c.glb,
            (gltf) => {
              characterGLBScenes[c.id] = gltf.scene;
              // Also store any embedded animations
              if (gltf.animations && gltf.animations.length > 0) {
                characterGLBScenes[c.id]._animations = gltf.animations;
              }
              loaded++;
              const pct = (loaded / total * 100).toFixed(0);
              loadingBar.style.width = pct + '%';
              loadingText.textContent = `Loading ${c.name}... (${loaded}/${total})`;
              resolve(true);
            },
            undefined,
            () => {
              console.warn(`GLB not found: ${c.glb}, will fall back to scene.gltf`);
              loaded++;
              resolve(false);
            }
          );
        }));

        const results = await Promise.all(promises);
        const glbCount = results.filter(Boolean).length;

        // If at least some loaded, we're good
        if (glbCount > 0) {
          loadingBar.style.width = '100%';
          loadingText.textContent = `${glbCount} warriors assembled!`;
          finishLoading();
          return;
        }
      }

      // Fallback: load monolithic scene.gltf
      loadingText.textContent = 'Loading warriors...';
      loader.load('./scene.gltf',
        (gltf) => {
          gltfScene = gltf.scene;
          loadingBar.style.width = '100%';
          loadingText.textContent = 'Warriors assembled!';
          parseCharactersFromScene();
          finishLoading();
        },
        (progress) => {
          if (progress.total > 0) {
            const pct = (progress.loaded / progress.total * 100).toFixed(0);
            loadingBar.style.width = pct + '%';
            loadingText.textContent = `Loading warriors... ${pct}%`;
          }
        },
        (error) => {
          loadingText.textContent = 'Error loading scene: ' + error.message;
          console.error(error);
        }
      );
    }

    function finishLoading() {
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('title-screen').classList.add('active');
      }, 600);
    }

    // Parse characters from monolithic scene.gltf (legacy fallback)
    function parseCharactersFromScene() {
      gltfScene.updateMatrixWorld(true);
      gltfScene.traverse((child) => {
        if (child.isMesh) {
          const name = child.name || '';
          for (const c of CHARACTERS) {
            if (name.includes(c.meshPrefix)) {
              if (!characterGroups[c.id]) characterGroups[c.id] = [];
              characterGroups[c.id].push(child);
              break;
            }
          }
        }
      });
    }

    // Kick off loading
    loadAllCharacters();

    // ===== PREVIEW RENDERER =====
    function initPreviewRenderer() {
      const canvas = document.getElementById('preview-canvas');
      previewRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      previewRenderer.setPixelRatio(window.devicePixelRatio);
      previewRenderer.setSize(canvas.parentElement.clientWidth, canvas.parentElement.clientHeight);
      previewRenderer.toneMapping = THREE.ACESFilmicToneMapping;
      previewRenderer.toneMappingExposure = 1.2;

      previewScene = new THREE.Scene();
      previewScene.background = new THREE.Color(0x0e111b);

      previewCamera = new THREE.PerspectiveCamera(45,
        canvas.parentElement.clientWidth / canvas.parentElement.clientHeight, 0.1, 100);
      previewCamera.position.set(0, 0.8, 2.5);

      previewControls = new OrbitControls(previewCamera, canvas);
      previewControls.target.set(0, 0.7, 0);
      previewControls.enablePan = false;
      previewControls.minDistance = 1;
      previewControls.maxDistance = 5;
      previewControls.autoRotate = true;
      previewControls.autoRotateSpeed = 2;
      previewControls.update();

      // Lighting
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      previewScene.add(ambient);
      const dirLight = new THREE.DirectionalLight(0xeeb72b, 1.5);
      dirLight.position.set(3, 5, 3);
      previewScene.add(dirLight);
      const fillLight = new THREE.DirectionalLight(0x3080ff, 0.5);
      fillLight.position.set(-3, 3, -2);
      previewScene.add(fillLight);
      const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
      rimLight.position.set(0, 2, -4);
      previewScene.add(rimLight);

      // Ground circle
      const groundGeo = new THREE.CircleGeometry(1.5, 64);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x1d2130, metalness: 0.3, roughness: 0.8
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.01;
      previewScene.add(ground);

      // Gold ring
      const ringGeo = new THREE.RingGeometry(1.45, 1.55, 64);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x7a601f, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.001;
      previewScene.add(ring);

      animatePreview();
    }

    function animatePreview() {
      animFrame = requestAnimationFrame(animatePreview);
      if (previewControls) previewControls.update();
      if (previewRenderer && previewScene && previewCamera) {
        previewRenderer.render(previewScene, previewCamera);
      }
    }

    // Build a group from either individual GLB or legacy monolithic scene meshes.
    // Returns a THREE.Group scaled to `targetHeight` with feet at Y=0.
    function cloneCharacterModel(charId, targetHeight = 1.6) {
      const group = new THREE.Group();

      if (characterGLBScenes[charId]) {
        // --- Individual GLB: already origin-centered, feet at Y=0 ---
        const src = characterGLBScenes[charId];
        src.traverse(child => {
          if (child.isMesh) {
            const cloned = child.clone(true);
            cloned.geometry = child.geometry.clone();
            group.add(cloned);
          }
        });
      } else if (characterGroups[charId]?.length > 0) {
        // --- Legacy fallback: bake world transforms from monolithic GLTF ---
        for (const mesh of characterGroups[charId]) {
          const cloned = mesh.clone(true);
          cloned.geometry = mesh.geometry.clone();
          cloned.geometry.applyMatrix4(mesh.matrixWorld);
          cloned.position.set(0, 0, 0);
          cloned.quaternion.identity();
          cloned.scale.set(1, 1, 1);
          group.add(cloned);
        }
      } else {
        return group; // empty — character not loaded
      }

      // Normalize: scale to target height, center X/Z, feet at Y=0
      const box = new THREE.Box3().setFromObject(group);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = targetHeight / maxDim;
      group.scale.setScalar(scale);
      group.position.set(
        -center.x * scale,
        -box.min.y * scale,
        -center.z * scale
      );
      return group;
    }

    function showCharacterInPreview(charId) {
      if (!previewScene) return;

      // Remove old preview
      if (previewChar) {
        previewScene.remove(previewChar);
        previewChar = null;
      }

      if (!characterGLBScenes[charId] && (!characterGroups[charId] || characterGroups[charId].length === 0)) return;

      const char = CHARACTERS.find(c => c.id === charId);
      const group = cloneCharacterModel(charId, 1.6);

      previewScene.add(group);
      previewChar = group;

      document.getElementById('preview-name').textContent = char.name;
      document.getElementById('preview-class').textContent = char.class.toUpperCase();
    }

    // ===== CHAR SELECT UI =====
    function buildCharList() {
      const list = document.getElementById('char-list');
      list.innerHTML = '';
      for (const c of CHARACTERS) {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.dataset.id = c.id;
        card.innerHTML = `
          <div class="char-icon" style="border-color:${c.color}">${c.icon}</div>
          <div class="char-info">
            <h3>${c.name}</h3>
            <div class="char-class">${c.class}</div>
            <div class="char-stats">
              <span class="stat-pip">ATK ${c.atk}</span>
              <span class="stat-pip">DEF ${c.def}</span>
              <span class="stat-pip">SPD ${c.spd}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => onCharClick(c.id));
        card.addEventListener('mouseenter', () => showCharacterInPreview(c.id));
        list.appendChild(card);
      }
    }

    function onCharClick(charId) {
      if (selectingPlayer === 1) {
        selectedP1 = charId;
        document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
        document.querySelector(`.char-card[data-id="${charId}"]`).classList.add('selected');
        selectingPlayer = 2;
        document.getElementById('select-phase').textContent = 'SELECT PLAYER 2 WARRIOR';
      } else {
        if (charId === selectedP1) return; // can't pick same
        selectedP2 = charId;
        document.querySelectorAll('.char-card.selected-p2').forEach(c => c.classList.remove('selected-p2'));
        document.querySelector(`.char-card[data-id="${charId}"]`).classList.add('selected-p2');
        document.getElementById('start-fight-btn').disabled = false;
      }
    }

    // ===== BATTLE SYSTEM =====
    function initBattle() {
      const canvas = document.getElementById('battle-canvas');
      battleRenderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      battleRenderer.setPixelRatio(window.devicePixelRatio);
      battleRenderer.setSize(window.innerWidth, window.innerHeight);
      battleRenderer.toneMapping = THREE.ACESFilmicToneMapping;
      battleRenderer.toneMappingExposure = 1.0;

      battleScene = new THREE.Scene();
      battleScene.background = new THREE.Color(0x0a0d15);
      battleScene.fog = new THREE.FogExp2(0x0a0d15, 0.15);

      battleCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
      battleCamera.position.set(0, 2, 6);
      battleCamera.lookAt(0, 0.8, 0);

      // Lighting
      const ambient = new THREE.AmbientLight(0xffffff, 0.3);
      battleScene.add(ambient);

      const spotP1 = new THREE.SpotLight(0xeeb72b, 3, 10, Math.PI / 6);
      spotP1.position.set(-3, 5, 2);
      spotP1.target.position.set(-1.5, 0, 0);
      battleScene.add(spotP1);
      battleScene.add(spotP1.target);

      const spotP2 = new THREE.SpotLight(0x3080ff, 3, 10, Math.PI / 6);
      spotP2.position.set(3, 5, 2);
      spotP2.target.position.set(1.5, 0, 0);
      battleScene.add(spotP2);
      battleScene.add(spotP2.target);

      const backLight = new THREE.DirectionalLight(0x6644aa, 0.4);
      backLight.position.set(0, 3, -5);
      battleScene.add(backLight);

      // Arena floor
      const floorGeo = new THREE.PlaneGeometry(12, 8, 20, 20);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x161a27, metalness: 0.5, roughness: 0.6
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      battleScene.add(floor);

      // Arena border ring
      const arenaRing = new THREE.RingGeometry(4.5, 4.7, 64);
      const arenaMat = new THREE.MeshBasicMaterial({ color: 0x7a601f, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(arenaRing, arenaMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.005;
      battleScene.add(ring);

      // Inner arena circle
      const innerRing = new THREE.RingGeometry(2.8, 2.85, 64);
      const innerMat = new THREE.MeshBasicMaterial({ color: 0x3a2f10, side: THREE.DoubleSide });
      const inner = new THREE.Mesh(innerRing, innerMat);
      inner.rotation.x = -Math.PI / 2;
      inner.position.y = 0.003;
      battleScene.add(inner);

      // Background pillars
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        const pillarGeo = new THREE.CylinderGeometry(0.15, 0.2, 4, 8);
        const pillarMat = new THREE.MeshStandardMaterial({
          color: 0x1d2130, metalness: 0.6, roughness: 0.4
        });
        const pillar = new THREE.Mesh(pillarGeo, pillarMat);
        pillar.position.set(Math.cos(angle) * 5.5, 2, Math.sin(angle) * 4);
        battleScene.add(pillar);

        // Gold cap
        const capGeo = new THREE.CylinderGeometry(0.22, 0.15, 0.15, 8);
        const capMat = new THREE.MeshStandardMaterial({ color: 0xeeb72b, metalness: 0.7, roughness: 0.3 });
        const cap = new THREE.Mesh(capGeo, capMat);
        cap.position.set(Math.cos(angle) * 5.5, 4.07, Math.sin(angle) * 4);
        battleScene.add(cap);
      }

      // Place fighters
      const p1Char = CHARACTERS.find(c => c.id === selectedP1);
      const p2Char = CHARACTERS.find(c => c.id === selectedP2);

      const p1Group = buildFighterGroup(selectedP1);
      const p2Group = buildFighterGroup(selectedP2);

      // Only override X for arena placement — preserve the Y offset
      // computed by buildFighterGroup that puts feet on the ground.
      p1Group.position.x = -1.8;
      p2Group.position.x = 1.8;
      p2Group.rotation.y = Math.PI;

      battleScene.add(p1Group);
      battleScene.add(p2Group);

      // HUD
      document.getElementById('p1-hud-name').textContent = p1Char.name;
      document.getElementById('p2-hud-name').textContent = p2Char.name;

      gameState = {
        p1: { group: p1Group, char: p1Char, hp: 100, maxHp: 100, x: -1.8, combo: 0, lastHit: 0, blocking: false, cooldown: 0, stunned: 0,
               bounds: characterBounds[selectedP1], baseY: p1Group.position.y },
        p2: { group: p2Group, char: p2Char, hp: 100, maxHp: 100, x: 1.8, combo: 0, lastHit: 0, blocking: false, cooldown: 0, stunned: 0, ai: true,
               bounds: characterBounds[selectedP2], baseY: p2Group.position.y },
        timer: 99,
        round: 1,
        lastTimerTick: Date.now(),
        paused: false,
      };

      updateHealthBars();

      // Initialize combat state machine + animation controller for both fighters
      initializeFighterAnimationController(gameState.p1);
      initializeFighterAnimationController(gameState.p2);
    }

    function buildFighterGroup(charId) {
      const group = cloneCharacterModel(charId, 1.6);

      // Measure final scaled dimensions for colliders.
      group.updateMatrixWorld(true);
      const finalBox = new THREE.Box3().setFromObject(group);
      const finalSize = finalBox.getSize(new THREE.Vector3());
      characterBounds[charId] = {
        hw: finalSize.x / 2,   // half-width
        hh: finalSize.y / 2,   // half-height
        hd: finalSize.z / 2,   // half-depth
      };

      return group;
    }

    function updateHealthBars() {
      if (!gameState) return;
      const p1Pct = Math.max(0, gameState.p1.hp / gameState.p1.maxHp * 100);
      const p2Pct = Math.max(0, gameState.p2.hp / gameState.p2.maxHp * 100);
      document.getElementById('p1-health').style.width = p1Pct + '%';
      document.getElementById('p2-health').style.width = p2Pct + '%';
      document.getElementById('p1-health-text').textContent = Math.ceil(p1Pct) + '%';
      document.getElementById('p2-health-text').textContent = Math.ceil(p2Pct) + '%';
      document.getElementById('hud-timer').textContent = Math.ceil(gameState.timer);
    }

    function showDamage(amount, isP1Target) {
      const el = document.createElement('div');
      el.className = 'damage-num';
      el.textContent = '-' + amount;
      el.style.color = amount >= 15 ? '#ff4444' : amount >= 10 ? '#ffaa33' : '#eeb72b';
      el.style.fontSize = amount >= 15 ? '2.5rem' : amount >= 10 ? '2rem' : '1.5rem';
      el.style.left = isP1Target ? '25%' : '70%';
      el.style.top = '30%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function showCombo(player, count) {
      const el = document.getElementById('combo-' + player);
      if (count >= 2) {
        el.textContent = count + ' HIT COMBO!';
        el.classList.add('active');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('active'), 1500);
      }
    }

    // ===== ATTACK LOGIC (Hitbox/Hurtbox) =====
    // Called by the combat state machine during active frames (once per attack).
    // Timing is governed entirely by ATTACK_FRAME_DATA — no cooldown set here.
    function performAttack(attacker, defender, attackType) {
      // --- Hitbox range check: attack must physically reach defender ---
      const attackBox = getAttackHitbox(attacker, attackType);
      const defenderBody = getBodyCollider(defender);
      if (!attackBox || !attackBox.intersectsBox(defenderBody)) {
        // Whiff — state machine still plays recovery, no extra cooldown needed
        if (debugColliders) {
          const helper = new THREE.Box3Helper(attackBox, 0xff0000);
          battleScene.add(helper);
          debugHelpers.push(helper);
          setTimeout(() => { battleScene.remove(helper); }, 150);
        }
        return;
      }

      // --- Hit confirmed: determine which zone was struck ---
      const hurtboxes = getHurtboxes(defender);
      let hitZone = 'mid'; // default
      if (attackBox.intersectsBox(hurtboxes.upper)) hitZone = 'upper';
      else if (attackBox.intersectsBox(hurtboxes.lower)) hitZone = 'lower';

      // Flash green hitbox in debug mode
      if (debugColliders) {
        const helper = new THREE.Box3Helper(attackBox, 0x00ff00);
        battleScene.add(helper);
        debugHelpers.push(helper);
        setTimeout(() => { battleScene.remove(helper); }, 200);
      }

      const now = Date.now();
      let baseDmg;

      switch (attackType) {
        case 'punch':
          baseDmg = 3 + Math.floor(attacker.char.atk * 0.5);
          break;
        case 'kick':
          baseDmg = 5 + Math.floor(attacker.char.atk * 0.7);
          break;
        case 'special':
          baseDmg = 8 + attacker.char.atk;
          break;
        default: return;
      }

      // Zone damage modifier: headshots hurt more, leg hits less
      if (hitZone === 'upper') baseDmg = Math.floor(baseDmg * 1.25);
      else if (hitZone === 'lower') baseDmg = Math.floor(baseDmg * 0.8);

      // Defense reduction
      let finalDmg = baseDmg;
      if (defender.blocking) {
        finalDmg = Math.max(1, Math.floor(baseDmg * 0.2));
        if (attackType === 'special') attacker.stunned = 600;
      } else {
        finalDmg = Math.max(1, baseDmg - Math.floor(defender.char.def * 0.3));
      }

      // Random variance
      finalDmg += Math.floor(Math.random() * 3) - 1;
      finalDmg = Math.max(1, finalDmg);

      // Combo tracking
      if (now - defender.lastHit < 1500) {
        attacker.combo++;
        if (attacker.combo >= 3) finalDmg = Math.floor(finalDmg * 1.3);
      } else {
        attacker.combo = 1;
      }
      defender.lastHit = now;

      defender.hp = Math.max(0, defender.hp - finalDmg);

      // Visual feedback — push into hit_react or knockdown via state machine
      if (defender.combat) {
        if (defender.hp <= 0) {
          setFighterState(defender, FIGHTER_STATES.KO, { force: true });
        } else if (attackType === 'special' && !defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.KNOCKDOWN, { force: true });
        } else if (!defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.HIT_REACT, { force: true });
        }
      }

      // VFX + screen shake
      spawnAttackVFX(attacker, defender, attackType, defender.blocking);
      const shakeAmount = defender.blocking ? 0.05 : (attackType === 'special' ? 0.25 : attackType === 'kick' ? 0.12 : 0.06);
      triggerScreenShake(shakeAmount);

      const isP1Target = defender === gameState.p1;
      showDamage(finalDmg, isP1Target);
      showCombo(isP1Target ? 'p2' : 'p1', attacker.combo);

      // Knockback (scaled by attack type)
      if (!defender.blocking) {
        const knockback = attackType === 'special' ? 0.35 : attackType === 'kick' ? 0.2 : 0.12;
        const dir = defender.x > attacker.x ? knockback : -knockback;
        defender.x = Math.max(-3.5, Math.min(3.5, defender.x + dir));
        defender.group.position.x = defender.x;
      }

      updateHealthBars();

      // Check KO
      if (defender.hp <= 0) {
        endRound(attacker === gameState.p1 ? 'p1' : 'p2');
      }
    }

    // ===== AI =====
    function updateAI(dt) {
      if (!gameState || gameState.paused) return;
      const ai = gameState.p2;
      const player = gameState.p1;
      if (!ai.ai || ai.hp <= 0 || player.hp <= 0) return;

      ai.cooldown = Math.max(0, ai.cooldown - dt);
      ai.stunned = Math.max(0, ai.stunned - dt);

      const dist = Math.abs(ai.x - player.x);

      // AI movement intent
      let aiMoveIntent = 0;
      const aiLocked = isAttackState(ai.combat?.state)
        || ai.combat?.state === FIGHTER_STATES.HIT_REACT
        || ai.combat?.state === FIGHTER_STATES.KNOCKDOWN
        || ai.combat?.state === FIGHTER_STATES.KO;
      if (!aiLocked) {
        const moveSpeed = 1.5 * (ai.char.spd / 10);
        if (dist > 1.2) {
          aiMoveIntent = player.x > ai.x ? 1 : -1;
          ai.x += aiMoveIntent * moveSpeed * dt / 1000;
        } else if (dist < 0.6) {
          aiMoveIntent = player.x > ai.x ? -1 : 1;
          ai.x += aiMoveIntent * moveSpeed * 0.5 * dt / 1000;
        }
        ai.x = Math.max(-3.5, Math.min(3.5, ai.x));
        ai.group.position.x = ai.x;
      }

      // Face player
      ai.group.rotation.y = player.x < ai.x ? 0 : Math.PI;

      // AI decide to block or attack
      let aiBlock = false;
      if (dist < 1.5 && ai.cooldown <= 0 && ai.stunned <= 0 && !aiLocked) {
        const roll = Math.random();
        if (roll < 0.15) {
          aiBlock = true;
        } else if (roll < 0.5) {
          queueAttack(ai, 'punch');
        } else if (roll < 0.8) {
          queueAttack(ai, 'kick');
        } else {
          queueAttack(ai, 'special');
        }
      }

      // Update AI state machine
      updateFighterStateMachine(ai, player, dt, aiMoveIntent, aiBlock);
    }

    // ===== ROUND LOGIC =====
    function endRound(winner) {
      gameState.paused = true;
      battleActive = false;

      // Set winner/loser animation states
      const winFighter = winner === 'p1' ? gameState.p1 : gameState.p2;
      const loseFighter = winner === 'p1' ? gameState.p2 : gameState.p1;
      if (winFighter.combat) setFighterState(winFighter, FIGHTER_STATES.VICTORY, { force: true });
      if (loseFighter.combat) setFighterState(loseFighter, FIGHTER_STATES.KO, { force: true });

      setTimeout(() => {
        const overlay = document.getElementById('ko-overlay');
        const winnerChar = winner === 'p1' ? gameState.p1.char : gameState.p2.char;
        document.getElementById('winner-text').textContent = winnerChar.name + ' WINS!';
        overlay.classList.add('active');
      }, 500);
    }

    function showRoundStart() {
      return new Promise(resolve => {
        const overlay = document.getElementById('round-overlay');
        const text = document.getElementById('round-text');
        text.textContent = 'Round ' + gameState.round;
        overlay.classList.add('active');
        setTimeout(() => {
          text.textContent = 'FIGHT!';
          text.style.color = '#d74242';
          setTimeout(() => {
            overlay.classList.remove('active');
            text.style.color = '';
            resolve();
          }, 800);
        }, 1200);
      });
    }

    // ===== BATTLE LOOP =====
    let lastFrameTime = 0;
    function battleLoop(timestamp) {
      // Proper delta time instead of hardcoded 16ms
      const dt = lastFrameTime ? Math.min(timestamp - lastFrameTime, 50) : 16;
      lastFrameTime = timestamp;

      // Poll gamepad every frame
      pollGamepad();

      // Gamepad rebind: if settings are open and we're waiting for a GP button
      if (settingsOpen && rebindTarget && rebindTarget.type === 'gp') {
        const btn = gpAnyButtonDown();
        if (btn >= 0) finishRebind('gp', rebindTarget.action, btn);
      }

      // Gamepad menu/debug in battle
      if (gpActionDown('menu') && battleActive && gameState && !gameState.paused) backToSelect();
      if (gpActionDown('debug')) {
        debugColliders = !debugColliders;
        if (!debugColliders) clearDebugHelpers();
        document.getElementById('debug-state-overlay').classList.toggle('active', debugColliders);
      }

      if (!battleActive && !gameState?.paused) {
        if (battleRenderer) battleRenderer.render(battleScene, battleCamera);
        requestAnimationFrame(battleLoop);
        return;
      }

      const now = Date.now();

      if (gameState && !gameState.paused) {
        // Timer
        if (now - gameState.lastTimerTick >= 1000) {
          gameState.timer = Math.max(0, gameState.timer - 1);
          gameState.lastTimerTick = now;
          if (gameState.timer <= 0) {
            endRound(gameState.p1.hp >= gameState.p2.hp ? 'p1' : 'p2');
          }
        }

        // Cooldowns
        gameState.p1.cooldown = Math.max(0, gameState.p1.cooldown - dt);
        gameState.p1.stunned = Math.max(0, gameState.p1.stunned - dt);

        // Player input — compute move intent (keyboard + gamepad)
        const p1 = gameState.p1;
        const moveSpeed = 2.5 * (p1.char.spd / 10);
        let p1MoveIntent = 0;
        if (keys[kbBinds.move_left] || keys['ArrowLeft']) p1MoveIntent -= 1;
        if (keys[kbBinds.move_right] || keys['ArrowRight']) p1MoveIntent += 1;
        // Gamepad stick/dpad
        const gpX = gpMoveX();
        if (Math.abs(gpX) > 0.01) p1MoveIntent = gpX;

        // Only allow movement in non-locked states
        const p1Locked = isAttackState(p1.combat?.state)
          || p1.combat?.state === FIGHTER_STATES.HIT_REACT
          || p1.combat?.state === FIGHTER_STATES.KNOCKDOWN
          || p1.combat?.state === FIGHTER_STATES.KO;
        if (!p1Locked && p1MoveIntent !== 0) {
          p1.x += p1MoveIntent * moveSpeed * dt / 1000;
          p1.x = Math.max(-3.5, Math.min(3.5, p1.x));
        }
        p1.group.position.x = p1.x;

        // Face opponent
        p1.group.rotation.y = gameState.p2.x > p1.x ? 0 : Math.PI;

        // Gamepad attack buttons (checked once per frame after pollGamepad)
        if (gpActionDown('punch')) queueAttack(p1, 'punch');
        if (gpActionDown('kick')) queueAttack(p1, 'kick');
        if (gpActionDown('special')) queueAttack(p1, 'special');

        // Block: keyboard OR gamepad held
        const blockHeld = !!keys[kbBinds.block] || gpActionHeld('block');

        // Update state machines (state machine drives blocking, not raw key)
        updateFighterStateMachine(p1, gameState.p2, dt, p1MoveIntent, blockHeld);

        // AI
        updateAI(dt);

        // --- COLLIDER SYSTEM: body collision response ---
        resolveBodyCollision(gameState.p1, gameState.p2);

        // --- Debug collider visualization ---
        if (debugColliders) drawDebugColliders();

        updateHealthBars();
      }

      // Always update animations + VFX + shake (even when paused — KO / victory still animate)
      if (gameState) {
        updateProceduralAnimation(gameState.p1, dt);
        updateProceduralAnimation(gameState.p2, dt);
        if (gameState.p1.animation?.mixer) gameState.p1.animation.mixer.update(dt / 1000);
        if (gameState.p2.animation?.mixer) gameState.p2.animation.mixer.update(dt / 1000);
        updateVFX(dt);
        applyScreenShake(dt);

        // Debug state overlay
        if (debugColliders) {
          document.getElementById('ds-p1').textContent = gameState.p1.combat?.state || '-';
          document.getElementById('ds-p2').textContent = gameState.p2.combat?.state || '-';
        }
      }

      if (battleRenderer && battleScene && battleCamera) {
        battleRenderer.render(battleScene, battleCamera);
      }
      requestAnimationFrame(battleLoop);
    }

    // ===== INPUT =====
    document.addEventListener('keydown', (e) => {
      // Skip if rebind is capturing (handled in capture-phase listener above)
      if (settingsOpen && rebindTarget && rebindTarget.type === 'kb') return;

      keys[e.code] = true;

      // Toggle debug colliders + state overlay
      if (e.code === kbBinds.debug) {
        debugColliders = !debugColliders;
        if (!debugColliders) clearDebugHelpers();
        document.getElementById('debug-state-overlay').classList.toggle('active', debugColliders);
      }

      if (!battleActive || !gameState || gameState.paused) return;
      const p1 = gameState.p1;

      if (e.code === kbBinds.punch) queueAttack(p1, 'punch');
      if (e.code === kbBinds.kick) queueAttack(p1, 'kick');
      if (e.code === kbBinds.special) queueAttack(p1, 'special');
      if (e.code === kbBinds.menu) backToSelect();
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // ===== NAVIGATION =====
    window.showCharSelect = function() {
      document.getElementById('title-screen').classList.remove('active');
      document.getElementById('char-select').classList.add('active');
      selectedP1 = null; selectedP2 = null;
      selectingPlayer = 1;
      document.getElementById('select-phase').textContent = 'SELECT PLAYER 1 WARRIOR';
      document.getElementById('start-fight-btn').disabled = true;
      buildCharList();
      if (!previewRenderer) initPreviewRenderer();
      // Show first character
      if (CHARACTERS.length > 0) showCharacterInPreview(CHARACTERS[0].id);
      updateControlsHUD();
    };

    window.showViewer = function() {
      // Same as char select but without fight button
      window.showCharSelect();
    };

    window.backToTitle = function() {
      document.getElementById('char-select').classList.remove('active');
      document.getElementById('battle-arena').classList.remove('active');
      document.getElementById('ko-overlay').classList.remove('active');
      document.getElementById('round-overlay').classList.remove('active');
      document.getElementById('title-screen').classList.add('active');
      battleActive = false;
      if (gameState) gameState.paused = true;
    };

    window.backToSelect = function() {
      document.getElementById('battle-arena').classList.remove('active');
      document.getElementById('ko-overlay').classList.remove('active');
      document.getElementById('round-overlay').classList.remove('active');
      battleActive = false;
      if (gameState) gameState.paused = true;
      window.showCharSelect();
    };

    window.startFight = async function() {
      if (!selectedP1 || !selectedP2) return;
      document.getElementById('char-select').classList.remove('active');
      document.getElementById('battle-arena').classList.add('active');

      initBattle();
      battleLoop();

      await showRoundStart();
      battleActive = true;
      gameState.paused = false;
      gameState.lastTimerTick = Date.now();
    };

    // ===== RESIZE =====
    window.addEventListener('resize', () => {
      if (previewRenderer && document.getElementById('char-select').classList.contains('active')) {
        const parent = document.getElementById('preview-canvas').parentElement;
        previewRenderer.setSize(parent.clientWidth, parent.clientHeight);
        previewCamera.aspect = parent.clientWidth / parent.clientHeight;
        previewCamera.updateProjectionMatrix();
      }
      if (battleRenderer && document.getElementById('battle-arena').classList.contains('active')) {
        battleRenderer.setSize(window.innerWidth, window.innerHeight);
        battleCamera.aspect = window.innerWidth / window.innerHeight;
        battleCamera.updateProjectionMatrix();
      }
    });
  </script>
</body>
</html>
