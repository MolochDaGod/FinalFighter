<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grudge Warlords: Final Fighter</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=MedievalSharp&family=IM+Fell+English+SC&family=Uncial+Antiqua&family=Spectral+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #eeb72b;
      --gold-light: #f5d789;
      --gold-dark: #7a601f;
      --gold-mid: #cca133;
      --bg-darkest: #0e111b;
      --bg-dark: #121621;
      --bg-mid: #1d2130;
      --bg-accent: #262d40;
      --fg: #ede9de;
      --fg-muted: #a8a18a;
      --red: #981b1b;
      --red-bright: #d74242;
      --green-bright: #00c758;
      --blue-bright: #3080ff;
      --purple: #ac4bff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Spectral SC', 'IM Fell English SC', serif;
      background: var(--bg-darkest);
      color: var(--fg);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }

    /* ===== LOADING SCREEN ===== */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-darkest);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3rem; color: var(--gold);
      text-shadow: 0 0 30px rgba(238,183,43,0.4);
      letter-spacing: 0.15em;
    }
    #loading-screen .subtitle {
      font-family: 'MedievalSharp', cursive;
      color: var(--fg-muted); font-size: 1.2rem;
      margin-top: 0.5rem; letter-spacing: 0.3em;
    }
    .loading-bar-container {
      width: 400px; height: 8px; background: var(--bg-mid);
      border: 1px solid var(--gold-dark); border-radius: 4px;
      margin-top: 2rem; overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%; border-radius: 4px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      transition: width 0.3s;
    }
    .loading-text {
      font-family: 'IM Fell English SC', serif;
      color: var(--fg-muted); font-size: 0.85rem; margin-top: 1rem;
    }

    /* ===== TITLE / MENU SCREEN ===== */
    #title-screen {
      position: fixed; inset: 0; z-index: 900;
      background: radial-gradient(ellipse at center, #1a1f2e 0%, var(--bg-darkest) 70%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #title-screen.active { display: flex; }
    .title-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 4rem; font-weight: 900; color: var(--gold);
      text-shadow: 0 0 40px rgba(238,183,43,0.5), 0 4px 8px rgba(0,0,0,0.6);
      letter-spacing: 0.1em; text-align: center;
    }
    .title-sub {
      font-family: 'MedievalSharp', cursive;
      font-size: 1.8rem; color: var(--gold-mid);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
      margin-top: 0.5rem; letter-spacing: 0.3em;
    }
    .studio-badge {
      font-family: 'Uncial Antiqua', cursive;
      color: var(--fg-muted); font-size: 0.9rem;
      letter-spacing: 0.2em; margin-top: 3rem;
      border: 1px solid var(--gold-dark); padding: 0.5rem 1.5rem;
      border-radius: 2px; background: rgba(122,96,31,0.1);
    }
    .menu-btn {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem; color: var(--gold);
      background: linear-gradient(180deg, rgba(238,183,43,0.1), rgba(122,96,31,0.2));
      border: 2px solid var(--gold-dark);
      padding: 1rem 3rem; margin-top: 1.5rem;
      cursor: pointer; letter-spacing: 0.15em;
      transition: all 0.3s; min-width: 300px; text-align: center;
    }
    .menu-btn:hover {
      background: linear-gradient(180deg, rgba(238,183,43,0.25), rgba(122,96,31,0.35));
      border-color: var(--gold); color: var(--gold-light);
      box-shadow: 0 0 20px rgba(238,183,43,0.2);
      transform: scale(1.03);
    }

    /* ===== CHARACTER SELECT ===== */
    #char-select {
      position: fixed; inset: 0; z-index: 800;
      background: var(--bg-darkest);
      display: none; flex-direction: column;
    }
    #char-select.active { display: flex; }
    .select-header {
      text-align: center; padding: 1.5rem;
      border-bottom: 1px solid var(--gold-dark);
      background: linear-gradient(180deg, var(--bg-dark), var(--bg-darkest));
    }
    .select-header h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
    }
    .select-header .player-label {
      font-family: 'MedievalSharp', cursive;
      font-size: 1rem; color: var(--fg-muted);
      letter-spacing: 0.2em; margin-top: 0.3rem;
    }
    .select-body {
      flex: 1; display: flex; overflow: hidden;
    }
    .select-sidebar {
      width: 360px; overflow-y: auto; padding: 1rem;
      border-right: 1px solid var(--gold-dark);
      background: rgba(18,22,33,0.9);
    }
    .select-sidebar::-webkit-scrollbar { width: 6px; }
    .select-sidebar::-webkit-scrollbar-track { background: var(--bg-darkest); }
    .select-sidebar::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
    .char-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.8rem 1rem; margin-bottom: 0.5rem;
      border: 1px solid var(--bg-accent);
      background: var(--bg-mid); cursor: pointer;
      transition: all 0.2s; border-radius: 4px;
    }
    .char-card:hover, .char-card.selected {
      border-color: var(--gold); background: rgba(238,183,43,0.08);
      box-shadow: 0 0 12px rgba(238,183,43,0.15);
    }
    .char-card.selected-p2 {
      border-color: var(--blue-bright); background: rgba(48,128,255,0.08);
      box-shadow: 0 0 12px rgba(48,128,255,0.15);
    }
    .char-card .char-icon {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid var(--gold-dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel Decorative', serif; font-size: 1.2rem;
      color: var(--gold); background: var(--bg-accent);
    }
    .char-card .char-info h3 {
      font-family: 'Cinzel', serif; font-size: 1rem; color: var(--fg);
    }
    .char-card .char-info .char-class {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.8rem; color: var(--fg-muted);
    }
    .char-card .char-info .char-stats {
      display: flex; gap: 0.8rem; margin-top: 0.3rem;
    }
    .stat-pip {
      font-size: 0.7rem; color: var(--gold-mid);
      font-family: 'Spectral SC', serif;
    }
    .select-preview {
      flex: 1; position: relative;
    }
    #preview-canvas {
      width: 100%; height: 100%;
    }
    .preview-name {
      position: absolute; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.5rem; color: var(--gold);
      text-shadow: 0 0 30px rgba(238,183,43,0.4), 0 2px 4px rgba(0,0,0,0.8);
      pointer-events: none; white-space: nowrap;
    }
    .preview-class {
      position: absolute; bottom: 70px; left: 50%;
      transform: translateX(-50%);
      font-family: 'MedievalSharp', cursive;
      font-size: 1.1rem; color: var(--fg-muted);
      letter-spacing: 0.3em; pointer-events: none;
    }
    .select-footer {
      display: flex; justify-content: space-between;
      align-items: center; padding: 1rem 2rem;
      border-top: 1px solid var(--gold-dark);
      background: var(--bg-dark);
    }
    .select-footer .back-btn {
      font-family: 'Cinzel', serif; color: var(--fg-muted);
      background: none; border: 1px solid var(--bg-accent);
      padding: 0.6rem 1.5rem; cursor: pointer;
      transition: all 0.2s; font-size: 0.9rem;
    }
    .select-footer .back-btn:hover {
      color: var(--fg); border-color: var(--fg-muted);
    }
    .fight-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.3rem; color: var(--bg-darkest);
      background: linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-dark));
      border: 2px solid var(--gold);
      padding: 0.8rem 3rem; cursor: pointer;
      letter-spacing: 0.15em;
      transition: all 0.3s; text-transform: uppercase;
    }
    .fight-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(238,183,43,0.4);
    }
    .fight-btn:disabled {
      opacity: 0.4; cursor: not-allowed; transform: none;
      box-shadow: none;
    }

    /* ===== BATTLE ARENA ===== */
    #battle-arena {
      position: fixed; inset: 0; z-index: 700;
      display: none;
    }
    #battle-arena.active { display: block; }
    #battle-canvas {
      width: 100%; height: 100%;
    }

    /* HUD */
    .battle-hud {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 710; pointer-events: none;
      padding: 1rem 2rem;
    }
    .hud-top {
      display: flex; justify-content: space-between;
      align-items: flex-start;
    }
    .player-hud {
      display: flex; flex-direction: column; width: 380px;
    }
    .player-hud.right { align-items: flex-end; }
    .player-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem; letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .p1-name { color: var(--gold); }
    .p2-name { color: var(--blue-bright); }
    .health-bar-outer {
      width: 100%; height: 24px;
      background: var(--bg-darkest);
      border: 2px solid var(--gold-dark);
      border-radius: 2px; overflow: hidden;
      position: relative;
    }
    .health-bar-outer.p2 { border-color: #1e4080; }
    .health-bar-inner {
      height: 100%; transition: width 0.3s;
      border-radius: 1px;
    }
    .health-bar-inner.p1 {
      background: linear-gradient(90deg, #d92626, #ff4444, #d92626);
    }
    .health-bar-inner.p2 {
      background: linear-gradient(90deg, #2662d9, #4488ff, #2662d9);
      float: right;
    }
    .health-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cinzel', serif; font-size: 0.8rem;
      color: var(--fg); text-shadow: 0 1px 3px #000;
    }
    .hud-timer {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 15px rgba(238,183,43,0.4);
      min-width: 60px; text-align: center;
    }
    .combo-display {
      position: fixed; z-index: 720;
      font-family: 'Cinzel Decorative', serif;
      font-size: 3rem; color: var(--gold-light);
      text-shadow: 0 0 20px rgba(238,183,43,0.6), 0 2px 4px #000;
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s;
    }
    .combo-display.p1 { left: 80px; top: 120px; }
    .combo-display.p2 { right: 80px; top: 120px; color: #93b0ec; text-shadow: 0 0 20px rgba(48,128,255,0.6), 0 2px 4px #000; }
    .combo-display.active { opacity: 1; }

    /* Round / KO Overlay */
    .battle-overlay {
      position: fixed; inset: 0; z-index: 750;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      flex-direction: column;
    }
    .battle-overlay.active { display: flex; }
    .round-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 5rem; color: var(--gold);
      text-shadow: 0 0 50px rgba(238,183,43,0.6), 0 4px 8px #000;
      animation: scaleIn 0.5s ease-out;
    }
    .ko-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 7rem; color: var(--red-bright);
      text-shadow: 0 0 50px rgba(215,66,66,0.6), 0 4px 8px #000;
      animation: scaleIn 0.3s ease-out;
    }
    .winner-text {
      font-family: 'Cinzel', serif;
      font-size: 2rem; color: var(--gold-light);
      margin-top: 1rem; letter-spacing: 0.2em;
    }

    @keyframes scaleIn {
      from { transform: scale(2); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Controls HUD */
    .controls-hud {
      position: fixed; bottom: 1rem; left: 50%;
      transform: translateX(-50%); z-index: 710;
      font-family: 'IM Fell English SC', serif;
      color: var(--fg-muted); font-size: 0.8rem;
      text-align: center; pointer-events: none;
      background: rgba(14,17,27,0.8);
      padding: 0.5rem 1.5rem; border-radius: 4px;
      border: 1px solid var(--gold-dark);
    }
    .key-badge {
      display: inline-block;
      background: var(--bg-accent); border: 1px solid var(--gold-dark);
      padding: 0.15rem 0.5rem; border-radius: 3px;
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      color: var(--gold-mid); margin: 0 0.15rem;
    }

    /* Grudge Studio Watermark */
    .gs-watermark {
      position: fixed; bottom: 1rem; right: 1rem;
      z-index: 720; pointer-events: none;
      font-family: 'Uncial Antiqua', cursive;
      font-size: 0.75rem; color: var(--gold-dark);
      opacity: 0.6; letter-spacing: 0.15em;
    }

    /* Damage Numbers */
    .damage-num {
      position: fixed; z-index: 730;
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700; pointer-events: none;
      animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* Debug State Overlay */
    .debug-state-overlay {
      position: fixed; bottom: 3.5rem; left: 50%;
      transform: translateX(-50%); z-index: 715;
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      color: var(--green-bright); pointer-events: none;
      background: rgba(0,0,0,0.7); padding: 0.4rem 1rem;
      border-radius: 4px; border: 1px solid #1a3a1a;
      display: none; gap: 2rem;
    }
    .debug-state-overlay.active { display: flex; }
    .debug-state-overlay .ds-label {
      color: var(--fg-muted); font-size: 0.65rem;
    }
    .debug-state-overlay .ds-p1 { color: var(--gold); }
    .debug-state-overlay .ds-p2 { color: var(--blue-bright); }

    /* Controller Status */
    .controller-badge {
      position: fixed; top: 1rem; right: 1rem;
      z-index: 760; pointer-events: none;
      font-family: 'IM Fell English SC', serif; font-size: 0.75rem;
      padding: 0.3rem 0.8rem; border-radius: 3px;
      background: rgba(14,17,27,0.85); border: 1px solid var(--bg-accent);
      color: var(--fg-muted); opacity: 0;
      transition: opacity 0.4s, border-color 0.3s, color 0.3s;
    }
    .controller-badge.visible { opacity: 1; }
    .controller-badge.connected { border-color: var(--green-bright); color: var(--green-bright); }
    .controller-badge.disconnected { border-color: var(--red-bright); color: var(--red-bright); }

    /* Settings Overlay */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(10,13,21,0.95);
      display: none; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 2rem; overflow-y: auto;
    }
    #settings-overlay.active { display: flex; }
    .settings-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
      margin-bottom: 1.5rem;
    }
    .settings-section {
      width: 100%; max-width: 560px; margin-bottom: 1.5rem;
    }
    .settings-section h3 {
      font-family: 'Cinzel', serif; font-size: 1rem;
      color: var(--gold-mid); margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--gold-dark); padding-bottom: 0.3rem;
    }
    .bind-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.6rem; margin-bottom: 0.3rem;
      background: var(--bg-mid); border: 1px solid var(--bg-accent);
      border-radius: 3px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .bind-row:hover { border-color: var(--gold-dark); background: var(--bg-accent); }
    .bind-row.listening {
      border-color: var(--gold); background: rgba(238,183,43,0.1);
      animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--gold); }
      50% { border-color: var(--gold-dark); }
    }
    .bind-action {
      font-family: 'Spectral SC', serif; font-size: 0.85rem; color: var(--fg);
      min-width: 100px;
    }
    .bind-keys {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .bind-key {
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      background: var(--bg-darkest); border: 1px solid var(--gold-dark);
      padding: 0.2rem 0.5rem; border-radius: 3px; color: var(--gold-mid);
    }
    .bind-gp {
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      background: #1a2040; border: 1px solid #2a4080;
      padding: 0.2rem 0.5rem; border-radius: 3px; color: #6090dd;
    }
    .bind-hint {
      font-family: 'IM Fell English SC', serif; font-size: 0.7rem;
      color: var(--fg-muted); font-style: italic;
    }
    .settings-actions {
      display: flex; gap: 1rem; margin-top: 1rem;
    }
    .settings-btn {
      font-family: 'Cinzel', serif; font-size: 0.9rem;
      padding: 0.5rem 1.5rem; cursor: pointer;
      border: 1px solid var(--gold-dark); background: var(--bg-mid);
      color: var(--gold-mid); transition: all 0.2s; border-radius: 3px;
    }
    .settings-btn:hover {
      background: var(--bg-accent); border-color: var(--gold); color: var(--gold);
    }
    .settings-btn.primary {
      background: linear-gradient(180deg, rgba(238,183,43,0.15), rgba(122,96,31,0.25));
      border-color: var(--gold); color: var(--gold);
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loading-screen">
    <h1>Grudge Warlords</h1>
    <div class="subtitle">FINAL FIGHTER</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">Summoning warriors...</div>
  </div>

  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-logo">Grudge Warlords</div>
    <div class="title-sub">FINAL FIGHTER</div>
    <div class="studio-badge">GRUDGE STUDIO</div>
    <button class="menu-btn" id="btn-fight" onclick="showCharSelect()">Enter the Arena</button>
    <button class="menu-btn" id="btn-viewer" onclick="showViewer()">Character Viewer</button>
    <button class="menu-btn" id="btn-settings" onclick="showSettings()">Settings</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-select">
    <div class="select-header">
      <h2>Choose Your Warriors</h2>
      <div class="player-label" id="select-phase">SELECT PLAYER 1 WARRIOR</div>
    </div>
    <div class="select-body">
      <div class="select-sidebar" id="char-list"></div>
      <div class="select-preview">
        <canvas id="preview-canvas"></canvas>
        <div class="preview-name" id="preview-name"></div>
        <div class="preview-class" id="preview-class"></div>
      </div>
    </div>
    <div class="select-footer">
      <button class="back-btn" onclick="backToTitle()">Back</button>
      <button class="fight-btn" id="start-fight-btn" disabled onclick="startFight()">FIGHT!</button>
    </div>
  </div>

  <!-- BATTLE ARENA -->
  <div id="battle-arena">
    <canvas id="battle-canvas"></canvas>
    <div class="battle-hud">
      <div class="hud-top">
        <div class="player-hud">
          <div class="player-name p1-name" id="p1-hud-name"></div>
          <div class="health-bar-outer">
            <div class="health-bar-inner p1" id="p1-health"></div>
            <div class="health-text" id="p1-health-text">100%</div>
          </div>
        </div>
        <div class="hud-timer" id="hud-timer">99</div>
        <div class="player-hud right">
          <div class="player-name p2-name" id="p2-hud-name"></div>
          <div class="health-bar-outer p2">
            <div class="health-bar-inner p2" id="p2-health"></div>
            <div class="health-text" id="p2-health-text">100%</div>
          </div>
        </div>
      </div>
    </div>
    <div class="combo-display p1" id="combo-p1"></div>
    <div class="combo-display p2" id="combo-p2"></div>
    <div class="debug-state-overlay" id="debug-state-overlay">
      <div><span class="ds-label">P1</span> <span class="ds-p1" id="ds-p1">idle</span></div>
      <div><span class="ds-label">P2</span> <span class="ds-p2" id="ds-p2">idle</span></div>
    </div>
    <div class="controls-hud" id="battle-controls"></div>
  </div>

  <!-- Battle Overlays -->
  <div class="battle-overlay" id="round-overlay">
    <div class="round-text" id="round-text"></div>
  </div>
  <div class="battle-overlay" id="ko-overlay">
    <div class="ko-text">K.O.!</div>
    <div class="winner-text" id="winner-text"></div>
    <button class="menu-btn" style="margin-top:2rem" onclick="backToSelect()">Continue</button>
