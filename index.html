    const mixamoClipLoader = new GLTFLoader();

    function normalizeClipName(name = '') {
      return String(name).trim().toLowerCase().replace(/[\s\-]+/g, '_');
    }

    function isAttackState(state) {
      return typeof state === 'string' && state.startsWith('attack_');
    }

    function getFighterFacingDir(fighter) {
      // Side-view: PI/2 = facing right (+X) = 1, -PI/2 = facing left (-X) = -1
      return fighter.group.rotation.y > 0 ? 1 : -1;
    }

    function createFighterCombatState() {
      return {
        state: FIGHTER_STATES.IDLE,
        stateTime: 0,
        attackType: null,
        attackResolved: false,
        queuedAttack: null,
        blockStartTime: 0,       // timestamp when BLOCK was entered (for parry window)
        lastAttackState: null,    // previous attack state (for combo routing)
      };
    }

    function getManifestForCharacter(charId) {
      const weaponType = WEAPON_DATA[charId]?.type || 'unarmed';
      const merged = {
        ...(MIXAMO_CLIP_MANIFEST.shared || {}),
        ...((MIXAMO_CLIP_MANIFEST.weaponType || {})[weaponType] || {}),
        ...((MIXAMO_CLIP_MANIFEST.perCharacter || {})[charId] || {}),
      };
      // Resolve all animation paths through assetURL for object storage support
      for (const key of Object.keys(merged)) {
        if (merged[key]) merged[key] = assetURL(merged[key]);
      }
      return merged;
    }

    function createFighterAnimationState(fighter) {
      return {
        mixer: new THREE.AnimationMixer(fighter.group),
        clips: {},
        actions: {},
        stateToClip: {},
        currentState: null,
        currentAction: null,
      };
    }

    function registerFighterClip(fighter, clip) {
      if (!fighter?.animation?.mixer || !clip) return;
      const key = normalizeClipName(clip.name);
      fighter.animation.clips[key] = clip;
      fighter.animation.actions[key] = fighter.animation.mixer.clipAction(clip);
    }

    function remapAnimationStates(fighter) {
      const keys = Object.keys(fighter.animation.actions);
      for (const state of Object.values(FIGHTER_STATES)) {
        const desired = normalizeClipName(state);
        if (fighter.animation.actions[desired]) {
          fighter.animation.stateToClip[state] = desired;
          continue;
        }
        const aliases = MIXAMO_STATE_ALIASES[state] || [];
        let found = null;
        for (const alias of aliases) {
          const a = normalizeClipName(alias);
          found = keys.find(k => k === a || k.includes(a));
          if (found) break;
        }
        if (!found && state === FIGHTER_STATES.WALK_BACK) {
          found = fighter.animation.stateToClip[FIGHTER_STATES.WALK_FWD] || null;
        }
        if (!found && state !== FIGHTER_STATES.IDLE) {
          found = fighter.animation.stateToClip[FIGHTER_STATES.IDLE] || null;
        }
        if (found) fighter.animation.stateToClip[state] = found;
      }
    }

    function playFighterAnimation(fighter, state, fadeOverride) {
      if (!fighter?.animation) return;
      const { actions, stateToClip } = fighter.animation;
      const clipKey = stateToClip[state] || stateToClip[FIGHTER_STATES.IDLE];
      if (!clipKey || !actions[clipKey]) return;

      const next = actions[clipKey];
      const prev = fighter.animation.currentAction;
      if (prev === next && fighter.animation.currentState === state) return;

      // Use per-state crossfade or override
      const fade = fadeOverride !== undefined ? fadeOverride : (STATE_CROSSFADE[state] || 0.12);

      next.enabled = true;
      next.reset();
      if (LOOPING_ANIMATION_STATES.has(state)) {
        next.setLoop(THREE.LoopRepeat, Infinity);
        next.clampWhenFinished = false;
      } else {
        next.setLoop(THREE.LoopOnce, 1);
        next.clampWhenFinished = true;
      }

      if (prev) prev.crossFadeTo(next, fade, true);
      next.play();
      fighter.animation.currentAction = next;
      fighter.animation.currentState = state;
    }

    function setFighterState(fighter, nextState, opts = {}) {
      if (!fighter?.combat) return;
      const force = !!opts.force;
      if (!force && fighter.combat.state === nextState) return;

      const prevState = fighter.combat.state;
      fighter.combat.state = nextState;
      fighter.combat.stateTime = 0;
      fighter.blocking = nextState === FIGHTER_STATES.BLOCK;

      // Track block entry time for parry window
      if (nextState === FIGHTER_STATES.BLOCK && prevState !== FIGHTER_STATES.BLOCK) {
        fighter.combat.blockStartTime = Date.now();
      }
      if (nextState !== FIGHTER_STATES.BLOCK && nextState !== FIGHTER_STATES.PARRY) {
        fighter.combat.blockStartTime = 0;
      }

      if (isAttackState(nextState)) {
        fighter.combat.attackType = nextState;
        fighter.combat.attackResolved = false;
        fighter.combat.lastAttackState = nextState;
      } else {
        fighter.combat.attackType = null;
        fighter.combat.attackResolved = false;
        fighter.combat.queuedAttack = null;
        // Reset combo history when leaving attack chain
        if (nextState === FIGHTER_STATES.IDLE || nextState === FIGHTER_STATES.HIT_REACT
            || nextState === FIGHTER_STATES.KNOCKDOWN || nextState === FIGHTER_STATES.KO
            || nextState === FIGHTER_STATES.BLOCK_STUN) {
          fighter.combat.lastAttackState = null;
        }
      }
      playFighterAnimation(fighter, nextState);
    }

    function initializeFighterAnimationController(fighter) {
      fighter.combat = createFighterCombatState();
      fighter.animation = createFighterAnimationState(fighter);

      // Get per-character bone map (detected at load time)
      const boneMap = characterBoneMaps[fighter.char.id];
      if (!boneMap) {
        console.warn(`[anim] No bone map for ${fighter.char.id} — no animations`);
        return;
      }
      fighter.boneMap = boneMap;

      // Register procedural bone-driven clips using THIS character's bone layout
      const procClips = generateProceduralClips(boneMap);
      for (const [name, clip] of Object.entries(procClips)) {
        registerFighterClip(fighter, clip);
      }
      remapAnimationStates(fighter);

      // Build per-character Mixamo retarget map
      const mixamoMap = buildMixamoRetargetMap(boneMap);

      // Also load any external Mixamo clips if configured (overrides procedural)
      const manifest = getManifestForCharacter(fighter.char.id);
      for (const [state, url] of Object.entries(manifest)) {
        if (!url) continue;
        mixamoClipLoader.load(url, (clipGltf) => {
          if (!clipGltf.animations || clipGltf.animations.length === 0) return;
          const baseClip = clipGltf.animations[0];

          // Retarget Mixamo bone names → UniRig bone_N names.
          let clip = retargetMixamoClip(baseClip, mixamoMap);
          if (!clip) clip = baseClip.clone(); // fallback if no Mixamo bones found
          clip.name = normalizeClipName(state);
          registerFighterClip(fighter, clip);
          remapAnimationStates(fighter);
          playFighterAnimation(fighter, fighter.combat.state, 0.05);
        }, undefined, (err) => {
          console.warn(`Failed to load Mixamo clip (${state}) for ${fighter.char.id}:`, err);
        });
      }

      setFighterState(fighter, FIGHTER_STATES.IDLE, { force: true });
    }

    // ===== COMBO INPUT SYSTEM =====
    // Routes light/heavy/special inputs through combo tree to determine attack state
    function processComboInput(fighter, inputCategory) {
      if (!fighter || fighter.hp <= 0) return false;
      if (fighter.cooldown > 0 || fighter.stunned > 0) return false;

      const s = fighter.combat.state;
      const routes = getComboRoutes(fighter);

      // From neutral states: start a new combo
      if (s === FIGHTER_STATES.IDLE || s === FIGHTER_STATES.WALK_FWD
          || s === FIGHTER_STATES.WALK_BACK || s === FIGHTER_STATES.BLOCK) {
        const neutralRoutes = routes.neutral;
        const nextAttack = neutralRoutes?.[inputCategory];
        if (nextAttack && getAttackDef(fighter, nextAttack)) {
          setFighterState(fighter, nextAttack, { force: true });
          return true;
        }
        return false;
      }

      // From an active attack: chain into next via cancel window
      if (isAttackState(s)) {
        const def = getAttackDef(fighter, s);
        if (!def) return false;
        // Must be in cancel window to chain
        if (def.cancelStart > 0 && fighter.combat.stateTime >= def.cancelStart
            && fighter.combat.stateTime <= def.cancelEnd) {
          const attackRoutes = routes[s];
          const nextAttack = attackRoutes?.[inputCategory];
          if (nextAttack && getAttackDef(fighter, nextAttack)) {
            fighter.combat.queuedAttack = nextAttack;
            return true;
          }
        }
      }

      return false;
    }

    function updateFighterStateMachine(fighter, opponent, dt, moveIntent, blockHeld) {
      if (!fighter?.combat || fighter.hp <= 0) return;
      fighter.combat.stateTime += dt;

      const state = fighter.combat.state;
      if (state === FIGHTER_STATES.KO || state === FIGHTER_STATES.VICTORY) return;

      // Stun override
      if (fighter.stunned > 0 && !isAttackState(state)
          && state !== FIGHTER_STATES.KNOCKDOWN && state !== FIGHTER_STATES.BLOCK_STUN) {
        setFighterState(fighter, FIGHTER_STATES.HIT_REACT);
        return;
      }

      // --- Attack state processing ---
      if (isAttackState(state)) {
        const def = getAttackDef(fighter, fighter.combat.attackType);
        if (!def) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
          return;
        }
        // Resolve hit on active frame
        if (!fighter.combat.attackResolved && fighter.combat.stateTime >= def.activeStart) {
          fighter.combat.attackResolved = true;
          performAttack(fighter, opponent, fighter.combat.attackType);
        }
        // Recovery end: execute queued combo or return to idle
        if (fighter.combat.stateTime >= def.recoveryEnd) {
          const queued = fighter.combat.queuedAttack;
          fighter.combat.queuedAttack = null;
          if (queued && getAttackDef(fighter, queued)) {
            setFighterState(fighter, queued, { force: true });
          } else {
            setFighterState(fighter, FIGHTER_STATES.IDLE);
          }
        }
        return;
      }

      // --- Dodge recovery (jady-deth sidestep pattern) ---
      if (state === FIGHTER_STATES.DODGE) {
        fighter.sidestepping = true;
        if (fighter.combat.stateTime >= STATE_RECOVERY_MS.dodge) {
          fighter.sidestepping = false;
          setFighterState(fighter, FIGHTER_STATES.IDLE);
        }
        return;
      }

      // --- Recovery states ---
      if (state === FIGHTER_STATES.HIT_REACT || state === FIGHTER_STATES.KNOCKDOWN) {
        const recoverAt = STATE_RECOVERY_MS[state] || 300;
        if (fighter.combat.stateTime >= recoverAt) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
        }
        return;
      }

      // --- Parry recovery (defender returns to idle) ---
      if (state === FIGHTER_STATES.PARRY) {
        if (fighter.combat.stateTime >= PARRY_RECOVER_MS) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
        }
        return;
      }

      // --- Block stun recovery (attacker was parried) ---
      if (state === FIGHTER_STATES.BLOCK_STUN) {
        if (fighter.combat.stateTime >= PARRY_STUN_MS) {
          setFighterState(fighter, FIGHTER_STATES.IDLE);
        }
        return;
      }

      // --- Block ---
      if (blockHeld && fighter.cooldown <= 0 && fighter.stunned <= 0) {
        setFighterState(fighter, FIGHTER_STATES.BLOCK);
        return;
      }
      if (state === FIGHTER_STATES.BLOCK && !blockHeld) {
        setFighterState(fighter, FIGHTER_STATES.IDLE);
        return;
      }

      // --- Dodge trigger (called externally via triggerDodge) ---
      // Handled via processComboInput or direct call, state set elsewhere

      // --- Movement ---
      if (Math.abs(moveIntent) > 0.001) {
        const facingDir = opponent.x >= fighter.x ? 1 : -1;
        const moveState = Math.sign(moveIntent) === facingDir
          ? FIGHTER_STATES.WALK_FWD
          : FIGHTER_STATES.WALK_BACK;
        setFighterState(fighter, moveState);
      } else {
        setFighterState(fighter, FIGHTER_STATES.IDLE);
      }
    }

    function isAttackActiveFrame(fighter) {
      if (!fighter?.combat || !isAttackState(fighter.combat.state)) return false;
      const def = getAttackDef(fighter, fighter.combat.attackType);
      if (!def) return false;
      return fighter.combat.stateTime >= def.activeStart && fighter.combat.stateTime <= def.activeEnd;
    }


    // Build a body collider Box3 for a fighter at their current position.
    // Uses actual measured character dimensions, not hardcoded.
    function getBodyCollider(fighter) {
      const b = fighter.bounds; // { hw, hh, hd } half-width/height/depth
      return new THREE.Box3(
        new THREE.Vector3(fighter.x - b.hw, 0, -b.hd),
        new THREE.Vector3(fighter.x + b.hw, b.hh * 2, b.hd)
      );
    }

    // Build hurtbox zones (upper / mid / lower body) from a fighter.
    function getHurtboxes(fighter) {
      const b = fighter.bounds;
      const h = b.hh * 2; // full height
      const third = h / 3;
      const x = fighter.x;
      return {
        upper: new THREE.Box3(
          new THREE.Vector3(x - b.hw, third * 2, -b.hd),
          new THREE.Vector3(x + b.hw, h, b.hd)
        ),
        mid: new THREE.Box3(
          new THREE.Vector3(x - b.hw, third, -b.hd),
          new THREE.Vector3(x + b.hw, third * 2, b.hd)
        ),
        lower: new THREE.Box3(
          new THREE.Vector3(x - b.hw * 0.9, 0, -b.hd),
          new THREE.Vector3(x + b.hw * 0.9, third, b.hd)
        ),
      };
    }

    // Build an attack hitbox extending from the attacker toward the defender.
    function getAttackHitbox(attacker, attackState) {
      const def = getAttackDef(attacker, attackState);
      const atk = def?.hitbox;
      if (!atk) return null;
      const b = attacker.bounds;
      const dir = getFighterFacingDir(attacker);
      // Hitbox starts at body edge, extends forward
      const edgeX = attacker.x + dir * b.hw;
      const farX = edgeX + dir * atk.fwd;
      const minX = Math.min(edgeX, farX);
      const maxX = Math.max(edgeX, farX);
      const cy = b.hh; // centered vertically on body
      return new THREE.Box3(
        new THREE.Vector3(minX, cy - atk.up, -atk.wide),
        new THREE.Vector3(maxX, cy + atk.up, atk.wide)
      );
    }

    // Push two fighters apart if their body colliders overlap.
    // With Rapier physics, rigid bodies handle most collision naturally.
    // This is a soft correction for edge cases where physics alone isn't enough.
    function resolveBodyCollision(p1, p2) {
      const box1 = getBodyCollider(p1);
      const box2 = getBodyCollider(p2);
      if (!box1.intersectsBox(box2)) return;
      const overlapLeft = box1.max.x - box2.min.x;
      const overlapRight = box2.max.x - box1.min.x;
      const pushDist = Math.min(overlapLeft, overlapRight) / 2 + 0.01;
      const dir = p1.x < p2.x ? -1 : 1;
      // Apply as gentle impulse rather than teleport
      if (p1.rigidBody && p2.rigidBody) {
        p1.rigidBody.applyImpulse({ x: dir * pushDist * 8, y: 0, z: 0 }, true);
        p2.rigidBody.applyImpulse({ x: -dir * pushDist * 8, y: 0, z: 0 }, true);
      }
    }

    // ===== SOUND MANAGER (Web Audio API — oscillator placeholders) =====
    // Ported from jady-deth's PositionalAudio pattern: stop-then-play per action
    const SFX = Object.freeze({
      LIGHT_ATTACK: 'light_attack',
      HEAVY_ATTACK: 'heavy_attack',
      SPECIAL_ATTACK: 'special_attack',
      BLOCK: 'block',
      PARRY: 'parry',
      HIT: 'hit',
      PROJECTILE: 'projectile',
      DODGE: 'dodge',
      KO: 'ko',
      WHOOSH: 'whoosh',
    });

    let audioCtx = null;
    const activeSounds = {}; // track one active oscillator per type for stop-then-play

    function initAudio() {
      if (audioCtx) return;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { console.warn('Web Audio not available'); }
    }

    // Synthesize a short sound using oscillators — no external files needed
    function playSound(type) {
      if (!audioCtx) initAudio();
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();

      // Stop previous instance of same type (jady-deth pattern)
      if (activeSounds[type]) {
        try { activeSounds[type].stop(); } catch (_) {}
      }

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      switch (type) {
        case SFX.LIGHT_ATTACK:
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(320, now);
          osc.frequency.exponentialRampToValueAtTime(180, now + 0.08);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
          osc.start(now); osc.stop(now + 0.1); break;
        case SFX.HEAVY_ATTACK:
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now);
          osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
          gain.gain.setValueAtTime(0.18, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
          osc.start(now); osc.stop(now + 0.18); break;
        case SFX.SPECIAL_ATTACK:
          osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
          osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc.start(now); osc.stop(now + 0.35); break;
        case SFX.BLOCK:
          osc.type = 'square'; osc.frequency.setValueAtTime(200, now);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
          osc.start(now); osc.stop(now + 0.06); break;
        case SFX.PARRY:
          osc.type = 'triangle'; osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(1600, now + 0.05);
          osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          osc.start(now); osc.stop(now + 0.2); break;
        case SFX.HIT:
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
          osc.frequency.exponentialRampToValueAtTime(60, now + 0.12);
          gain.gain.setValueAtTime(0.22, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now); osc.stop(now + 0.15); break;
        case SFX.PROJECTILE:
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
          osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.start(now); osc.stop(now + 0.3); break;
        case SFX.DODGE:
          osc.type = 'sine'; osc.frequency.setValueAtTime(500, now);
          osc.frequency.exponentialRampToValueAtTime(300, now + 0.12);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
          osc.start(now); osc.stop(now + 0.15); break;
        case SFX.KO:
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
          gain.gain.setValueAtTime(0.25, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.start(now); osc.stop(now + 0.6); break;
        default: // WHOOSH
          osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          osc.start(now); osc.stop(now + 0.12); break;
      }

      activeSounds[type] = osc;
      osc.onended = () => { if (activeSounds[type] === osc) delete activeSounds[type]; };
    }

    function playAttackSound(attackState) {
      const def = DEFAULT_ATTACK_DEFS[attackState];
      if (!def) return;
      if (def.category === 'special') playSound(SFX.SPECIAL_ATTACK);
      else if (def.category === 'heavy' || def.category === 'bridge') playSound(SFX.HEAVY_ATTACK);
      else playSound(SFX.LIGHT_ATTACK);
    }

    // Initialize audio on first user interaction (browser autoplay policy)
    document.addEventListener('pointerdown', initAudio, { once: true });
    document.addEventListener('keydown', initAudio, { once: true });

    // ===== DEBUG VISUALIZATION =====
    function clearDebugHelpers() {
      for (const h of debugHelpers) battleScene.remove(h);
      debugHelpers = [];
    }

    function drawDebugColliders() {
      clearDebugHelpers();
      if (!debugColliders || !gameState) return;
      const addHelper = (box, color) => {
        const helper = new THREE.Box3Helper(box, color);
        battleScene.add(helper);
        debugHelpers.push(helper);
      };
      // Body colliders
      addHelper(getBodyCollider(gameState.p1), 0xeeb72b); // gold
      addHelper(getBodyCollider(gameState.p2), 0x3080ff); // blue
      // Hurtbox zones
      const h1 = getHurtboxes(gameState.p1);
      const h2 = getHurtboxes(gameState.p2);
      addHelper(h1.upper, 0xff4444);
      addHelper(h1.mid, 0xffaa33);
      addHelper(h1.lower, 0x44ff44);
      addHelper(h2.upper, 0xff4444);
      addHelper(h2.mid, 0xffaa33);
      addHelper(h2.lower, 0x44ff44);
    };

    // ===== VFX SYSTEM =====
    const _slashGeo = new THREE.TorusGeometry(0.35, 0.015, 4, 16, Math.PI * 0.8);
    const _sparkGeo = new THREE.SphereGeometry(0.03, 4, 4);

    function spawnSlashVFX(x, y, facingRight, color) {
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(_slashGeo, mat);
      mesh.position.set(x + (facingRight ? 0.3 : -0.3), y, 0.1);
      mesh.rotation.z = facingRight ? -0.3 : Math.PI + 0.3;
      mesh.rotation.x = (Math.random() - 0.5) * 0.4;
      battleScene.add(mesh);
      vfxParticles.push({ mesh, life: 0, maxLife: 180, type: 'slash' });
    }

    function spawnImpactSparks(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(_sparkGeo, mat);
        mesh.position.set(x, y, 0);
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 2.5;
        battleScene.add(mesh);
        vfxParticles.push({
          mesh, life: 0, maxLife: 250 + Math.random() * 150,
          type: 'spark',
          vx: Math.cos(angle) * speed * 0.003,
          vy: Math.sin(angle) * speed * 0.003 + 0.002,
          gravity: 0.00002,
        });
      }
    }

    function spawnAttackVFX(attacker, defender, attackState, blocked) {
      const hitX = (attacker.x + defender.x) / 2;
      const hitY = attacker.bounds.hh;
      const facingRight = defender.x > attacker.x;
      const def = getAttackDef(attacker, attackState);
      const cat = def?.category || 'light';
      const CATEGORY_COLORS = { light: 0xeeb72b, heavy: 0xff6633, bridge: 0xff9944, special: 0xac4bff };
      const color = CATEGORY_COLORS[cat] || 0xeeb72b;

      if (blocked) {
        spawnImpactSparks(hitX, hitY, 4, 0x3080ff);
      } else {
        spawnSlashVFX(hitX, hitY, facingRight, color);
        const sparkCount = cat === 'special' ? 12 : cat === 'heavy' ? 8 : 5;
        spawnImpactSparks(hitX, hitY, sparkCount, color);
      }
    }

    function spawnParryVFX(defender, attacker) {
      const hitX = (attacker.x + defender.x) / 2;
      const hitY = defender.bounds.hh;
      spawnImpactSparks(hitX, hitY, 10, 0x44ffff);
      spawnSlashVFX(hitX, hitY, defender.x < attacker.x, 0x44ffff);
    }

    function updateVFX(dt) {
      for (let i = vfxParticles.length - 1; i >= 0; i--) {
        const p = vfxParticles[i];
        p.life += dt;
        const t = p.life / p.maxLife;

        if (t >= 1) {
          battleScene.remove(p.mesh);
          p.mesh.geometry !== _slashGeo && p.mesh.geometry !== _sparkGeo && p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          vfxParticles.splice(i, 1);
          continue;
        }

        p.mesh.material.opacity = 1 - t;

        if (p.type === 'slash') {
          p.mesh.scale.setScalar(1 + t * 0.5);
          p.mesh.rotation.z += (dt / 1000) * 2;
        } else if (p.type === 'spark') {
          p.mesh.position.x += p.vx * dt;
          p.mesh.position.y += p.vy * dt;
          p.vy -= p.gravity * dt;
          p.mesh.scale.setScalar(1 - t * 0.7);
        }
      }
    }

    function clearVFX() {
      for (const p of vfxParticles) {
        battleScene.remove(p.mesh);
        p.mesh.material.dispose();
      }
      vfxParticles = [];
    }

    // ===== PROJECTILE SYSTEM =====
    // Ranged attacks spawn projectiles that travel forward and resolve on collision.
    let projectiles = [];

    // Geometry pool for projectile VFX types
    const _projGeo = {
      energy_ball: new THREE.SphereGeometry(1, 12, 8),
      wave:        new THREE.TorusGeometry(1, 0.12, 4, 24, Math.PI * 1.2),
      bolt:        new THREE.CylinderGeometry(0.08, 0.08, 1, 6),
      shockwave:   new THREE.RingGeometry(0.3, 1, 24),
      beam:        new THREE.PlaneGeometry(1, 0.25),
    };
    // Rotate bolt to lay horizontal (Z-forward)
    _projGeo.bolt.rotateZ(Math.PI / 2);
    _projGeo.shockwave.rotateX(-Math.PI / 2);

    function spawnProjectile(attacker, def, attackState) {
      const dir = getFighterFacingDir(attacker);
      const spawnX = attacker.x + dir * (attacker.bounds.hw + 0.15);
      const spawnY = attacker.bounds.hh; // mid-body height

      const projType = def.projType || 'energy_ball';
      const projSize = def.projSize || 0.15;
      const projColor = def.projColor || 0xeeb72b;
      const projSpeed = def.projSpeed || 3.5;
      const projLifetime = def.projLifetime || 1200;

      const geo = _projGeo[projType] || _projGeo.energy_ball;
      const mat = new THREE.MeshBasicMaterial({
        color: projColor, transparent: true, opacity: 0.92, side: THREE.DoubleSide,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.scale.setScalar(projSize);
      mesh.position.set(spawnX, spawnY, 0.05);
      if (projType === 'wave') {
        mesh.rotation.z = dir > 0 ? -0.2 : Math.PI + 0.2;
      } else if (projType === 'beam') {
        mesh.scale.set(projSize * 3, projSize, 1);
      }
      battleScene.add(mesh);

      // Trailing glow (additive inner core)
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.5, side: THREE.DoubleSide,
      });
      const glowMesh = new THREE.Mesh(geo, glowMat);
      glowMesh.scale.setScalar(projSize * 0.6);
      glowMesh.position.copy(mesh.position);
      battleScene.add(glowMesh);

      projectiles.push({
        mesh,
        glowMesh,
        owner: attacker,
        x: spawnX,
        y: spawnY,
        vx: dir * projSpeed,
        damage: def.baseDmg + Math.floor(attacker.char.atk * def.dmgScale),
        knockback: def.knockback,
        knocksDown: !!def.knocksDown,
        hitboxHW: projSize * 1.2,  // half-width of collision box
        hitboxHH: projSize * 1.0,
        life: 0,
        maxLife: projLifetime,
        projType,
        projColor,
        piercing: !!def.projPiercing,
        hasHit: false,
        attackState,
      });
    }

    function resolveProjectileHit(proj, defender) {
      if (proj.hasHit && !proj.piercing) return;
      // Dodge invulnerability — projectiles pass through sidestepping fighters
      if (defender.sidestepping) return false;
      // Build projectile hitbox
      const pBox = new THREE.Box3(
        new THREE.Vector3(proj.x - proj.hitboxHW, proj.y - proj.hitboxHH, -0.3),
        new THREE.Vector3(proj.x + proj.hitboxHW, proj.y + proj.hitboxHH, 0.3)
      );
      const defBox = getBodyCollider(defender);
      if (!pBox.intersectsBox(defBox)) return false;

      proj.hasHit = true;

      // Block check (block reduces to chip damage, no parry on projectiles)
      let dmg = proj.damage;
      if (defender.blocking) {
        dmg = Math.max(1, Math.floor(dmg * 0.15));
      } else {
        dmg = Math.max(1, dmg - Math.floor(defender.char.def * 0.3));
      }
      dmg += Math.floor(Math.random() * 3) - 1;
      dmg = Math.max(1, dmg);

      // Combo tracking
      const now = Date.now();
      if (now - defender.lastHit < 1500) {
        proj.owner.combo++;
        if (proj.owner.combo >= 3) dmg = Math.floor(dmg * 1.3);
      } else {
        proj.owner.combo = 1;
      }
      defender.lastHit = now;

      defender.hp = Math.max(0, defender.hp - dmg);

      // State transitions
      if (defender.combat) {
        if (defender.hp <= 0) {
          setFighterState(defender, FIGHTER_STATES.KO, { force: true });
        } else if (proj.knocksDown && !defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.KNOCKDOWN, { force: true });
        } else if (!defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.HIT_REACT, { force: true });
        }
      }

      // VFX on impact
      spawnImpactSparks(proj.x, proj.y, 8, proj.projColor);
      const shakeAmt = proj.knocksDown ? 0.18 : 0.08;
      triggerScreenShake(shakeAmt);

      const isP1Target = defender === gameState.p1;
      showDamage(dmg, isP1Target);
      showCombo(isP1Target ? 'p2' : 'p1', proj.owner.combo);

      // Knockback: Rapier impulse from projectile impact
      if (!defender.blocking) {
        applyPhysicsKnockback(proj.owner, defender, proj.knockback, proj.knocksDown);
      }

      updateHealthBars();
      if (defender.hp <= 0) {
        endRound(proj.owner === gameState.p1 ? 'p1' : 'p2');
      }

      return true;
    }

    function updateProjectiles(dt) {
      if (!gameState) return;
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.life += dt;
        const t = p.life / p.maxLife;

        // Move
        p.x += p.vx * dt / 1000;
        p.mesh.position.x = p.x;
        p.glowMesh.position.x = p.x;

        // Animate
        p.mesh.material.opacity = 0.92 * (1 - t * 0.5);
        p.glowMesh.material.opacity = 0.5 * (1 - t * 0.7);
        if (p.projType === 'energy_ball') {
          p.mesh.rotation.x += dt * 0.005;
          p.mesh.rotation.y += dt * 0.008;
        } else if (p.projType === 'wave') {
          const pulse = 1 + Math.sin(p.life * 0.015) * 0.15;
          p.mesh.scale.setScalar(p.hitboxHW * pulse);
        } else if (p.projType === 'shockwave') {
          const expand = 1 + t * 2;
          p.mesh.scale.set(p.hitboxHW * expand, 1, p.hitboxHW * expand);
          p.mesh.position.y = 0.05;
          p.glowMesh.position.y = 0.05;
          p.glowMesh.scale.copy(p.mesh.scale).multiplyScalar(0.6);
        } else if (p.projType === 'bolt') {
          // Trail sparks
          if (Math.random() < 0.3) {
            spawnImpactSparks(p.x, p.y, 1, p.projColor);
          }
        } else if (p.projType === 'beam') {
          const stretch = 1 + t * 1.5;
          p.mesh.scale.x = p.hitboxHW * 3 * stretch;
        }

        // Collision check against opponent
        const defender = p.owner === gameState.p1 ? gameState.p2 : gameState.p1;
        if (!p.hasHit || p.piercing) {
          resolveProjectileHit(p, defender);
        }

        // Remove if expired, hit (non-piercing), or off-screen
        if (t >= 1 || (p.hasHit && !p.piercing) || Math.abs(p.x) > 6) {
          battleScene.remove(p.mesh);
          battleScene.remove(p.glowMesh);
          p.mesh.material.dispose();
          p.glowMesh.material.dispose();
          projectiles.splice(i, 1);
        }
      }
    }

    function clearProjectiles() {
      for (const p of projectiles) {
        battleScene.remove(p.mesh);
        battleScene.remove(p.glowMesh);
        p.mesh.material.dispose();
        p.glowMesh.material.dispose();
      }
      projectiles = [];
    }

    // ===== SCREEN SHAKE =====
    function triggerScreenShake(intensity) {
      screenShake = Math.max(screenShake, intensity);
    }

    function updateBattleCamera(dt) {
      if (!battleCamera || !gameState) return;

      // Track midpoint between fighters on X axis
      const midX = (gameState.p1.x + gameState.p2.x) / 2;
      const dist = Math.abs(gameState.p1.x - gameState.p2.x);

      // Subtle zoom: pull back when fighters are far apart, push in when close
      const zoomBase = 5.5;
      const zoomRange = 1.5;
      const zoomT = Math.max(0, Math.min(1, (dist - 1.0) / 5.0));
      const targetZ = zoomBase + zoomT * zoomRange;

      // Smooth camera follow (lerp)
      const lerpSpeed = 1 - Math.pow(0.05, dt / 1000);
      CAM_BASE.x += (midX * 0.6 - CAM_BASE.x) * lerpSpeed;  // only follow 60% of midpoint for cinematic feel
      CAM_BASE.z += (targetZ - CAM_BASE.z) * lerpSpeed * 0.5;
      CAM_LOOKAT_BASE.x += (midX * 0.7 - CAM_LOOKAT_BASE.x) * lerpSpeed;

      // Apply screen shake on top of tracked position
      let ox = 0, oy = 0;
      if (screenShake > 0.001) {
        ox = (Math.random() - 0.5) * screenShake * 0.4;
        oy = (Math.random() - 0.5) * screenShake * 0.3;
        screenShake *= Math.pow(0.92, dt / 16);
      } else {
        screenShake = 0;
      }

      battleCamera.position.set(CAM_BASE.x + ox, CAM_BASE.y + oy, CAM_BASE.z);
      battleCamera.lookAt(CAM_LOOKAT_BASE.x, CAM_LOOKAT_BASE.y, CAM_LOOKAT_BASE.z);
    }

    // ===== LOADING =====
    const loader = new GLTFLoader();
    const loadingBar = document.getElementById('loading-bar');
    const loadingText = document.getElementById('loading-text');

    // Configure GLTFLoader for cross-origin when using object storage
    if (ASSET_BASE_URL.startsWith('http')) {
      loader.setCrossOrigin('anonymous');
    }

    // Load a single character GLB with retry support
    function loadCharacterGLB(character, retries = 2) {
      return new Promise((resolve) => {
        let attempt = 0;
        function tryLoad() {
          loader.load(character.glb,
            (gltf) => {
              characterGLBScenes[character.id] = gltf.scene;
              // Auto-detect bone map from skeleton
              const boneMap = detectBoneMap(gltf.scene);
              if (boneMap) {
                characterBoneMaps[character.id] = boneMap;
                console.log(`[bones] ${character.name} (${character.id}):`, JSON.stringify(boneMap));
              }
              // Also store any embedded animations
              if (gltf.animations && gltf.animations.length > 0) {
                characterGLBScenes[character.id]._animations = gltf.animations;
              }
              resolve(true);
            },
            undefined,
            (err) => {
              attempt++;
              if (attempt <= retries) {
                console.warn(`[load] Retry ${attempt}/${retries} for ${character.name} (${character.glb})`);
                setTimeout(tryLoad, 500 * attempt);
              } else {
                console.error(`[load] Failed to load ${character.name} after ${retries + 1} attempts:`, character.glb, err?.message || err);
                resolve(false);
              }
            }
          );
        }
        tryLoad();
      });
    }

    // Try to load individual character GLBs first (pre-split, origin-centered).
    // Falls back to the monolithic scene.gltf if characters/ directory is unavailable.
    async function loadAllCharacters() {
      let loaded = 0;
      const total = CHARACTERS.length;
      const hasGLBs = CHARACTERS[0].glb;

      if (hasGLBs) {
        // Parallel-load individual GLBs with retry
        const promises = CHARACTERS.map(c => {
          return loadCharacterGLB(c).then(ok => {
            loaded++;
            const pct = (loaded / total * 100).toFixed(0);
            loadingBar.style.width = pct + '%';
            loadingText.textContent = `Loading ${c.name}... (${loaded}/${total})`;
            return ok;
          });
        });

        const results = await Promise.all(promises);
        const glbCount = results.filter(Boolean).length;
        const failedChars = CHARACTERS.filter((c, i) => !results[i]).map(c => c.name);

        if (failedChars.length > 0) {
          console.warn(`[load] Failed characters: ${failedChars.join(', ')}`);
        }

        // If at least some loaded, we're good
        if (glbCount > 0) {
          loadingBar.style.width = '100%';
          loadingText.textContent = `${glbCount} warriors assembled!`;
          finishLoading();
          return;
        }

        // All GLBs failed — warn with specific reason
        if (window.location.protocol === 'file:') {
          loadingText.textContent = 'Cannot load models from file:// — please use a local server (npx serve, or python -m http.server)';
          console.error('GLB loading failed: file:// protocol blocks fetch(). Run a local HTTP server.');
          return;
        }
        if (ASSET_BASE_URL.startsWith('http')) {
          console.error(`[load] All GLBs failed from object storage (${ASSET_BASE_URL}). Check CORS headers and that files exist.`);
        }
        console.warn(`All ${total} character GLBs failed to load — falling back to scene.gltf`);
      }

      // Fallback: load monolithic scene.gltf
      loadingText.textContent = 'Loading warriors...';
      loader.load(assetURL('scene.gltf'),
        (gltf) => {
          gltfScene = gltf.scene;
          loadingBar.style.width = '100%';
          loadingText.textContent = 'Warriors assembled!';
          parseCharactersFromScene();
          finishLoading();
        },
        (progress) => {
          if (progress.total > 0) {
            const pct = (progress.loaded / progress.total * 100).toFixed(0);
            loadingBar.style.width = pct + '%';
            loadingText.textContent = `Loading warriors... ${pct}%`;
          }
        },
        (error) => {
          loadingText.textContent = 'Error loading scene: ' + error.message;
          console.error('[load] scene.gltf failed:', error);
        }
      );
    }

    function finishLoading() {
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('title-screen').classList.add('active');
      }, 600);
    }

    // Parse characters from monolithic scene.gltf (legacy fallback)
    function parseCharactersFromScene() {
      gltfScene.updateMatrixWorld(true);
      gltfScene.traverse((child) => {
        if (child.isMesh) {
          const name = child.name || '';
          for (const c of CHARACTERS) {
            if (name.includes(c.meshPrefix)) {
              if (!characterGroups[c.id]) characterGroups[c.id] = [];
              characterGroups[c.id].push(child);
              break;
            }
          }
        }
      });
    }

    // Load weapon GLBs into weaponMeshes cache
    async function loadAllWeapons() {
      const weaponLoader = new GLTFLoader();
      const promises = [];
      for (const [charId, wd] of Object.entries(WEAPON_DATA)) {
        if (!wd.weapon_glb) continue;
        promises.push(new Promise(resolve => {
          weaponLoader.load(wd.weapon_glb, (gltf) => {
            weaponMeshes[charId] = gltf.scene;
            console.log(`[weapon] Loaded ${charId} weapon from ${wd.weapon_glb}`);
            resolve(true);
          }, undefined, (err) => {
            console.warn(`[weapon] Failed to load ${wd.weapon_glb}:`, err);
            resolve(false);
          });
        }));
      }
      await Promise.all(promises);
    }

    // Kick off loading
    loadAllCharacters();
    loadAllWeapons();

    // ===== PREVIEW RENDERER =====

      fillLight.position.set(-3, 3, -2);
      previewScene.add(fillLight);
      const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
      rimLight.position.set(0, 2, -4);
      previewScene.add(rimLight);

      // Ground circle
      const groundGeo = new THREE.CircleGeometry(1.5, 64);

        color: 0x1d2130, metalness: 0.3, roughness: 0.8
      });

      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.001;
