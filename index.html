    let previewLastFrame = 0;

    function animatePreview(timestamp) {
      animFrame = requestAnimationFrame(animatePreview);
      const dt = previewLastFrame ? (timestamp - previewLastFrame) / 1000 : 0.016;
      previewLastFrame = timestamp;

      // Update preview animation mixer (idle animation)
      if (previewMixer) previewMixer.update(dt);

      // Auto-rotate the preview character for a better 3D showcase
      if (previewChar) {
        previewChar.rotation.y += 0.4 * dt;
      }

      if (previewControls) previewControls.update();
      if (previewRenderer && previewScene && previewCamera) {
        previewRenderer.render(previewScene, previewCamera);
      }
    }

    // Compute bounds from renderable meshes only (ignore bones/helpers).
    // For SkinnedMesh: compute from geometry position attribute directly,
    // transformed by the node's world matrix. Box3.setFromObject on SkinnedMesh
    // uses bind-pose bounds which can be wildly wrong for rigged models.
    function getRenderableBounds(root) {
      const bounds = new THREE.Box3();
      bounds.makeEmpty();
      root.updateMatrixWorld(true);
      const _v = new THREE.Vector3();
      root.traverse((child) => {
        if (!child.isMesh && !child.isSkinnedMesh) return;
        const geo = child.geometry;
        if (!geo) return;
        const pos = geo.attributes.position;
        if (!pos) return;
        // For SkinnedMesh: use the geometry positions transformed by the
        // node's world matrix. This gives the bind-pose bounds in world
        // space without the skeleton distortion that setFromObject applies.
        const mat = child.matrixWorld;
        for (let i = 0; i < pos.count; i++) {
          _v.fromBufferAttribute(pos, i).applyMatrix4(mat);
          bounds.expandByPoint(_v);
        }
      });
      if (bounds.isEmpty()) return new THREE.Box3().setFromObject(root);
      return bounds;
    }

    // Build a group from either individual GLB or legacy monolithic scene meshes.
    // Returns a THREE.Group scaled to `targetHeight` with feet at Y=0.
    // For rigged models: uses SkeletonUtils.clone() to preserve SkinnedMesh + Skeleton.
    function cloneCharacterModel(charId, targetHeight = 1.6) {
      let group;

      if (characterGLBScenes[charId]) {
        const src = characterGLBScenes[charId];
        // Check if source has SkinnedMesh (rigged model)
        let hasRig = false;
        src.traverse(c => { if (c.isSkinnedMesh) hasRig = true; });

        if (hasRig) {
          // SkeletonUtils.clone preserves bones, skin, and bind matrices
          group = SkeletonUtils.clone(src);
        } else {
          // Static mesh fallback
          group = new THREE.Group();
          src.traverse(child => {
            if (child.isMesh) {
              const cloned = child.clone(true);
              cloned.geometry = child.geometry.clone();
              group.add(cloned);
            }
          });
        }
      } else if (characterGroups[charId]?.length > 0) {
        // Legacy fallback: bake world transforms from monolithic GLTF
        group = new THREE.Group();
        for (const mesh of characterGroups[charId]) {
          const cloned = mesh.clone(true);
          cloned.geometry = mesh.geometry.clone();
          cloned.geometry.applyMatrix4(mesh.matrixWorld);
          cloned.position.set(0, 0, 0);
          cloned.quaternion.identity();
          cloned.scale.set(1, 1, 1);
          group.add(cloned);
        }
      } else {
        return new THREE.Group(); // empty — character not loaded
      }

      // Disable frustum culling on skinned meshes — animated bones can
      // move vertices outside the original bounding sphere.
      // Also fix texture colorSpace on cloned materials to prevent washed-out
      // or over-bright rendering when switching between renderers.
      group.traverse(child => {
        if (child.isSkinnedMesh) child.frustumCulled = false;
        if (child.isMesh || child.isSkinnedMesh) {
          const mat = child.material;
          if (mat) {
            // Ensure base color map uses SRGB color space
            if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
            // Emissive maps are also in SRGB
            if (mat.emissiveMap) mat.emissiveMap.colorSpace = THREE.SRGBColorSpace;
            // Normal maps must be Linear
            if (mat.normalMap) mat.normalMap.colorSpace = THREE.LinearSRGBColorSpace;
            // AO/roughness/metalness are data textures (Linear)
            if (mat.aoMap) mat.aoMap.colorSpace = THREE.LinearSRGBColorSpace;
            if (mat.roughnessMap) mat.roughnessMap.colorSpace = THREE.LinearSRGBColorSpace;
            if (mat.metalnessMap) mat.metalnessMap.colorSpace = THREE.LinearSRGBColorSpace;
            mat.needsUpdate = true;
          }
        }
      });

      // Normalize: scale to target height, center X/Z, feet at Y=0
      group.updateMatrixWorld(true);
      const box = getRenderableBounds(group);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      if (maxDim < 0.001) return group;
      const scale = targetHeight / maxDim;

      // Wrap in outer group so skeleton root transforms stay intact
      const wrapper = new THREE.Group();
      wrapper.add(group);
      group.scale.setScalar(scale);
      group.position.set(
        -center.x * scale,
        -box.min.y * scale,
        -center.z * scale
      );
      return wrapper;
    }

    // Clean up previous preview mixer to prevent memory leaks
    let previewMixer = null;

    function showCharacterInPreview(charId) {
      if (!previewScene) return;

      // Remove old preview + stop old mixer
      if (previewChar) {
        previewScene.remove(previewChar);
        previewChar = null;
      }
      if (previewMixer) {
        previewMixer.stopAllAction();
        previewMixer = null;
      }

      if (!characterGLBScenes[charId] && (!characterGroups[charId] || characterGroups[charId].length === 0)) return;

      const char = CHARACTERS.find(c => c.id === charId);
      const group = cloneCharacterModel(charId, 1.6);

      // Enable shadow casting on preview character meshes
      group.traverse(child => {
        if (child.isMesh || child.isSkinnedMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      // Face the camera — models face +Z in GLTF, camera is at +Z,
      // so rotate 180° to show the front of the character
      group.rotation.y = Math.PI;
      group.userData.baseY = group.position.y;

      previewScene.add(group);
      previewChar = group;

      // --- Load and play idle animation in preview ---
      const manifest = getManifestForCharacter(charId);
      const idleUrl = manifest?.idle;
      if (idleUrl) {
        previewMixer = new THREE.AnimationMixer(group);
        const loader = new GLTFLoader();
        loader.load(idleUrl, (gltf) => {
          if (!previewChar || previewChar !== group) return; // stale
          if (gltf.animations?.length > 0) {
            const clip = gltf.animations[0];
            const action = previewMixer.clipAction(clip);
            action.setLoop(THREE.LoopRepeat, Infinity);
            action.play();
          }
        }, undefined, () => {
          // Idle animation not found — character stays in bind pose
        });
      }

      previewLastFrame = 0;

      document.getElementById('preview-name').textContent = char.name;
      document.getElementById('preview-class').textContent = char.class.toUpperCase();
    }

    // ===== CHAR SELECT UI =====
    function buildCharList() {
      const list = document.getElementById('char-list');
      list.innerHTML = '';
      for (const c of CHARACTERS) {
        const card = document.createElement('div');
        card.className = 'char-card';
        card.dataset.id = c.id;
        card.innerHTML = `
          <div class="char-icon" style="border-color:${c.color}">${c.icon}</div>
          <div class="char-info">
            <h3>${c.name}</h3>
            <div class="char-class">${c.class}</div>
            <div class="char-stats">
              <span class="stat-pip">ATK ${c.atk}</span>
              <span class="stat-pip">DEF ${c.def}</span>
              <span class="stat-pip">SPD ${c.spd}</span>
            </div>
          </div>
        `;
        card.addEventListener('click', () => onCharClick(c.id));
        card.addEventListener('mouseenter', () => showCharacterInPreview(c.id));
        list.appendChild(card);
      }
    }

    function onCharClick(charId) {
      if (selectingPlayer === 1) {
        selectedP1 = charId;
        document.querySelectorAll('.char-card.selected').forEach(c => c.classList.remove('selected'));
        document.querySelector(`.char-card[data-id="${charId}"]`).classList.add('selected');
        selectingPlayer = 2;
        document.getElementById('select-phase').textContent = 'SELECT PLAYER 2 WARRIOR';
      } else {
        if (charId === selectedP1) return; // can't pick same
        selectedP2 = charId;
        document.querySelectorAll('.char-card.selected-p2').forEach(c => c.classList.remove('selected-p2'));
        document.querySelector(`.char-card[data-id="${charId}"]`).classList.add('selected-p2');
        document.getElementById('start-fight-btn').disabled = false;
      }
    }

    // ===== WEAPON LOADING =====
    // Attach loaded weapon mesh to a fighter's hand bone at runtime
    function attachWeaponToFighter(fighter) {
      const wd = WEAPON_DATA[fighter.char.id];
      if (!wd || !wd.gripBone || !wd.weapon_glb) return;

      // Find hand bone in the rigged model
      let handBone = null;
      fighter.group.traverse(child => {
        if (child.isBone && child.name === wd.gripBone) handBone = child;
      });

      if (!handBone) return; // not rigged yet — weapon stays in static mesh

      const weaponScene = weaponMeshes[fighter.char.id];
      if (!weaponScene) return;

      const weaponGroup = new THREE.Group();
      weaponScene.traverse(child => {
        if (child.isMesh) weaponGroup.add(child.clone(true));
      });
      weaponGroup.position.set(wd.offset.x, wd.offset.y, wd.offset.z);
      weaponGroup.rotation.set(wd.rotation.x, wd.rotation.y, wd.rotation.z);
      handBone.add(weaponGroup);
      fighter.weaponGroup = weaponGroup;
    }

    // ===== BATTLE SYSTEM =====
    function initBattle() {
      const canvas = document.getElementById('battle-canvas');
      battleRenderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      battleRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      battleRenderer.setSize(window.innerWidth, window.innerHeight);
      battleRenderer.toneMapping = THREE.ACESFilmicToneMapping;
      battleRenderer.toneMappingExposure = 1.2;
      battleRenderer.shadowMap.enabled = true;
      battleRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
      battleRenderer.outputColorSpace = THREE.SRGBColorSpace;

      battleScene = new THREE.Scene();
      battleScene.background = new THREE.Color(0x080b14);
      battleScene.fog = new THREE.Fog(0x080b14, 8, 25);

      // ===== 2.5D CAMERA =====
      // Side-view with slight angle — MK/Virtua Fighter style
      battleCamera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
      battleCamera.position.copy(CAM_BASE);
      battleCamera.lookAt(CAM_LOOKAT_BASE);

      // ===== NATURAL LIGHTING =====
      // Warm ambient for atmosphere
      const hemiLight = new THREE.HemisphereLight(0x8899bb, 0x2a1f0f, 0.6);
      battleScene.add(hemiLight);

      // Main key light — warm directional with shadows
      const keyLight = new THREE.DirectionalLight(0xffeedd, 1.8);
      keyLight.position.set(2, 6, 4);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.set(1024, 1024);
      keyLight.shadow.camera.left = -5;
      keyLight.shadow.camera.right = 5;
      keyLight.shadow.camera.top = 4;
      keyLight.shadow.camera.bottom = -1;
      keyLight.shadow.camera.near = 0.5;
      keyLight.shadow.camera.far = 15;
      keyLight.shadow.bias = -0.001;
      keyLight.shadow.radius = 3;
      battleScene.add(keyLight);

      // Cool fill from opposite side
      const fillLight = new THREE.DirectionalLight(0x6688cc, 0.5);
      fillLight.position.set(-3, 4, 2);
      battleScene.add(fillLight);

      // Warm rim/back light for character edge definition
      const rimLight = new THREE.DirectionalLight(0xeeb72b, 0.4);
      rimLight.position.set(0, 3, -5);
      battleScene.add(rimLight);

      // Subtle colored fighter spotlights (toned down for natural feel)
      const spotP1 = new THREE.SpotLight(0xeeb72b, 1.5, 8, Math.PI / 5, 0.5);
      spotP1.position.set(-2, 4, 3);
      spotP1.target.position.set(-1.5, 0, 0);
      battleScene.add(spotP1);
      battleScene.add(spotP1.target);

      const spotP2 = new THREE.SpotLight(0x3080ff, 1.5, 8, Math.PI / 5, 0.5);
      spotP2.position.set(2, 4, 3);
      spotP2.target.position.set(1.5, 0, 0);
      battleScene.add(spotP2);
      battleScene.add(spotP2.target);

      // ===== ENHANCED STAGE =====
      // Stone arena floor with slight elevation
      const floorGeo = new THREE.CylinderGeometry(5.5, 5.8, 0.15, 64);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0x2a2535, metalness: 0.3, roughness: 0.8,
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.position.y = -0.075;
      floor.receiveShadow = true;
      battleScene.add(floor);

      // Fight surface (top of platform)
      const surfaceGeo = new THREE.CircleGeometry(5.5, 64);
      const surfaceMat = new THREE.MeshStandardMaterial({
        color: 0x1e1a28, metalness: 0.4, roughness: 0.7,
      });
      const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
      surface.rotation.x = -Math.PI / 2;
      surface.position.y = 0.001;
      surface.receiveShadow = true;
      battleScene.add(surface);

      // Gold outer border ring
      const outerRing = new THREE.RingGeometry(5.3, 5.5, 64);
      const outerMat = new THREE.MeshStandardMaterial({
        color: 0x8a701f, metalness: 0.7, roughness: 0.3,
        emissive: 0x4a3a0a, emissiveIntensity: 0.3,
      });
      const outer = new THREE.Mesh(outerRing, outerMat);
      outer.rotation.x = -Math.PI / 2;
      outer.position.y = 0.005;
      battleScene.add(outer);

      // Inner fight circle
      const innerRing = new THREE.RingGeometry(3.3, 3.4, 64);
      const innerMat = new THREE.MeshStandardMaterial({
        color: 0x3a2f10, metalness: 0.5, roughness: 0.5,
        emissive: 0x1a1508, emissiveIntensity: 0.2,
      });
      const inner = new THREE.Mesh(innerRing, innerMat);
      inner.rotation.x = -Math.PI / 2;
      inner.position.y = 0.003;
      battleScene.add(inner);

      // Center mark — cross pattern
      const centerGeo = new THREE.PlaneGeometry(0.06, 0.8);
      const centerMat = new THREE.MeshBasicMaterial({ color: 0x5a4a1a });
      for (let r = 0; r < 2; r++) {
        const mark = new THREE.Mesh(centerGeo, centerMat);
        mark.rotation.x = -Math.PI / 2;
        mark.rotation.z = r * Math.PI / 2;
        mark.position.y = 0.004;
        battleScene.add(mark);
      }

      // Background pillars — stone columns with torch-like glow
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2;
        const radius = 7;
        const pillarGeo = new THREE.CylinderGeometry(0.2, 0.25, 5, 8);
        const pillarMat = new THREE.MeshStandardMaterial({
          color: 0x1d1a28, metalness: 0.5, roughness: 0.5,
        });
        const pillar = new THREE.Mesh(pillarGeo, pillarMat);
        pillar.position.set(Math.cos(angle) * radius, 2.5, Math.sin(angle) * radius);
        pillar.castShadow = true;
        battleScene.add(pillar);

        // Gold cap
        const capGeo = new THREE.CylinderGeometry(0.28, 0.2, 0.2, 8);
        const capMat = new THREE.MeshStandardMaterial({
          color: 0xeeb72b, metalness: 0.7, roughness: 0.3,
          emissive: 0x553300, emissiveIntensity: 0.3,
        });
        const cap = new THREE.Mesh(capGeo, capMat);
        cap.position.set(Math.cos(angle) * radius, 5.1, Math.sin(angle) * radius);
        battleScene.add(cap);

        // Torch point light (warm, small radius)
        if (i % 2 === 0) {
          const torch = new THREE.PointLight(0xff8833, 0.6, 5, 2);
          torch.position.set(Math.cos(angle) * radius, 5.3, Math.sin(angle) * radius);
          battleScene.add(torch);
        }
      }

      // Background ground plane extending into darkness
      const bgFloorGeo = new THREE.PlaneGeometry(40, 40);
      const bgFloorMat = new THREE.MeshStandardMaterial({
        color: 0x0a0812, metalness: 0.2, roughness: 0.9,
      });
      const bgFloor = new THREE.Mesh(bgFloorGeo, bgFloorMat);
      bgFloor.rotation.x = -Math.PI / 2;
      bgFloor.position.y = -0.15;
      bgFloor.receiveShadow = true;
      battleScene.add(bgFloor);

      // Place fighters
      const p1Char = CHARACTERS.find(c => c.id === selectedP1);
      const p2Char = CHARACTERS.find(c => c.id === selectedP2);

      const p1Group = buildFighterGroup(selectedP1);
      const p2Group = buildFighterGroup(selectedP2);

      // Only override X for arena placement — preserve the Y offset
      // computed by buildFighterGroup that puts feet on the ground.
      p1Group.position.x = -1.8;
      p2Group.position.x = 1.8;
      // Side-view: characters face along X axis.
      // Models face +Z by default, so PI/2 = face right, -PI/2 = face left
      p1Group.rotation.y = Math.PI / 2;   // P1 faces right
      p2Group.rotation.y = -Math.PI / 2;  // P2 faces left

      battleScene.add(p1Group);
      battleScene.add(p2Group);

      // HUD
      document.getElementById('p1-hud-name').textContent = p1Char.name;
      document.getElementById('p2-hud-name').textContent = p2Char.name;

      gameState = {
        p1: { group: p1Group, char: p1Char, hp: 100, maxHp: 100, x: -1.8, combo: 0, lastHit: 0, blocking: false, cooldown: 0, stunned: 0, sidestepping: false,
               bounds: characterBounds[selectedP1], baseY: p1Group.position.y },
        p2: { group: p2Group, char: p2Char, hp: 100, maxHp: 100, x: 1.8, combo: 0, lastHit: 0, blocking: false, cooldown: 0, stunned: 0, sidestepping: false, ai: true,
               bounds: characterBounds[selectedP2], baseY: p2Group.position.y },
        timer: 99,
        round: 1,
        lastTimerTick: Date.now(),
        paused: false,
      };

      updateHealthBars();

      // Enable shadow casting on fighter meshes
      [p1Group, p2Group].forEach(g => {
        g.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
      });

      // Initialize combat state machine + animation controller for both fighters
      initializeFighterAnimationController(gameState.p1);
      initializeFighterAnimationController(gameState.p2);

      // Attempt weapon attachment (only works if models are rigged with bones)
      attachWeaponToFighter(gameState.p1);
      attachWeaponToFighter(gameState.p2);
    }

    function buildFighterGroup(charId) {
      const group = cloneCharacterModel(charId, 1.6);

      // Measure final scaled dimensions for colliders.
      group.updateMatrixWorld(true);
      const finalBox = getRenderableBounds(group);
      const finalSize = finalBox.getSize(new THREE.Vector3());
      characterBounds[charId] = {
        hw: finalSize.x / 2,   // half-width
        hh: finalSize.y / 2,   // half-height
        hd: finalSize.z / 2,   // half-depth
      };

      return group;
    }

    function updateHealthBars() {
      if (!gameState) return;
      const p1Pct = Math.max(0, gameState.p1.hp / gameState.p1.maxHp * 100);
      const p2Pct = Math.max(0, gameState.p2.hp / gameState.p2.maxHp * 100);
      document.getElementById('p1-health').style.width = p1Pct + '%';
      document.getElementById('p2-health').style.width = p2Pct + '%';
      document.getElementById('p1-health-text').textContent = Math.ceil(p1Pct) + '%';
      document.getElementById('p2-health-text').textContent = Math.ceil(p2Pct) + '%';
      document.getElementById('hud-timer').textContent = Math.ceil(gameState.timer);
    }

    function showDamage(amount, isP1Target) {
      const el = document.createElement('div');
      el.className = 'damage-num';
      el.textContent = '-' + amount;
      el.style.color = amount >= 15 ? '#ff4444' : amount >= 10 ? '#ffaa33' : '#eeb72b';
      el.style.fontSize = amount >= 15 ? '2.5rem' : amount >= 10 ? '2rem' : '1.5rem';
      el.style.left = isP1Target ? '25%' : '70%';
      el.style.top = '30%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function showCombo(player, count) {
      const el = document.getElementById('combo-' + player);
      if (count >= 2) {
        el.textContent = count + ' HIT COMBO!';
        el.classList.add('active');
        clearTimeout(el._timeout);
        el._timeout = setTimeout(() => el.classList.remove('active'), 1500);
      }
    }

    // ===== ATTACK LOGIC (Hitbox/Hurtbox) =====
    // Called by the combat state machine during active frames (once per attack).
    // Timing is governed by DEFAULT_ATTACK_DEFS — no cooldown set here.
    // Trigger dodge for a fighter (jady-deth sidestep pattern)
    function triggerDodge(fighter) {
      if (!fighter?.combat || fighter.hp <= 0) return false;
      const s = fighter.combat.state;
      if (s === FIGHTER_STATES.KO || s === FIGHTER_STATES.KNOCKDOWN || s === FIGHTER_STATES.DODGE
          || s === FIGHTER_STATES.HIT_REACT || s === FIGHTER_STATES.BLOCK_STUN
          || isAttackState(s)) return false;
      if (fighter.cooldown > 0 || fighter.stunned > 0) return false;
      setFighterState(fighter, FIGHTER_STATES.DODGE, { force: true });
      fighter.sidestepping = true;
      fighter.cooldown = 600;
      applyPhysicsDodge(fighter);
      playSound(SFX.DODGE);
      return true;
    }

    function performAttack(attacker, defender, attackState) {
      const def = getAttackDef(attacker, attackState);
      if (!def) return;

      // --- Sound on attack initiation ---
      playAttackSound(attackState);

      // --- Dodge invulnerability (jady-deth: sidestepping blocks all hits) ---
      if (defender.sidestepping) {
        playSound(SFX.WHOOSH); // whiff sound
        return;
      }

      // --- RANGED ATTACK: spawn projectile instead of melee hitbox ---
      if (def.ranged) {
        spawnProjectile(attacker, def, attackState);
        playSound(SFX.PROJECTILE);
        const facingRight = getFighterFacingDir(attacker) > 0;
        spawnSlashVFX(attacker.x + (facingRight ? 0.3 : -0.3), attacker.bounds.hh, facingRight, def.projColor || 0xeeb72b);
        spawnImpactSparks(attacker.x, attacker.bounds.hh, 4, def.projColor || 0xeeb72b);
        triggerScreenShake(def.category === 'special' ? 0.12 : 0.05);
        return;
      }

      // --- Hitbox range check: attack must physically reach defender ---
      const attackBox = getAttackHitbox(attacker, attackState);
      const defenderBody = getBodyCollider(defender);
      if (!attackBox || !attackBox.intersectsBox(defenderBody)) {
        // Whiff — state machine still plays recovery, no extra cooldown needed
        if (debugColliders) {
          const helper = new THREE.Box3Helper(attackBox, 0xff0000);
          battleScene.add(helper);
          debugHelpers.push(helper);
          setTimeout(() => { battleScene.remove(helper); }, 150);
        }
        return;
      }

      // --- Hit confirmed: determine which zone was struck ---
      const hurtboxes = getHurtboxes(defender);
      let hitZone = 'mid'; // default
      if (attackBox.intersectsBox(hurtboxes.upper)) hitZone = 'upper';
      else if (attackBox.intersectsBox(hurtboxes.lower)) hitZone = 'lower';

      // Flash green hitbox in debug mode
      if (debugColliders) {
        const helper = new THREE.Box3Helper(attackBox, 0x00ff00);
        battleScene.add(helper);
        debugHelpers.push(helper);
        setTimeout(() => { battleScene.remove(helper); }, 200);
      }

      const now = Date.now();

      // --- PARRY CHECK: if defender is blocking within parry window ---
      if (defender.blocking && defender.combat?.blockStartTime > 0) {
        const blockElapsed = now - defender.combat.blockStartTime;
        if (blockElapsed <= PARRY_WINDOW_MS) {
          // PARRY! Deflect and stun attacker
          setFighterState(defender, FIGHTER_STATES.PARRY, { force: true });
          setFighterState(attacker, FIGHTER_STATES.BLOCK_STUN, { force: true });
          attacker.stunned = PARRY_STUN_MS;
          spawnParryVFX(defender, attacker);
          triggerScreenShake(0.18);
          playSound(SFX.PARRY);
          return; // no damage on parry
        }
      }

      // --- Damage from attack def ---
      let baseDmg = def.baseDmg + Math.floor(attacker.char.atk * def.dmgScale);

      // Zone damage modifier: headshots hurt more, leg hits less
      if (hitZone === 'upper') baseDmg = Math.floor(baseDmg * 1.25);
      else if (hitZone === 'lower') baseDmg = Math.floor(baseDmg * 0.8);

      // Defense reduction
      let finalDmg = baseDmg;
      if (defender.blocking) {
        // Normal block: chip damage
        finalDmg = Math.max(1, Math.floor(baseDmg * 0.2));
        // Heavy finishers and specials cause block stun
        if (def.category === 'special') attacker.stunned = 600;
        playSound(SFX.BLOCK);
      } else {
        finalDmg = Math.max(1, baseDmg - Math.floor(defender.char.def * 0.3));
      }

      // Random variance
      finalDmg += Math.floor(Math.random() * 3) - 1;
      finalDmg = Math.max(1, finalDmg);

      // Combo tracking
      if (now - defender.lastHit < 1500) {
        attacker.combo++;
        if (attacker.combo >= 3) finalDmg = Math.floor(finalDmg * 1.3);
      } else {
        attacker.combo = 1;
      }
      defender.lastHit = now;

      defender.hp = Math.max(0, defender.hp - finalDmg);

      // Hit confirmation sound (jady-deth pattern: play hit sfx on confirmed damage)
      if (!defender.blocking) playSound(SFX.HIT);

      // Visual feedback — push into hit_react or knockdown via state machine
      if (defender.combat) {
        if (defender.hp <= 0) {
          setFighterState(defender, FIGHTER_STATES.KO, { force: true });
          playSound(SFX.KO);
        } else if (def.knocksDown && !defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.KNOCKDOWN, { force: true });
        } else if (!defender.blocking) {
          setFighterState(defender, FIGHTER_STATES.HIT_REACT, { force: true });
        }
      }

      // VFX + screen shake
      spawnAttackVFX(attacker, defender, attackState, defender.blocking);
      const shakeAmount = defender.blocking ? 0.05
        : (def.category === 'special' ? 0.25 : def.category === 'heavy' ? 0.12 : 0.06);
      triggerScreenShake(shakeAmount);

      const isP1Target = defender === gameState.p1;
      showDamage(finalDmg, isP1Target);
      showCombo(isP1Target ? 'p2' : 'p1', attacker.combo);

      // Knockback: use Rapier impulse for natural physics-driven movement
      if (!defender.blocking) {
        applyPhysicsKnockback(attacker, defender, def.knockback, def.knocksDown);
      }

      updateHealthBars();

      // Check KO
      if (defender.hp <= 0) {
        endRound(attacker === gameState.p1 ? 'p1' : 'p2');
      }
    }

    // ===== AI (jady-deth interval pattern + no-repeat + dodge reaction) =====
    let aiAttackTimer = 0;
    let aiLastAttacks = [null, null]; // track last 2 for no-repeat rule (Deth.jsx:51-56)

    function getAIAttackInterval(ai) {
      // Difficulty scaling: faster attacks as AI loses health (5s → 2s)
      const hpRatio = ai.hp / ai.maxHp;
      return 2000 + hpRatio * 3000; // 5000ms at full HP, 2000ms at 0 HP
    }

    function aiChooseAttack() {
      // jady-deth no-repeat: if last two were same category, force different
      const categories = ['light', 'heavy', 'special'];
      let choice;
      if (aiLastAttacks[0] === aiLastAttacks[1] && aiLastAttacks[0] !== null) {
        // Force different
        const others = categories.filter(c => c !== aiLastAttacks[0]);
        choice = others[Math.floor(Math.random() * others.length)];
      } else {
        // Weighted random: 40% light, 35% heavy, 25% special
        const r = Math.random();
        if (r < 0.40) choice = 'light';
        else if (r < 0.75) choice = 'heavy';
        else choice = 'special';
      }
      aiLastAttacks = [aiLastAttacks[1], choice];
      return choice;
    }

    function updateAI(dt) {
      if (!gameState || gameState.paused) return;
      const ai = gameState.p2;
      const player = gameState.p1;
      if (!ai.ai || ai.hp <= 0 || player.hp <= 0) return;

      ai.cooldown = Math.max(0, ai.cooldown - dt);
      ai.stunned = Math.max(0, ai.stunned - dt);

      const dist = Math.abs(ai.x - player.x);

      // AI movement intent
      let aiMoveIntent = 0;
      const aiLocked = isAttackState(ai.combat?.state)
        || ai.combat?.state === FIGHTER_STATES.HIT_REACT
        || ai.combat?.state === FIGHTER_STATES.KNOCKDOWN
        || ai.combat?.state === FIGHTER_STATES.KO
        || ai.combat?.state === FIGHTER_STATES.PARRY
        || ai.combat?.state === FIGHTER_STATES.BLOCK_STUN
        || ai.combat?.state === FIGHTER_STATES.DODGE;
      if (!aiLocked) {
        const moveSpeed = 1.5 * (ai.char.spd / 10);
        if (dist > 1.2) {
          aiMoveIntent = player.x > ai.x ? 1 : -1;
          setPhysicsMovement(ai, aiMoveIntent * moveSpeed);
        } else if (dist < 0.6) {
          aiMoveIntent = player.x > ai.x ? -1 : 1;
          setPhysicsMovement(ai, aiMoveIntent * moveSpeed * 0.5);
        } else if (ai.rigidBody) {
          const v = ai.rigidBody.linvel();
          ai.rigidBody.setLinvel({ x: v.x * 0.85, y: v.y, z: v.z }, true);
        }
      }

      // Face player along X axis (side-view)
      ai.group.rotation.y = player.x < ai.x ? -Math.PI / 2 : Math.PI / 2;

      // --- Interval-based attack (jady-deth Deth.jsx:121 pattern) ---
      aiAttackTimer += dt;
      const interval = getAIAttackInterval(ai);
      let aiBlock = false;

      if (aiAttackTimer >= interval && !aiLocked && ai.cooldown <= 0 && ai.stunned <= 0) {
        aiAttackTimer = 0;

        if (dist < 1.8) {
          // In range: attack with no-repeat selection
          const category = aiChooseAttack();
          processComboInput(ai, category);
        } else if (dist < 3.0) {
          // Mid-range: sometimes block, sometimes approach
          if (Math.random() < 0.3) aiBlock = true;
        }
      }

      // --- Dodge reaction: AI sidesteps player heavy/special attacks (20% chance) ---
      if (!aiLocked && ai.cooldown <= 0 && isAttackState(player.combat?.state)) {
        const playerDef = getAttackDef(player, player.combat.attackType);
        if (playerDef && (playerDef.category === 'heavy' || playerDef.category === 'special')
            && player.combat.stateTime < playerDef.activeStart) {
          if (Math.random() < 0.003) { // ~20% over windup frames at 60fps
            triggerDodge(ai);
          }
        }
      }

      // --- Blocking: AI blocks briefly when close and not attacking ---
      if (!aiLocked && dist < 1.0 && isAttackState(player.combat?.state) && Math.random() < 0.01) {
        aiBlock = true;
      }

      // Update AI state machine
      updateFighterStateMachine(ai, player, dt, aiMoveIntent, aiBlock);
    }

    // ===== ROUND LOGIC =====
    function endRound(winner) {
      gameState.paused = true;
      battleActive = false;

      // Set winner/loser animation states
      const winFighter = winner === 'p1' ? gameState.p1 : gameState.p2;
      const loseFighter = winner === 'p1' ? gameState.p2 : gameState.p1;
      if (winFighter.combat) setFighterState(winFighter, FIGHTER_STATES.VICTORY, { force: true });
      if (loseFighter.combat) setFighterState(loseFighter, FIGHTER_STATES.KO, { force: true });

      setTimeout(() => {
        const overlay = document.getElementById('ko-overlay');
        const winnerChar = winner === 'p1' ? gameState.p1.char : gameState.p2.char;
        document.getElementById('winner-text').textContent = winnerChar.name + ' WINS!';
        overlay.classList.add('active');
      }, 500);
    }

    function showRoundStart() {
      return new Promise(resolve => {
        const overlay = document.getElementById('round-overlay');
        const text = document.getElementById('round-text');
        text.textContent = 'Round ' + gameState.round;
        overlay.classList.add('active');
        setTimeout(() => {
          text.textContent = 'FIGHT!';
          text.style.color = '#d74242';
          setTimeout(() => {
            overlay.classList.remove('active');
            text.style.color = '';
            resolve();
          }, 800);
        }, 1200);
      });
    }

    // ===== BATTLE LOOP =====
    let lastFrameTime = 0;
    function battleLoop(timestamp) {
      // Proper delta time instead of hardcoded 16ms
      const dt = lastFrameTime ? Math.min(timestamp - lastFrameTime, 50) : 16;
      lastFrameTime = timestamp;

      // Poll gamepad every frame
      pollGamepad();

      // Gamepad rebind: if settings are open and we're waiting for a GP button
      if (settingsOpen && rebindTarget && rebindTarget.type === 'gp') {
        const btn = gpAnyButtonDown();
        if (btn >= 0) finishRebind('gp', rebindTarget.action, btn);
      }

      // Gamepad menu/debug in battle
      if (gpActionDown('menu') && battleActive && gameState && !gameState.paused) backToSelect();
      if (gpActionDown('debug')) {
        debugColliders = !debugColliders;
        if (!debugColliders) clearDebugHelpers();
        document.getElementById('debug-state-overlay').classList.toggle('active', debugColliders);
      }

      if (!battleActive && !gameState?.paused) {
        if (battleRenderer) battleRenderer.render(battleScene, battleCamera);
        requestAnimationFrame(battleLoop);
        return;
      }

      const now = Date.now();

      if (gameState && !gameState.paused) {
        // Timer
        if (now - gameState.lastTimerTick >= 1000) {
          gameState.timer = Math.max(0, gameState.timer - 1);
          gameState.lastTimerTick = now;
          if (gameState.timer <= 0) {
            endRound(gameState.p1.hp >= gameState.p2.hp ? 'p1' : 'p2');
          }
        }

        // Cooldowns
        gameState.p1.cooldown = Math.max(0, gameState.p1.cooldown - dt);
        gameState.p1.stunned = Math.max(0, gameState.p1.stunned - dt);

        // Player input — compute move intent (keyboard + gamepad)
        const p1 = gameState.p1;
        const moveSpeed = 2.5 * (p1.char.spd / 10);
        let p1MoveIntent = 0;
        if (keys[kbBinds.move_left] || keys['ArrowLeft']) p1MoveIntent -= 1;
        if (keys[kbBinds.move_right] || keys['ArrowRight']) p1MoveIntent += 1;
        // Gamepad stick/dpad
        const gpX = gpMoveX();
        if (Math.abs(gpX) > 0.01) p1MoveIntent = gpX;

        // Only allow movement in non-locked states
        const p1Locked = isAttackState(p1.combat?.state)
          || p1.combat?.state === FIGHTER_STATES.HIT_REACT
          || p1.combat?.state === FIGHTER_STATES.KNOCKDOWN
          || p1.combat?.state === FIGHTER_STATES.KO
          || p1.combat?.state === FIGHTER_STATES.PARRY
          || p1.combat?.state === FIGHTER_STATES.BLOCK_STUN;
        if (!p1Locked && p1MoveIntent !== 0) {
          setPhysicsMovement(p1, p1MoveIntent * moveSpeed);
        } else if (!p1Locked && p1.rigidBody) {
          // Decelerate when no input
          const v = p1.rigidBody.linvel();
          p1.rigidBody.setLinvel({ x: v.x * 0.85, y: v.y, z: v.z }, true);
        }

        // Face opponent along X axis (side-view)
        p1.group.rotation.y = gameState.p2.x > p1.x ? Math.PI / 2 : -Math.PI / 2;

        // Gamepad attack buttons (checked once per frame after pollGamepad)
        if (gpActionDown('punch')) processComboInput(p1, 'light');
        if (gpActionDown('kick')) processComboInput(p1, 'heavy');
        if (gpActionDown('special')) processComboInput(p1, 'special');

        // Dodge: double-tap block or tap when not holding
        // Track block press timing for dodge vs block disambiguation
        const blockPressed = !!keys[kbBinds.block] || gpActionHeld('block');
        if (blockPressed && !gameState._blockWasHeld) {
          gameState._blockPressTime = now;
        }
        gameState._blockWasHeld = blockPressed;

        // Dodge on block release within 150ms (quick tap = dodge, hold = block)
        const blockHeld = blockPressed && (now - (gameState._blockPressTime || 0) > 150);
        if (!blockPressed && gameState._blockPressTime && (now - gameState._blockPressTime <= 150)) {
          triggerDodge(p1);
          gameState._blockPressTime = 0;
        }

        // Update state machines (state machine drives blocking, not raw key)
        updateFighterStateMachine(p1, gameState.p2, dt, p1MoveIntent, blockHeld);

        // AI
        updateAI(dt);

        // --- COLLIDER SYSTEM: body collision response ---
        resolveBodyCollision(gameState.p1, gameState.p2);

        // --- Debug collider visualization ---
        if (debugColliders) drawDebugColliders();

        updateHealthBars();
      }

      // Always update animations + VFX + shake (even when paused — KO / victory still animate)
      if (gameState) {
        // --- Rapier physics step ---
        if (physicsWorld && !gameState.paused) {
          physicsWorld.step();
          syncFighterFromPhysics(gameState.p1);
          syncFighterFromPhysics(gameState.p2);
        }

        // --- Dodge: clear sidestepping flag when dodge state ends ---
        for (const f of [gameState.p1, gameState.p2]) {
          if (f.combat?.state !== FIGHTER_STATES.DODGE) f.sidestepping = false;
        }

        // --- Animation momentum: scale playback speed by horizontal velocity ---
        for (const f of [gameState.p1, gameState.p2]) {
          if (f.animation?.currentAction && f.rigidBody) {
            const vx = Math.abs(f.rigidBody.linvel().x);
            const state = f.combat?.state;
            if (state === FIGHTER_STATES.WALK_FWD || state === FIGHTER_STATES.WALK_BACK ||
                state === FIGHTER_STATES.RUN_FWD || state === FIGHTER_STATES.RUN_BACK) {
              f.animation.currentAction.timeScale = 0.6 + Math.min(vx / 3, 1.4);
            } else if (!isAttackState(state)) {
              f.animation.currentAction.timeScale = 1.0;
            }
          }
          // Landing squash/stretch: detect landing from airborne
          if (f.rigidBody) {
            const vy = f.rigidBody.linvel().y;
            const onGround = f.group.position.y < 0.05;
            if (f._wasAirborne && onGround && vy > -0.5) {
              // Squash on landing
              f.group.scale.set(1.06, 0.92, 1.06);
              f._landingTimer = 120;
            }
            f._wasAirborne = !onGround && vy < -0.5;
            if (f._landingTimer > 0) {
              f._landingTimer -= dt;
              const t = Math.max(0, f._landingTimer / 120);
              f.group.scale.lerp(new THREE.Vector3(1, 1, 1), 1 - t);
              if (f._landingTimer <= 0) f.group.scale.set(1, 1, 1);
            }
          }
        }

        // Animation mixers
        if (gameState.p1.animation?.mixer) gameState.p1.animation.mixer.update(dt / 1000);
        if (gameState.p2.animation?.mixer) gameState.p2.animation.mixer.update(dt / 1000);
        updateVFX(dt);
        updateProjectiles(dt);
        updateBattleCamera(dt);

        // Debug state overlay
        if (debugColliders) {
          document.getElementById('ds-p1').textContent = gameState.p1.combat?.state || '-';
          document.getElementById('ds-p2').textContent = gameState.p2.combat?.state || '-';
        }
      }

      if (battleRenderer && battleScene && battleCamera) {
        battleRenderer.render(battleScene, battleCamera);
      }
      requestAnimationFrame(battleLoop);
    }

    // ===== INPUT =====
    document.addEventListener('keydown', (e) => {
      // Skip if rebind is capturing (handled in capture-phase listener above)
      if (settingsOpen && rebindTarget && rebindTarget.type === 'kb') return;

      keys[e.code] = true;

      // Toggle debug colliders + state overlay
      if (e.code === kbBinds.debug) {
        debugColliders = !debugColliders;
        if (!debugColliders) clearDebugHelpers();
        document.getElementById('debug-state-overlay').classList.toggle('active', debugColliders);
      }

      if (!battleActive || !gameState || gameState.paused) return;
      const p1 = gameState.p1;

      if (e.code === kbBinds.punch) processComboInput(p1, 'light');
      if (e.code === kbBinds.kick) processComboInput(p1, 'heavy');
      if (e.code === kbBinds.special) processComboInput(p1, 'special');
      if (e.code === kbBinds.menu) backToSelect();
    });

    document.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    // ===== NAVIGATION =====
    window.showCharSelect = function() {
      document.getElementById('title-screen').classList.remove('active');
      document.getElementById('char-select').classList.add('active');
      selectedP1 = null; selectedP2 = null;
      selectingPlayer = 1;
      document.getElementById('select-phase').textContent = 'SELECT PLAYER 1 WARRIOR';
      document.getElementById('start-fight-btn').disabled = true;
      buildCharList();
      if (!previewRenderer) initPreviewRenderer();
      // Show first character
      if (CHARACTERS.length > 0) showCharacterInPreview(CHARACTERS[0].id);
      updateControlsHUD();
    };

    window.showViewer = function() {
      // Same as char select but without fight button
      window.showCharSelect();
    };

    window.backToTitle = function() {
      document.getElementById('char-select').classList.remove('active');
      document.getElementById('battle-arena').classList.remove('active');
      document.getElementById('ko-overlay').classList.remove('active');
      document.getElementById('round-overlay').classList.remove('active');
      document.getElementById('title-screen').classList.add('active');
      battleActive = false;
      if (gameState) gameState.paused = true;
    };

    window.backToSelect = function() {
      document.getElementById('battle-arena').classList.remove('active');
      document.getElementById('ko-overlay').classList.remove('active');
      document.getElementById('round-overlay').classList.remove('active');
      battleActive = false;
      if (gameState) gameState.paused = true;
      clearProjectiles();
      cleanupBattlePhysics();
      if (gameState?.p1) gameState.p1.rigidBody = null;
      if (gameState?.p2) gameState.p2.rigidBody = null;
      window.showCharSelect();
    };

    window.startFight = async function() {
      if (!selectedP1 || !selectedP2) return;
      document.getElementById('char-select').classList.remove('active');
      document.getElementById('battle-arena').classList.add('active');

      initBattle();
      initBattlePhysics();
      // Create rigid bodies for both fighters after initBattle sets up gameState
      if (gameState?.p1) createFighterRigidBody(gameState.p1);
      if (gameState?.p2) createFighterRigidBody(gameState.p2);
      battleLoop();

      await showRoundStart();
      battleActive = true;
      gameState.paused = false;
      gameState.lastTimerTick = Date.now();
      aiAttackTimer = 0;
      aiLastAttacks = [null, null];
    };

    // ===== RESIZE =====
    window.addEventListener('resize', () => {
      if (previewRenderer && document.getElementById('char-select').classList.contains('active')) {
        const parent = document.getElementById('preview-canvas').parentElement;
        previewRenderer.setSize(parent.clientWidth, parent.clientHeight);
        previewCamera.aspect = parent.clientWidth / parent.clientHeight;
        previewCamera.updateProjectionMatrix();
      }
      if (battleRenderer && document.getElementById('battle-arena').classList.contains('active')) {
        battleRenderer.setSize(window.innerWidth, window.innerHeight);
        battleCamera.aspect = window.innerWidth / window.innerHeight;
        battleCamera.updateProjectionMatrix();
      }
    });
  </script>
</body>
</html>
