<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grudge Warlords: Final Fighter</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=MedievalSharp&family=IM+Fell+English+SC&family=Uncial+Antiqua&family=Spectral+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #eeb72b;
      --gold-light: #f5d789;
      --gold-dark: #7a601f;
      --gold-mid: #cca133;
      --bg-darkest: #0e111b;
      --bg-dark: #121621;
      --bg-mid: #1d2130;
      --bg-accent: #262d40;
      --fg: #ede9de;
      --fg-muted: #a8a18a;
      --red: #981b1b;
      --red-bright: #d74242;
      --green-bright: #00c758;
      --blue-bright: #3080ff;
      --purple: #ac4bff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Spectral SC', 'IM Fell English SC', serif;
      background: var(--bg-darkest);
      color: var(--fg);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: default;
    }

    /* ===== LOADING SCREEN ===== */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-darkest);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3rem; color: var(--gold);
      text-shadow: 0 0 30px rgba(238,183,43,0.4);
      letter-spacing: 0.15em;
    }
    #loading-screen .subtitle {
      font-family: 'MedievalSharp', cursive;
      color: var(--fg-muted); font-size: 1.2rem;
      margin-top: 0.5rem; letter-spacing: 0.3em;
    }
    .loading-bar-container {
      width: 400px; height: 8px; background: var(--bg-mid);
      border: 1px solid var(--gold-dark); border-radius: 4px;
      margin-top: 2rem; overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%; border-radius: 4px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      transition: width 0.3s;
    }
    .loading-text {
      font-family: 'IM Fell English SC', serif;
      color: var(--fg-muted); font-size: 0.85rem; margin-top: 1rem;
    }

    /* ===== TITLE / MENU SCREEN ===== */
    #title-screen {
      position: fixed; inset: 0; z-index: 900;
      background: radial-gradient(ellipse at center, #1a1f2e 0%, var(--bg-darkest) 70%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #title-screen.active { display: flex; }
    .title-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: 4rem; font-weight: 900; color: var(--gold);
      text-shadow: 0 0 40px rgba(238,183,43,0.5), 0 4px 8px rgba(0,0,0,0.6);
      letter-spacing: 0.1em; text-align: center;
    }
    .title-sub {
      font-family: 'MedievalSharp', cursive;
      font-size: 1.8rem; color: var(--gold-mid);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
      margin-top: 0.5rem; letter-spacing: 0.3em;
    }
    .studio-badge {
      font-family: 'Uncial Antiqua', cursive;
      color: var(--fg-muted); font-size: 0.9rem;
      letter-spacing: 0.2em; margin-top: 3rem;
      border: 1px solid var(--gold-dark); padding: 0.5rem 1.5rem;
      border-radius: 2px; background: rgba(122,96,31,0.1);
    }
    .menu-btn {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem; color: var(--gold);
      background: linear-gradient(180deg, rgba(238,183,43,0.1), rgba(122,96,31,0.2));
      border: 2px solid var(--gold-dark);
      padding: 1rem 3rem; margin-top: 1.5rem;
      cursor: pointer; letter-spacing: 0.15em;
      transition: all 0.3s; min-width: 300px; text-align: center;
    }
    .menu-btn:hover {
      background: linear-gradient(180deg, rgba(238,183,43,0.25), rgba(122,96,31,0.35));
      border-color: var(--gold); color: var(--gold-light);
      box-shadow: 0 0 20px rgba(238,183,43,0.2);
      transform: scale(1.03);
    }

    /* ===== CHARACTER SELECT ===== */
    #char-select {
      position: fixed; inset: 0; z-index: 800;
      background: var(--bg-darkest);
      display: none; flex-direction: column;
    }
    #char-select.active { display: flex; }
    .select-header {
      text-align: center; padding: 1.5rem;
      border-bottom: 1px solid var(--gold-dark);
      background: linear-gradient(180deg, var(--bg-dark), var(--bg-darkest));
    }
    .select-header h2 {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
    }
    .select-header .player-label {
      font-family: 'MedievalSharp', cursive;
      font-size: 1rem; color: var(--fg-muted);
      letter-spacing: 0.2em; margin-top: 0.3rem;
    }
    .select-body {
      flex: 1; display: flex; overflow: hidden;
    }
    .select-sidebar {
      width: 360px; overflow-y: auto; padding: 1rem;
      border-right: 1px solid var(--gold-dark);
      background: rgba(18,22,33,0.9);
    }
    .select-sidebar::-webkit-scrollbar { width: 6px; }
    .select-sidebar::-webkit-scrollbar-track { background: var(--bg-darkest); }
    .select-sidebar::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
    .char-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.8rem 1rem; margin-bottom: 0.5rem;
      border: 1px solid var(--bg-accent);
      background: var(--bg-mid); cursor: pointer;
      transition: all 0.2s; border-radius: 4px;
    }
    .char-card:hover, .char-card.selected {
      border-color: var(--gold); background: rgba(238,183,43,0.08);
      box-shadow: 0 0 12px rgba(238,183,43,0.15);
    }
    .char-card.selected-p2 {
      border-color: var(--blue-bright); background: rgba(48,128,255,0.08);
      box-shadow: 0 0 12px rgba(48,128,255,0.15);
    }
    .char-card .char-icon {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid var(--gold-dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel Decorative', serif; font-size: 1.2rem;
      color: var(--gold); background: var(--bg-accent);
    }
    .char-card .char-info h3 {
      font-family: 'Cinzel', serif; font-size: 1rem; color: var(--fg);
    }
    .char-card .char-info .char-class {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.8rem; color: var(--fg-muted);
    }
    .char-card .char-info .char-stats {
      display: flex; gap: 0.8rem; margin-top: 0.3rem;
    }
    .stat-pip {
      font-size: 0.7rem; color: var(--gold-mid);
      font-family: 'Spectral SC', serif;
    }
    .select-preview {
      flex: 1; position: relative;
    }
    #preview-canvas {
      width: 100%; height: 100%;
    }
    .preview-name {
      position: absolute; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.5rem; color: var(--gold);
      text-shadow: 0 0 30px rgba(238,183,43,0.4), 0 2px 4px rgba(0,0,0,0.8);
      pointer-events: none; white-space: nowrap;
    }
    .preview-class {
      position: absolute; bottom: 70px; left: 50%;
      transform: translateX(-50%);
      font-family: 'MedievalSharp', cursive;
      font-size: 1.1rem; color: var(--fg-muted);
      letter-spacing: 0.3em; pointer-events: none;
    }
    .select-footer {
      display: flex; justify-content: space-between;
      align-items: center; padding: 1rem 2rem;
      border-top: 1px solid var(--gold-dark);
      background: var(--bg-dark);
    }
    .select-footer .back-btn {
      font-family: 'Cinzel', serif; color: var(--fg-muted);
      background: none; border: 1px solid var(--bg-accent);
      padding: 0.6rem 1.5rem; cursor: pointer;
      transition: all 0.2s; font-size: 0.9rem;
    }
    .select-footer .back-btn:hover {
      color: var(--fg); border-color: var(--fg-muted);
    }
    .fight-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.3rem; color: var(--bg-darkest);
      background: linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-dark));
      border: 2px solid var(--gold);
      padding: 0.8rem 3rem; cursor: pointer;
      letter-spacing: 0.15em;
      transition: all 0.3s; text-transform: uppercase;
    }
    .fight-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(238,183,43,0.4);
    }
    .fight-btn:disabled {
      opacity: 0.4; cursor: not-allowed; transform: none;
      box-shadow: none;
    }

    /* ===== BATTLE ARENA ===== */
    #battle-arena {
      position: fixed; inset: 0; z-index: 700;
      display: none;
    }
    #battle-arena.active { display: block; }
    #battle-canvas {
      width: 100%; height: 100%;
    }

    /* HUD */
    .battle-hud {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 710; pointer-events: none;
      padding: 1rem 2rem;
    }
    .hud-top {
      display: flex; justify-content: space-between;
      align-items: flex-start;
    }
    .player-hud {
      display: flex; flex-direction: column; width: 380px;
    }
    .player-hud.right { align-items: flex-end; }
    .player-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.2rem; letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .p1-name { color: var(--gold); }
    .p2-name { color: var(--blue-bright); }
    .health-bar-outer {
      width: 100%; height: 24px;
      background: var(--bg-darkest);
      border: 2px solid var(--gold-dark);
      border-radius: 2px; overflow: hidden;
      position: relative;
    }
    .health-bar-outer.p2 { border-color: #1e4080; }
    .health-bar-inner {
      height: 100%; transition: width 0.3s;
      border-radius: 1px;
    }
    .health-bar-inner.p1 {
      background: linear-gradient(90deg, #d92626, #ff4444, #d92626);
    }
    .health-bar-inner.p2 {
      background: linear-gradient(90deg, #2662d9, #4488ff, #2662d9);
      float: right;
    }
    .health-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Cinzel', serif; font-size: 0.8rem;
      color: var(--fg); text-shadow: 0 1px 3px #000;
    }
    .hud-timer {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 15px rgba(238,183,43,0.4);
      min-width: 60px; text-align: center;
    }
    .combo-display {
      position: fixed; z-index: 720;
      font-family: 'Cinzel Decorative', serif;
      font-size: 3rem; color: var(--gold-light);
      text-shadow: 0 0 20px rgba(238,183,43,0.6), 0 2px 4px #000;
      pointer-events: none; opacity: 0;
      transition: opacity 0.3s;
    }
    .combo-display.p1 { left: 80px; top: 120px; }
    .combo-display.p2 { right: 80px; top: 120px; color: #93b0ec; text-shadow: 0 0 20px rgba(48,128,255,0.6), 0 2px 4px #000; }
    .combo-display.active { opacity: 1; }

    /* Round / KO Overlay */
    .battle-overlay {
      position: fixed; inset: 0; z-index: 750;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      flex-direction: column;
    }
    .battle-overlay.active { display: flex; }
    .round-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 5rem; color: var(--gold);
      text-shadow: 0 0 50px rgba(238,183,43,0.6), 0 4px 8px #000;
      animation: scaleIn 0.5s ease-out;
    }
    .ko-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: 7rem; color: var(--red-bright);
      text-shadow: 0 0 50px rgba(215,66,66,0.6), 0 4px 8px #000;
      animation: scaleIn 0.3s ease-out;
    }
    .winner-text {
      font-family: 'Cinzel', serif;
      font-size: 2rem; color: var(--gold-light);
      margin-top: 1rem; letter-spacing: 0.2em;
    }

    @keyframes scaleIn {
      from { transform: scale(2); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* Controls HUD */
    .controls-hud {
      position: fixed; bottom: 1rem; left: 50%;
      transform: translateX(-50%); z-index: 710;
      font-family: 'IM Fell English SC', serif;
      color: var(--fg-muted); font-size: 0.8rem;
      text-align: center; pointer-events: none;
      background: rgba(14,17,27,0.8);
      padding: 0.5rem 1.5rem; border-radius: 4px;
      border: 1px solid var(--gold-dark);
    }
    .key-badge {
      display: inline-block;
      background: var(--bg-accent); border: 1px solid var(--gold-dark);
      padding: 0.15rem 0.5rem; border-radius: 3px;
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      color: var(--gold-mid); margin: 0 0.15rem;
    }

    /* Grudge Studio Watermark */
    .gs-watermark {
      position: fixed; bottom: 1rem; right: 1rem;
      z-index: 720; pointer-events: none;
      font-family: 'Uncial Antiqua', cursive;
      font-size: 0.75rem; color: var(--gold-dark);
      opacity: 0.6; letter-spacing: 0.15em;
    }

    /* Damage Numbers */
    .damage-num {
      position: fixed; z-index: 730;
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700; pointer-events: none;
      animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }

    /* Debug State Overlay */
    .debug-state-overlay {
      position: fixed; bottom: 3.5rem; left: 50%;
      transform: translateX(-50%); z-index: 715;
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      color: var(--green-bright); pointer-events: none;
      background: rgba(0,0,0,0.7); padding: 0.4rem 1rem;
      border-radius: 4px; border: 1px solid #1a3a1a;
      display: none; gap: 2rem;
    }
    .debug-state-overlay.active { display: flex; }
    .debug-state-overlay .ds-label {
      color: var(--fg-muted); font-size: 0.65rem;
    }
    .debug-state-overlay .ds-p1 { color: var(--gold); }
    .debug-state-overlay .ds-p2 { color: var(--blue-bright); }

    /* Controller Status */
    .controller-badge {
      position: fixed; top: 1rem; right: 1rem;
      z-index: 760; pointer-events: none;
      font-family: 'IM Fell English SC', serif; font-size: 0.75rem;
      padding: 0.3rem 0.8rem; border-radius: 3px;
      background: rgba(14,17,27,0.85); border: 1px solid var(--bg-accent);
      color: var(--fg-muted); opacity: 0;
      transition: opacity 0.4s, border-color 0.3s, color 0.3s;
    }
    .controller-badge.visible { opacity: 1; }
    .controller-badge.connected { border-color: var(--green-bright); color: var(--green-bright); }
    .controller-badge.disconnected { border-color: var(--red-bright); color: var(--red-bright); }

    /* Settings Overlay */
    #settings-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(10,13,21,0.95);
      display: none; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 2rem; overflow-y: auto;
    }
    #settings-overlay.active { display: flex; }
    .settings-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 2rem; color: var(--gold);
      text-shadow: 0 0 20px rgba(238,183,43,0.3);
      margin-bottom: 1.5rem;
    }
    .settings-section {
      width: 100%; max-width: 560px; margin-bottom: 1.5rem;
    }
    .settings-section h3 {
      font-family: 'Cinzel', serif; font-size: 1rem;
      color: var(--gold-mid); margin-bottom: 0.5rem;
      border-bottom: 1px solid var(--gold-dark); padding-bottom: 0.3rem;
    }
    .bind-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.6rem; margin-bottom: 0.3rem;
      background: var(--bg-mid); border: 1px solid var(--bg-accent);
      border-radius: 3px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .bind-row:hover { border-color: var(--gold-dark); background: var(--bg-accent); }
    .bind-row.listening {
      border-color: var(--gold); background: rgba(238,183,43,0.1);
      animation: pulse-border 1s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { border-color: var(--gold); }
      50% { border-color: var(--gold-dark); }
    }
    .bind-action {
      font-family: 'Spectral SC', serif; font-size: 0.85rem; color: var(--fg);
      min-width: 100px;
    }
    .bind-keys {
      display: flex; gap: 0.5rem; align-items: center;
    }
    .bind-key {
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      background: var(--bg-darkest); border: 1px solid var(--gold-dark);
      padding: 0.2rem 0.5rem; border-radius: 3px; color: var(--gold-mid);
    }
    .bind-gp {
      font-family: 'Spectral SC', serif; font-size: 0.75rem;
      background: #1a2040; border: 1px solid #2a4080;
      padding: 0.2rem 0.5rem; border-radius: 3px; color: #6090dd;
    }
    .bind-hint {
      font-family: 'IM Fell English SC', serif; font-size: 0.7rem;
      color: var(--fg-muted); font-style: italic;
    }
    .settings-actions {
      display: flex; gap: 1rem; margin-top: 1rem;
    }
    .settings-btn {
      font-family: 'Cinzel', serif; font-size: 0.9rem;
      padding: 0.5rem 1.5rem; cursor: pointer;
      border: 1px solid var(--gold-dark); background: var(--bg-mid);
      color: var(--gold-mid); transition: all 0.2s; border-radius: 3px;
    }
    .settings-btn:hover {
      background: var(--bg-accent); border-color: var(--gold); color: var(--gold);
    }
    .settings-btn.primary {
      background: linear-gradient(180deg, rgba(238,183,43,0.15), rgba(122,96,31,0.25));
      border-color: var(--gold); color: var(--gold);
    }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loading-screen">
    <h1>Grudge Warlords</h1>
    <div class="subtitle">FINAL FIGHTER</div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">Summoning warriors...</div>
  </div>

  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-logo">Grudge Warlords</div>
    <div class="title-sub">FINAL FIGHTER</div>
    <div class="studio-badge">GRUDGE STUDIO</div>
    <button class="menu-btn" id="btn-fight" onclick="showCharSelect()">Enter the Arena</button>
    <button class="menu-btn" id="btn-viewer" onclick="showViewer()">Character Viewer</button>
    <button class="menu-btn" id="btn-settings" onclick="showSettings()">Settings</button>
  </div>

  <!-- CHARACTER SELECT -->
  <div id="char-select">
    <div class="select-header">
      <h2>Choose Your Warriors</h2>
      <div class="player-label" id="select-phase">SELECT PLAYER 1 WARRIOR</div>
    </div>
    <div class="select-body">
      <div class="select-sidebar" id="char-list"></div>
      <div class="select-preview">
        <canvas id="preview-canvas"></canvas>
        <div class="preview-name" id="preview-name"></div>
        <div class="preview-class" id="preview-class"></div>
      </div>
    </div>
    <div class="select-footer">
      <button class="back-btn" onclick="backToTitle()">Back</button>
      <button class="fight-btn" id="start-fight-btn" disabled onclick="startFight()">FIGHT!</button>
    </div>
  </div>

  <!-- BATTLE ARENA -->
  <div id="battle-arena">
    <canvas id="battle-canvas"></canvas>
    <div class="battle-hud">
      <div class="hud-top">
        <div class="player-hud">
          <div class="player-name p1-name" id="p1-hud-name"></div>
          <div class="health-bar-outer">
            <div class="health-bar-inner p1" id="p1-health"></div>
            <div class="health-text" id="p1-health-text">100%</div>
          </div>
        </div>
        <div class="hud-timer" id="hud-timer">99</div>
        <div class="player-hud right">
          <div class="player-name p2-name" id="p2-hud-name"></div>
          <div class="health-bar-outer p2">
            <div class="health-bar-inner p2" id="p2-health"></div>
            <div class="health-text" id="p2-health-text">100%</div>
          </div>
        </div>
      </div>
    </div>
    <div class="combo-display p1" id="combo-p1"></div>
    <div class="combo-display p2" id="combo-p2"></div>
    <div class="debug-state-overlay" id="debug-state-overlay">
      <div><span class="ds-label">P1</span> <span class="ds-p1" id="ds-p1">idle</span></div>
      <div><span class="ds-label">P2</span> <span class="ds-p2" id="ds-p2">idle</span></div>
    </div>
    <div class="controls-hud" id="battle-controls"></div>
  </div>

  <!-- Battle Overlays -->
  <div class="battle-overlay" id="round-overlay">
    <div class="round-text" id="round-text"></div>
  </div>
  <div class="battle-overlay" id="ko-overlay">
    <div class="ko-text">K.O.!</div>
    <div class="winner-text" id="winner-text"></div>
    <button class="menu-btn" style="margin-top:2rem" onclick="backToSelect()">Continue</button>

    // ===== PER-CHARACTER BONE MAP (auto-detected at load time) =====
    // UniRig produces different skeleton layouts per character.
    // detectBoneMap() analyzes the skeleton tree to find spine, arms, legs, neck/head.
    const characterBoneMaps = {}; // charId → { hips, spine1, ..., rHand, lFoot, ... }

    // Walk a bone chain (follow first bone child at each level)
    function _followChain(bone) {
      const chain = [bone];
      let cur = bone;
      while (cur) {
        const kids = cur.children.filter(c => c.isBone);
        if (kids.length === 0) break;
        // Follow the longest child (most likely the main chain, not a side branch)
        let best = kids[0];
        if (kids.length > 1) {
          let bestLen = 0;
          for (const k of kids) {
            const len = k.position.length();
            if (len > bestLen) { bestLen = len; best = k; }
          }
        }
        chain.push(best);
        cur = best;
      }
      return chain;
    }

    // Count bone descendants recursively
    function _countBoneDescendants(bone) {
      let count = 0;
      const stack = [bone];
      while (stack.length) {
        const b = stack.pop();
        for (const c of b.children) {
          if (c.isBone) { count++; stack.push(c); }
        }
      }
      return count;
    }

    function detectBoneMap(skeletonRoot) {
      // Collect all bones
      const allBones = [];
      skeletonRoot.traverse(c => { if (c.isBone) allBones.push(c); });
      if (allBones.length === 0) return null;

      // Find root bone (bone_0 — no bone parent)
      const rootBone = allBones.find(b => !b.parent?.isBone) || allBones[0];
      const map = { hips: rootBone.name };

      // Find spine: the root child with the MOST bone descendants
      // (spine leads to chest → arms → fingers = many; legs have few)
      const rootKids = rootBone.children.filter(c => c.isBone);
      if (rootKids.length === 0) return map;
      let spineStart = rootKids[0];
      let bestDesc = -1;
      for (const k of rootKids) {
        const d = _countBoneDescendants(k);
        if (d > bestDesc) { bestDesc = d; spineStart = k; }
      }

      // Follow spine upward: at each branch point, continue with the child
      // that has the most descendants (spine continuation, not legs/cloth).
      // Collect skipped branches as potential leg/cloth candidates.
      const spineChain = [spineStart];
      const skippedBranches = []; // branches skipped during spine traversal (legs, cloth)
      let chest = spineStart;
      while (true) {
        const kids = chest.children.filter(c => c.isBone);
        if (kids.length === 0) break;
        if (kids.length === 1) {
          chest = kids[0];
          spineChain.push(chest);
          continue;
        }
        // Multiple children: pick the one with most descendants as spine continuation
        let bestKid = null, bestKidDesc = -1;
        for (const k of kids) {
          const d = _countBoneDescendants(k);
          if (d > bestKidDesc) { bestKidDesc = d; bestKid = k; }
        }
        // If the best child has significantly more descendants than others, it's spine
        const secondBest = kids.filter(k => k !== bestKid).reduce((max, k) => Math.max(max, _countBoneDescendants(k)), 0);
        if (bestKidDesc > secondBest * 1.5 && kids.length > 2) {
          // Spine continuation — others are legs/cloth
          skippedBranches.push(...kids.filter(k => k !== bestKid));
          chest = bestKid;
          spineChain.push(chest);
          continue;
        }
        break; // True branch point (chest)
      }

      // Store spine bones
      map.spine1 = spineChain[0]?.name || map.hips;
      map.spine2 = (spineChain.length > 1 ? spineChain[1] : spineChain[0])?.name || map.spine1;
      map.chest = chest.name;

      // From chest: find right arm (+X), left arm (-X), neck (small X)
      const chestKids = chest.children.filter(c => c.isBone);
      let rArmStart = null, lArmStart = null, neckStart = null;
      // Sort by X position to identify lateral branches
      const sorted = [...chestKids].sort((a, b) => b.position.x - a.position.x);
      for (const k of sorted) {
        const x = k.position.x;
        if (x > 0.02 && !rArmStart) rArmStart = k;
        else if (x < -0.02 && !lArmStart) lArmStart = k;
        else if (!neckStart) neckStart = k;
      }

      // Neck/head chain
      if (neckStart) {
        const neckChain = _followChain(neckStart);
        map.neck = neckChain[0]?.name || map.chest;
        map.head = (neckChain.length > 1 ? neckChain[1] : neckChain[0])?.name || map.neck;
      } else {
        map.neck = map.chest;
        map.head = map.chest;
      }

      // Arm chains: first 4 bones = shoulder, upperArm, foreArm, hand
      function mapArm(start, prefix) {
        if (!start) { map[prefix+'Shoulder']=map.chest; map[prefix+'UpperArm']=map.chest; map[prefix+'Forearm']=map.chest; map[prefix+'Hand']=map.chest; return; }
        const chain = _followChain(start);
        map[prefix+'Shoulder'] = chain[0]?.name || map.chest;
        map[prefix+'UpperArm'] = (chain[1] || chain[0])?.name || map.chest;
        map[prefix+'Forearm']  = (chain[2] || chain[1] || chain[0])?.name || map.chest;
        map[prefix+'Hand']     = (chain[3] || chain[2] || chain[1] || chain[0])?.name || map.chest;
      }
      mapArm(rArmStart, 'r');
      mapArm(lArmStart, 'l');

      // Legs: from root’s bone children (excluding spine) + branches
      // skipped during spine traversal (e.g. Model001 legs branch from bone_1)
      const legCandidates = [
        ...rootKids.filter(k => k !== spineStart),
        ...skippedBranches,
      ];      // Sort by descendant count descending, take only bones with <=5 descendants (legs, not cloth)
      const legPool = legCandidates
        .map(k => ({ bone: k, desc: _countBoneDescendants(k) }))
        .filter(e => e.desc >= 1 && e.desc <= 5)
        .sort((a, b) => b.desc - a.desc)
        .map(e => e.bone);
      let rLegStart = null, lLegStart = null;
      if (legPool.length >= 2) {
        // Sort by X descending — most-positive-X = right leg, most-negative = left
        const byX = [...legPool].sort((a, b) => b.position.x - a.position.x);
        rLegStart = byX[0];
        lLegStart = byX[1];
      } else if (legPool.length === 1) {
        rLegStart = legPool[0];
      }

      function mapLeg(start, prefix) {
        if (!start) { map[prefix+'Thigh']=map.hips; map[prefix+'Shin']=map.hips; map[prefix+'Foot']=map.hips; return; }
        const chain = _followChain(start);
        map[prefix+'Thigh'] = chain[0]?.name || map.hips;
        map[prefix+'Shin']  = (chain[1] || chain[0])?.name || map.hips;
        map[prefix+'Foot']  = (chain[2] || chain[1] || chain[0])?.name || map.hips;
      }
      mapLeg(rLegStart, 'r');
      mapLeg(lLegStart, 'l');

      return map;
    }

    // Build per-character Mixamo retarget map from detected bone map
    function buildMixamoRetargetMap(boneMap) {
      if (!boneMap) return {};
      return {
        'mixamorigHips': boneMap.hips,
        'mixamorigSpine': boneMap.spine1,
        'mixamorigSpine1': boneMap.spine2,
        'mixamorigSpine2': boneMap.chest,
        'mixamorigNeck': boneMap.neck,
        'mixamorigHead': boneMap.head,
        'mixamorigRightShoulder': boneMap.rShoulder,
        'mixamorigRightArm': boneMap.rUpperArm,
        'mixamorigRightForeArm': boneMap.rForearm,
        'mixamorigRightHand': boneMap.rHand,
        'mixamorigLeftShoulder': boneMap.lShoulder,
        'mixamorigLeftArm': boneMap.lUpperArm,
        'mixamorigLeftForeArm': boneMap.lForearm,
        'mixamorigLeftHand': boneMap.lHand,
        'mixamorigRightUpLeg': boneMap.rThigh,
        'mixamorigRightLeg': boneMap.rShin,
        'mixamorigRightFoot': boneMap.rFoot,
        'mixamorigLeftUpLeg': boneMap.lThigh,
        'mixamorigLeftLeg': boneMap.lShin,
        'mixamorigLeftFoot': boneMap.lFoot,
      };
    }

    // Retarget a Mixamo AnimationClip to work with UniRig bones.
    // Rewrites track names (e.g. "mixamorigHips.quaternion" → "bone_0.quaternion")
    // and drops tracks for bones we don't have (fingers, toes, etc.)
    //
    // Handles multiple Mixamo export formats:
    //   "mixamorigHips.quaternion"         — standard Mixamo GLB
    //   "mixamorig:Hips.quaternion"        — colon-prefix variant
    //   "Armature.mixamorigHips.quaternion" — Blender-exported path
    function retargetMixamoClip(clip, mixamoMap) {
      if (!mixamoMap) return null;
      const retargetedTracks = [];
      let unmapped = 0;
      for (const track of clip.tracks) {
        // Property is always after the LAST dot (e.g. .quaternion, .position)
        const lastDot = track.name.lastIndexOf('.');
        if (lastDot < 0) continue;
        const property = track.name.substring(lastDot); // ".quaternion" etc.
        const path = track.name.substring(0, lastDot);  // everything before property

        // The bone name is the last segment of the path (after any '/' or '.' hierarchy)
        const segments = path.split(/[\/.]/);
        const boneName = segments[segments.length - 1];

        // Try direct lookup first
        let mappedBone = mixamoMap[boneName];

        // Try colon-prefix → standard conversion: "mixamorig:Hips" → "mixamorigHips"
        if (!mappedBone && boneName.startsWith('mixamorig:')) {
          const converted = 'mixamorig' + boneName.substring('mixamorig:'.length);
          mappedBone = mixamoMap[converted];
        }

        // If already a bone_N name (pre-retargeted clip), pass through
        if (!mappedBone && /^bone_\d+$/.test(boneName)) {
          retargetedTracks.push(track.clone());
          continue;
        }

        if (mappedBone) {
          const newTrack = track.clone();
          newTrack.name = mappedBone + property;
          retargetedTracks.push(newTrack);
        } else {
          unmapped++;
        }
      }

      if (retargetedTracks.length === 0) {
        console.warn(`[retarget] ${clip.name}: no tracks mapped (${unmapped} unmapped, ${clip.tracks.length} total).`,
          'Sample track:', clip.tracks[0]?.name);
        return null;
      }
      console.log(`[retarget] ${clip.name}: ${retargetedTracks.length} mapped, ${unmapped} dropped`);
      return new THREE.AnimationClip(clip.name, clip.duration, retargetedTracks);
    }

    // Euler helper → quaternion array for keyframe tracks
    function _eq(x, y, z) {
      const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(x, y, z));
      return [q.x, q.y, q.z, q.w];
    }
    const _ID = _eq(0, 0, 0); // identity quaternion

    // Build a QuaternionKeyframeTrack for a bone
    function _boneTrack(boneName, times, quats) {
      const values = quats.flat();
      return new THREE.QuaternionKeyframeTrack(`${boneName}.quaternion`, times, values);
    }

    // Generate procedural AnimationClips for all combat states
    // B = per-character bone map from detectBoneMap()
    function generateProceduralClips(B) {
      if (!B) return {};
      const clips = {};
      const PI = Math.PI, H = PI / 2, Q = PI / 4, E = PI / 8;

      // --- Fighting stance base pose (arms down, guard up) ---
      // These values bring arms from T-pose into a natural fighting guard
      const RA_IDLE = _eq(0.2, 0, -1.2);   // right upper arm: down + slightly forward
      const LA_IDLE = _eq(0.2, 0, 1.2);    // left upper arm: mirror
      const RF_IDLE = _eq(-1.1, 0, 0);     // right forearm: bent up in guard
      const LF_IDLE = _eq(-1.1, 0, 0);     // left forearm: bent up in guard
      const RA_IDLE2 = _eq(0.18, 0, -1.15); // breathing variation
      const LA_IDLE2 = _eq(0.18, 0, 1.15);
      const RF_IDLE2 = _eq(-1.05, 0, 0);
      const LF_IDLE2 = _eq(-1.05, 0, 0);

      'Share',     // 8
      'Options',   // 9

      'R3',        // 11

      'D-Right',   // 15
      'PS/Guide',  // 16
    ];

    const INPUT_ACTIONS = [
      'move_left', 'move_right', 'punch', 'kick', 'special', 'block', 'menu', 'debug',
    ];

    const ACTION_LABELS = {
      move_left: 'Move Left', move_right: 'Move Right',
      punch: 'Light Attack', kick: 'Heavy Attack', special: 'Special',
      block: 'Block / Parry', menu: 'Menu / Pause', debug: 'Debug',
    };

    const DEFAULT_KB_BINDS = {
      move_left: 'KeyA', move_right: 'KeyD',
      punch: 'KeyJ', kick: 'KeyK', special: 'KeyL',
      block: 'Space', menu: 'Escape', debug: 'Backquote',
    };

    // PS5 DualSense default: Square=punch, Circle=kick, Triangle=special, L1=block
    const DEFAULT_GP_BINDS = {
      punch: 2,    // Square / X
      kick: 1,     // Circle / B
      special: 3,  // Triangle / Y
      block: 4,    // L1 / LB
      menu: 9,     // Options / Start
      debug: 8,    // Share / Back
    };

    const STICK_DEADZONE = 0.25;

    let kbBinds = { ...DEFAULT_KB_BINDS };
    let gpBinds = { ...DEFAULT_GP_BINDS };
    let gpConnected = false;
    let gpIndex = -1;
    let gpPrev = new Array(17).fill(false);
    let gpDown = new Array(17).fill(false); // true only on first frame pressed
    let gpHeld = new Array(17).fill(false);
    let gpStickX = 0;
    let gpStickY = 0;
    let settingsOpen = false;
    let rebindTarget = null; // { type: 'kb'|'gp', action: string }

    function loadBindings() {
      try {
        const saved = localStorage.getItem('ff_bindings');
        if (saved) {
          const data = JSON.parse(saved);
          if (data.kb) Object.assign(kbBinds, data.kb);
          if (data.gp) Object.assign(gpBinds, data.gp);
        }
      } catch (_) { /* ignore corrupt data */ }
    }

    function saveBindings() {
      try {
        localStorage.setItem('ff_bindings', JSON.stringify({ kb: kbBinds, gp: gpBinds }));
      } catch (_) { /* quota exceeded */ }
    }

    function gpButtonName(idx) {
      return GP_BUTTON_NAMES[idx] || `Btn${idx}`;
    }

    function keyCodeLabel(code) {
      if (!code) return '—';
      return code
        .replace('Key', '')
        .replace('Arrow', '↑↓←→'.includes(code.replace('Arrow', '')) ? '' : '→')
        .replace('ArrowLeft', '←').replace('ArrowRight', '→')
        .replace('ArrowUp', '↑').replace('ArrowDown', '↓')
        .replace('Space', 'Space').replace('Backquote', '`')
        .replace('Escape', 'Esc');
    }

    // --- Gamepad connection events ---
    window.addEventListener('gamepadconnected', (e) => {
      gpConnected = true;
      gpIndex = e.gamepad.index;
      const badge = document.getElementById('controller-badge');
      badge.textContent = e.gamepad.id.split('(')[0].trim() || 'Controller';
      badge.className = 'controller-badge visible connected';
      setTimeout(() => { badge.classList.remove('visible'); }, 3000);
      updateControlsHUD();
    });

    window.addEventListener('gamepaddisconnected', () => {
      gpConnected = false;
      gpIndex = -1;
      const badge = document.getElementById('controller-badge');
      badge.textContent = 'Controller Disconnected';
      badge.className = 'controller-badge visible disconnected';
      setTimeout(() => { badge.classList.remove('visible'); }, 3000);
      updateControlsHUD();
    });

    // --- Poll gamepad state each frame ---
    function pollGamepad() {
      if (!gpConnected) return;
      const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
      const gp = gamepads[gpIndex];
      if (!gp) return;

      // Buttons
      for (let i = 0; i < Math.min(gp.buttons.length, 17); i++) {
        const pressed = gp.buttons[i].pressed;
        gpDown[i] = pressed && !gpPrev[i];
        gpHeld[i] = pressed;
        gpPrev[i] = pressed;
      }

      // Left stick (axes 0/1)
      gpStickX = Math.abs(gp.axes[0]) > STICK_DEADZONE ? gp.axes[0] : 0;
      gpStickY = Math.abs(gp.axes[1]) > STICK_DEADZONE ? gp.axes[1] : 0;
    }

    function gpActionDown(action) {
      const btn = gpBinds[action];
      return btn !== undefined && gpDown[btn];
    }

    function gpActionHeld(action) {
      const btn = gpBinds[action];
      return btn !== undefined && gpHeld[btn];
    }

    function gpMoveX() {
      // Combine D-pad + stick
      let x = gpStickX;
      if (gpHeld[14]) x = -1; // D-Left
      if (gpHeld[15]) x = 1;  // D-Right
      return x;
    }

    function gpAnyButtonDown() {
      for (let i = 0; i < 17; i++) {
        if (gpDown[i]) return i;
      }
      return -1;
    }

    // --- Controls HUD (updates dynamically based on bindings + controller) ---
    function updateControlsHUD() {
      const el = document.getElementById('battle-controls');
      if (!el) return;
      const kb = (action) => `<span class="key-badge">${keyCodeLabel(kbBinds[action])}</span>`;
      const gp_b = (action) => gpBinds[action] !== undefined
        ? `<span class="key-badge" style="border-color:#2a4080;color:#6090dd">${gpButtonName(gpBinds[action])}</span>` : '';
      const sep = '&nbsp;&nbsp;';
      let html = `${kb('move_left')} ${kb('move_right')} Move${sep}`;
      html += `${kb('punch')}${gp_b('punch')} Light${sep}`;
      html += `${kb('kick')}${gp_b('kick')} Heavy${sep}`;
      html += `${kb('special')}${gp_b('special')} Special${sep}`;
      html += `${kb('block')}${gp_b('block')} Block/Parry${sep}`;
      html += `${kb('menu')} Menu${sep}${kb('debug')} Debug`;
      el.innerHTML = html;
    }

    // --- Settings UI ---
    function buildSettingsUI() {
      const kbEl = document.getElementById('kb-binds');
      const gpEl = document.getElementById('gp-binds');
      if (!kbEl || !gpEl) return;

      kbEl.innerHTML = '';
      for (const action of INPUT_ACTIONS) {
        const row = document.createElement('div');
        row.className = 'bind-row';
        row.dataset.action = action;
        row.dataset.type = 'kb';
        row.innerHTML = `
          <span class="bind-action">${ACTION_LABELS[action]}</span>
          <div class="bind-keys">
            <span class="bind-key">${keyCodeLabel(kbBinds[action])}</span>
            <span class="bind-hint">click to rebind</span>
          </div>`;
        row.addEventListener('click', () => startRebind('kb', action, row));
        kbEl.appendChild(row);
      }

      gpEl.innerHTML = '';
      const gpActions = INPUT_ACTIONS.filter(a => a !== 'move_left' && a !== 'move_right');
      for (const action of gpActions) {
        const row = document.createElement('div');
        row.className = 'bind-row';
        row.dataset.action = action;
        row.dataset.type = 'gp';
        const val = gpBinds[action];
        row.innerHTML = `
          <span class="bind-action">${ACTION_LABELS[action]}</span>
          <div class="bind-keys">
            <span class="bind-gp">${val !== undefined ? gpButtonName(val) : '—'}</span>
            <span class="bind-hint">click to rebind</span>
          </div>`;
        row.addEventListener('click', () => startRebind('gp', action, row));
        gpEl.appendChild(row);
      }

      // D-pad / stick info
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.7rem;color:#a8a18a;margin-top:0.5rem;font-style:italic;';
      note.textContent = 'Movement: Left Stick + D-Pad (not rebindable)';
      gpEl.appendChild(note);
    }

    function startRebind(type, action, rowEl) {
      // Cancel previous
      document.querySelectorAll('.bind-row.listening').forEach(r => r.classList.remove('listening'));
      rebindTarget = { type, action };
      rowEl.classList.add('listening');
      rowEl.querySelector('.bind-hint').textContent = type === 'kb' ? 'press a key…' : 'press a button…';
    }

    function finishRebind(type, action, value) {
      if (type === 'kb') {
        kbBinds[action] = value;
      } else {
        gpBinds[action] = value;
      }
      rebindTarget = null;
      saveBindings();
      buildSettingsUI();
      updateControlsHUD();
    }

    // Listen for keyboard rebind
    document.addEventListener('keydown', (e) => {
      if (rebindTarget && rebindTarget.type === 'kb') {
        e.preventDefault();
        finishRebind('kb', rebindTarget.action, e.code);
        return;
      }
    }, true); // capture phase so it fires before game input

    window.showSettings = function() {
      settingsOpen = true;
      buildSettingsUI();
      document.getElementById('settings-overlay').classList.add('active');

    window.closeSettings = function() {
      settingsOpen = false;

    window.resetBindings = function() {
      kbBinds = { ...DEFAULT_KB_BINDS };

    loadBindings();

    // ===== RAPIER PHYSICS =====
    let physicsWorld = null;
    const ARENA_HALF_WIDTH = 3.8;
    const KNOCKBACK_FORCE = 12;  // multiplied by attack knockback value
    const LAUNCH_FORCE = 3.0;    // upward force on knockdown attacks

    // Per-character physics profiles derived from stats
    function getPhysicsProfile(char) {
      const mass = 40 + char.def * 8;        // heavy = harder to knock (120-152 kg)
      const linearDamping = 3.0 + (10 - char.spd) * 0.4; // slow chars decelerate faster
      const moveForce = 2.0 + char.spd * 0.3; // fast chars move quicker
      const knockbackResist = char.def * 0.03; // 0-30% reduction
      const dashForce = 4.0 + char.spd * 0.2;
      return { mass, linearDamping, moveForce, knockbackResist, dashForce };
    }

    function initBattlePhysics() {
      const gravity = new RAPIER.Vector3(0.0, -19.62, 0.0); // 2x gravity for snappy fighting
      physicsWorld = new RAPIER.World(gravity);

      // Floor
      const floorBody = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.1, 0));
      physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(10, 0.1, 5), floorBody);

      // Left wall
      const lwBody = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(-ARENA_HALF_WIDTH - 0.1, 2, 0));
      physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(0.1, 4, 5).setRestitution(0.3), lwBody);

      // Right wall
      const rwBody = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(ARENA_HALF_WIDTH + 0.1, 2, 0));
      physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(0.1, 4, 5).setRestitution(0.3), rwBody);
    }

    function createFighterRigidBody(fighter) {
      const profile = getPhysicsProfile(fighter.char);
      fighter.physicsProfile = profile;
      const b = fighter.bounds;
      const hh = b.hh || 0.8;
      const hw = Math.max(b.hw || 0.25, 0.15);

      const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(fighter.x, hh, 0)
        .setLinearDamping(profile.linearDamping)
        .setAngularDamping(100) // prevent spinning
        .lockRotations();       // fighters always upright
      const rigidBody = physicsWorld.createRigidBody(bodyDesc);

      // Capsule collider (half-height + radius)
      const capsuleHH = Math.max(hh - hw, 0.2);
      const colliderDesc = RAPIER.ColliderDesc.capsule(capsuleHH, hw)
        .setMass(profile.mass)
        .setRestitution(0.1)
        .setFriction(0.8);
      physicsWorld.createCollider(colliderDesc, rigidBody);

      fighter.rigidBody = rigidBody;
      return rigidBody;
    }

    function applyPhysicsKnockback(attacker, defender, knockback, knocksDown) {
      if (!defender.rigidBody) return;
      const resist = defender.physicsProfile?.knockbackResist || 0;
      const force = knockback * KNOCKBACK_FORCE * (1 - resist);
      const dir = defender.x > attacker.x ? 1 : -1;
      const launchY = knocksDown ? LAUNCH_FORCE : (knockback > 0.2 ? 1.0 : 0);
      defender.rigidBody.applyImpulse({ x: dir * force, y: launchY, z: 0 }, true);
    }

    function syncFighterFromPhysics(fighter) {
      if (!fighter.rigidBody) return;
      const pos = fighter.rigidBody.translation();
      fighter.x = pos.x;
      // Y position: only apply if above ground (airborne from knockback/jump)
      const groundY = fighter.baseY || 0;
      fighter.group.position.x = pos.x;
      fighter.group.position.y = Math.max(groundY, pos.y - (fighter.bounds?.hh || 0.8));
      // Lock Z in physics (2.5D constraint)
      const vel = fighter.rigidBody.linvel();
      if (Math.abs(vel.z) > 0.1) {
        fighter.rigidBody.setLinvel({ x: vel.x, y: vel.y, z: 0 }, true);
      }
      // Snap Z position
      if (Math.abs(pos.z) > 0.01 && !fighter.sidestepping) {
        fighter.rigidBody.setTranslation({ x: pos.x, y: pos.y, z: 0 }, true);
      }
    }

    function setPhysicsMovement(fighter, moveIntent) {
      if (!fighter.rigidBody) return;
      const profile = fighter.physicsProfile;
      if (!profile) return;
      const vel = fighter.rigidBody.linvel();
      const targetVx = moveIntent * profile.moveForce;
      // Smooth velocity blending for weighted feel
      const newVx = vel.x + (targetVx - vel.x) * 0.3;
      fighter.rigidBody.setLinvel({ x: newVx, y: vel.y, z: vel.z }, true);
    }

    function applyPhysicsDodge(fighter) {
      if (!fighter.rigidBody) return;
      const profile = fighter.physicsProfile;
      const vel = fighter.rigidBody.linvel();
      // Sidestep into Z axis
      fighter.rigidBody.setLinvel({ x: vel.x * 0.3, y: vel.y, z: -(profile?.dashForce || 5) }, true);
      // Schedule return
      setTimeout(() => {
        if (!fighter.rigidBody) return;
        const v = fighter.rigidBody.linvel();
        fighter.rigidBody.setLinvel({ x: v.x, y: v.y, z: (profile?.dashForce || 5) * 0.8 }, true);
      }, 400);
    }
